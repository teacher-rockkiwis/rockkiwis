<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Word Hunt - Global Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7; --success: #2ed573; --error: #ff4757;
            --wall-text: #2c3e50; --bank-bg: #f8f9fa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: #ffffff; margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; user-select: none;
        }

        /* ✨ 漂浮的音樂控制按鈕 */
        .sound-toggle {
            position: fixed; top: 15px; right: 15px;
            background: white; border: 3px solid var(--success); border-radius: 50px;
            padding: 8px 15px; font-size: 16px; font-weight: 900;
            cursor: pointer; font-family: 'Quicksand', sans-serif; color: #2d3436;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 50000; transition: 0.2s;
        }
        .sound-toggle:hover { transform: scale(1.05); }
        .sound-toggle:active { transform: scale(0.95); }

        #header {
            height: 60px; background: white; border-bottom: 2px solid #dfe6e9;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 15px; flex-shrink: 0; visibility: hidden;
        }
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; }

        #word-bank {
            background: var(--bank-bg); padding: 10px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
            border-bottom: 3px solid #dfe6e9; flex-shrink: 0; visibility: hidden;
            max-height: 20vh; overflow-y: auto;
        }
        .bank-item {
            background: white; padding: 8px 12px; border-radius: 12px; font-size: 20px;
            color: #2c3e50; border: 2px solid #bdc3c7; text-align: center; font-weight: 900;
        }
        .bank-item.completed {
            background: var(--primary) !important; color: white !important; border-color: #f1c40f;
            animation: super-flip 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes super-flip {
            0% { transform: scale(1); }
            50% { transform: scale(1.6) rotateY(180deg); background-color: #f1c40f; box-shadow: 0 0 40px #f1c40f; }
            100% { transform: scale(1.1) rotateY(360deg); }
        }

        #game-area {
            flex-grow: 1; position: relative; padding: 15px 30px;
            font-size: 32px; line-height: 1.25; letter-spacing: 5px;
            word-break: break-all; color: var(--wall-text); text-align: justify;
            cursor: pointer; overflow: hidden; font-weight: 900;
        }
        .target { color: inherit; display: inline-block; transition: 0.2s; padding: 8px 3px; margin: -8px -3px; position: relative; z-index: 10; }
        .found { color: var(--primary) !important; font-weight: 900 !important; text-shadow: 0 0 12px rgba(108, 92, 231, 0.6); }
        .found-egg { color: #f1c40f !important; font-weight: 900 !important; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8); }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); color: white;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            z-index: 20000; overflow-y: auto; padding: 30px 10px;
        }
        #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 20000; overflow-y: auto; padding: 20px; text-align: center;
        }

        #secret-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); color: white; padding: 30px 40px; border-radius: 20px;
            z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 80%; max-width: 400px;
        }

        .front-leaderboard {
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px;
            width: 320px; max-width: 95%; margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: #2d3436; text-align: left;
        }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        
        #front-leaderboard-list { max-height: 180px; overflow-y: auto; padding-right: 5px; }
        #front-leaderboard-list::-webkit-scrollbar { width: 6px; }
        #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #front-leaderboard-list::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 10px; }

        .front-board-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; }
        .front-board-row:last-child { border-bottom: none; }

        .name-input {
            font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none;
            text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700;
            margin-bottom: 20px; width: 300px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); outline: none;
        }
        .start-btn {
            background: var(--success); color: white; border: none;
            padding: 15px 50px; font-size: 35px; border-radius: 50px;
            font-family: 'Quicksand', sans-serif; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #219150; transition: 0.1s; margin-bottom: 30px;
        }

        .result-panel {
            background: white; border: 4px solid var(--primary); border-radius: 20px;
            padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left;
        }
        .score-breakdown { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; color: #2d3436; font-weight: 700; }
        .final-score-display { font-size: 36px; color: var(--error); text-align: center; font-weight: 900; margin-top: 10px; }
        .leaderboard-title { font-size: 24px; color: var(--primary); margin: 0 0 10px 0; font-weight: 900; text-align: center; border-top: 2px dashed #ddd; padding-top: 15px; }
        
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        #leaderboard-list::-webkit-scrollbar { width: 6px; }
        #leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #leaderboard-list::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 10px; }

        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; color: #2d3436; }
        .board-row:last-child { border-bottom: none; }
        .rank-1 { color: #f1c40f; font-size: 22px; } .rank-2 { color: #bdc3c7; } .rank-3 { color: #cd6133; }

        .float-num {
            position: fixed; pointer-events: none; font-weight: 900; font-size: 120px;
            z-index: 30000; text-shadow: 6px 6px 0px white, -6px -6px 0px white;
            animation: burst 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-50px); opacity: 1; } 100% { transform: scale(1.2) translateY(-250px); opacity: 0; } }
        .shake { animation: shake 0.3s linear; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-15px);} 75%{transform:translateX(15px);} }

        @media (max-width: 768px) {
            .sound-toggle { top: 10px; right: 10px; font-size: 14px; padding: 6px 12px; }
            #start-overlay { padding-top: 10px; }
            #start-overlay h1 { font-size: 40px !important; margin-bottom: 5px; }
            #start-overlay p { font-size: 16px !important; margin-bottom: 10px !important; }
            .front-leaderboard { width: 95%; padding: 10px; margin-bottom: 10px; }
            .name-input { width: 85%; font-size: 20px; padding: 10px; margin-bottom: 10px; }
            #theme-select { font-size: 16px !important; padding: 8px 15px !important; margin-bottom: 10px !important; }
            .start-btn { font-size: 28px; padding: 10px 40px; margin-bottom: 10px; }
            
            #header { padding: 0 5px; height: 50px; }
            .stat-pill { font-size: 14px !important; padding: 4px 8px; }
            .bank-item { font-size: 14px; padding: 5px 8px; }
            #game-area { font-size: 22px !important; letter-spacing: 2px !important; padding: 10px !important; line-height: 1.15 !important; }
            .float-num { font-size: 70px !important; }
            #end-title { font-size: 36px !important; }
            .result-panel { width: 95%; padding: 15px; }
            .score-breakdown { font-size: 16px; padding: 10px; }
            .final-score-display { font-size: 28px; }
            .board-row { font-size: 14px; padding: 6px; }
        }
    </style>
</head>
<body onclick="handleTap(event)">

    <audio id="bgm" src="music.mp3" loop></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 60px; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">Speedrun Hunt! ⚡</h1>
        <p style="font-size: 18px; margin-bottom: 15px;">挑戰你的極限速度！</p>
        
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 賽季英雄榜</h3>
            <div id="front-leaderboard-list">
                <div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取排行榜中...</div>
            </div>
        </div>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入玩家姓名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" onchange="fetchFrontLeaderboard()" style="font-size: 20px; padding: 10px 20px; margin-bottom: 15px; border-radius: 15px; border:none; outline:none; font-family: 'Quicksand'; font-weight: 700;">
            <option value="body">🦴 五年級 - Body Parts</option>
            <option value="home">🏠 四年級 - Home Space</option>
            <option value="numbers">🔢 四年級進階 - Home & Numbers</option>
        </select>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Player</span></div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:var(--primary); font-size:26px;">0</span></div>
        <div class="stat-pill">⏱️ <span id="timer-val">00m 00s</span></div>
        <button onclick="location.href='index.html'" style="font-weight:900; border:none; background:none; cursor:pointer; color:#636e72;">回大廳</button>
    </div>

    <div id="word-bank"></div>
    <div id="game-area"></div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:#f1c40f; font-size:36px;">🤫 隱藏彩蛋！</h2>
        <p style="font-size:20px; margin:0; line-height: 1.5;">你找到了 ROCK 老師！<br>狂加 <strong style="font-size: 26px;">100</strong> 分！<br>請對其他同學保密喔！</p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 50px; color: var(--primary); margin: 0; margin-top: 10px;">闖關成功！🎉</h1>
        <div class="result-panel">
            <div class="score-breakdown">
                <div>🎯 基礎得分： <span id="base-score-display"></span> pts</div>
                <div>⏱️ 使用時間： <span id="time-taken-display"></span></div>
                <div>⚡ 時間加成： <span id="multiplier-display" style="color:var(--success)"></span></div>
                <div class="final-score-display">最終總分： <span id="final-total-display"></span></div>
            </div>
            <h2 class="leaderboard-title" id="end-board-title">🌍 世界英雄榜</h2>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.reload()" style="padding:15px 50px; font-size:24px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 30px;">再玩一次</button>
    </div>

    <script>
        const themes = {
            body: ["eye", "eyes", "ear", "ears", "head", "heads", "nose", "noses", "mouth", "mouths", "arm", "arms", "hand", "hands", "shoulder", "shoulders", "foot", "feet", "leg", "legs", "hurt"],
            home: ["bathroom", "bedroom", "kitchen", "diningroom", "livingroom", "balcony", "basement", "garage", "tv", "light", "tap", "fan"],
            numbers: ["bathroom", "bedroom", "kitchen", "diningroom", "livingroom", "balcony", "basement", "garage", "tv", "light", "tap", "fan", "sixty", "seventy", "eighty", "ninety", "onehundred"]
        };

        const badWords = [
            "fuck", "shit", "bitch", "ass", "dick", "pussy", "cunt", "slut", "whore", "idiot", "stupid", "wtf", "mdfk", "nmsl",
            "幹", "靠北", "靠杯", "靠腰", "靠夭", "靠妖", "機掰", "雞掰", "擊敗", "智障", "白痴", "白癡", "垃圾", "沙小", "三小", "王八", "賤", "去死", "腦殘",
            "操", "肏", "草泥馬", "操你", "媽的", "幹你娘", "幹您娘", "趕羚羊", "機車", "他媽", "ㄘㄠˋ", "ㄍㄢˋ", "ㄐㄅ"
        ];

        let currentVocab = [], score = 0, foundCount = 0, seconds = 0, interval;
        let playerName = "Player"; 
        let isMuted = false; // ✨ 記錄目前的靜音狀態
        
        const bgm = document.getElementById('bgm');
        const secretBgm = document.getElementById('secret-bgm');

        // ⚠️ 請換成您的 Google Apps Script 網址 ⚠️
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        window.onload = function() { fetchFrontLeaderboard(); };

        // ✨ 靜音切換功能
        function toggleSound(e) {
            if (e) e.stopPropagation(); // 防止點擊按鈕時觸發背景點擊扣分
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            
            if (isMuted) {
                btn.innerHTML = "🔇 音效：關";
                btn.style.borderColor = "var(--error)";
                bgm.muted = true;
                secretBgm.muted = true;
            } else {
                btn.innerHTML = "🔊 音效：開";
                btn.style.borderColor = "var(--success)";
                bgm.muted = false;
                secretBgm.muted = false;
            }
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            const currentTheme = themeSelect.value;
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('front-board-title').innerText = `🏆 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取排行榜中...</div>";

            const url = `${GOOGLE_API_URL}?action=get&theme=${currentTheme}`;

            fetch(url)
            .then(response => response.json())
            .then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) {
                    listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72; padding:10px;'>此關卡還沒有紀錄，搶下第一名吧！</div>";
                    return;
                }
                board.forEach((player, index) => {
                    const row = document.createElement('div');
                    row.className = 'front-board-row';
                    let rankStr = `#${index + 1}`;
                    if(index === 0) rankStr = '🥇';
                    if(index === 1) rankStr = '🥈';
                    if(index === 2) rankStr = '🥉';
                    row.innerHTML = `<span>${rankStr} ${player.name}</span> <span>${player.score} pts</span>`;
                    listDiv.appendChild(row);
                });
            })
            .catch(error => {
                listDiv.innerHTML = "<div style='text-align:center; color:var(--error); font-size:14px;'>排行榜連線失敗 😢</div>";
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (isMuted) return; // ✨ 如果靜音開啟，直接不播放特效音
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                osc.type = 'square'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2); 
            } else if (type === 'celebration') {
                [523, 659, 783, 1046].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
                });
            }
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入玩家姓名喔！"); document.getElementById('player-name').focus(); return; }

            const cleanName = inputName.toLowerCase().replace(/\s+/g, '');
            const hasBadWord = badWords.some(bad => cleanName.includes(bad));
            if(hasBadWord) {
                alert("請使用有禮貌的名字喔！😇");
                document.getElementById('player-name').value = ""; document.getElementById('player-name').focus(); return;
            }

            playerName = inputName;
            document.getElementById('display-name').innerText = playerName;

            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("BGM Error"));

            secretBgm.onended = function() {
                bgm.play().catch(e => console.log("BGM Resume Error"));
            };

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('header').style.visibility = 'visible';
            document.getElementById('word-bank').style.visibility = 'visible';
            
            const key = document.getElementById('theme-select').value;
            currentVocab = themes[key];
            
            initBoard();
            seconds = 0;
            interval = setInterval(countUp, 1000);
        }

        function initBoard() {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = "";
            currentVocab.sort().forEach(w => {
                const div = document.createElement('div');
                div.className = 'bank-item'; div.id = 'bank-' + w;
                div.textContent = w === "tv" ? "TV" : w.replace('room', ' room').replace('onehundred', 'one hundred');
                bank.appendChild(div);
            });
            generatePerfectScatteredWall();
        }

        function generatePerfectScatteredWall() {
            const area = document.getElementById('game-area');
            area.innerHTML = "";
            const testSpan = document.createElement('span');
            testSpan.style.visibility = 'hidden'; testSpan.style.position = 'absolute'; testSpan.style.whiteSpace = 'nowrap';
            testSpan.textContent = "abcdefghijklmnopqrstuvwxyz";
            area.appendChild(testSpan);
            
            const charWidth = testSpan.offsetWidth / 26;
            const lineHeight = testSpan.offsetHeight;
            area.removeChild(testSpan);

            const charsPerLine = Math.floor(area.clientWidth / charWidth);
            const lines = Math.floor(area.clientHeight / lineHeight);
            const totalCapacity = Math.floor(charsPerLine * lines * 0.65); 

            const renderWords = [...currentVocab, "ROCK"].sort(() => Math.random() - 0.5);
            const totalWordChars = renderWords.reduce((sum, w) => sum + w.length, 0);
            
            let garbageBudget = totalCapacity - totalWordChars;
            if (garbageBudget < 0) garbageBudget = 100; 
            const baseGarbagePerWord = Math.floor(garbageBudget / renderWords.length);

            renderWords.forEach(w => {
                let variance = Math.floor(baseGarbagePerWord * 0.3);
                let currentGarbage = baseGarbagePerWord + (Math.floor(Math.random() * (variance * 2)) - variance);
                if (currentGarbage < 0) currentGarbage = 0;
                
                area.appendChild(document.createTextNode(getGarbage(currentGarbage)));
                
                const s = document.createElement('span');
                s.className = 'target'; 
                s.textContent = w; 
                s.setAttribute('data-word', w);
                area.appendChild(s);
            });

            let safety = 0;
            while (area.scrollHeight <= area.clientHeight && safety < 800) {
                area.appendChild(document.createTextNode(getGarbage(10)));
                safety++;
            }
            
            if (area.scrollHeight > area.clientHeight) {
                let lastNode = area.lastChild;
                if (lastNode && lastNode.nodeType === 3) { 
                    let text = lastNode.textContent;
                    while (area.scrollHeight > area.clientHeight && text.length > 0) {
                        text = text.slice(0, -1);
                        lastNode.textContent = text;
                    }
                }
            }
        }

        function getGarbage(len) {
            const chars = "abcdefghijklmnopqrstuvwxyz"; let res = "";
            for(let i=0; i<len; i++) {
                let char = chars[Math.floor(Math.random()*26)];
                if (res.endsWith('t') && char === 'v') char = 'x';
                res += char;
            }
            return res;
        }

        function countUp() {
            seconds++;
            const m = Math.floor(seconds/60).toString().padStart(2,'0');
            const s = (seconds%60).toString().padStart(2,'0');
            document.getElementById('timer-val').textContent = `${m}m ${s}s`;
        }

        function handleTap(e) {
            // ✨ 確保點擊靜音按鈕時，不會觸發遊戲的扣分機制
            if (e.target.closest('.sound-toggle')) return;

            if (foundCount >= currentVocab.length) return;
            const isTarget = e.target.classList.contains('target');
            const isFound = e.target.classList.contains('found') || e.target.classList.contains('found-egg');
            
            if (isTarget && !isFound) {
                const w = e.target.getAttribute('data-word');
                
                if (w === "ROCK") {
                    e.target.classList.add('found-egg');
                    score += 100;
                    document.getElementById('score-val').textContent = score;
                    showBurst(e.clientX, e.clientY, "+100 🌟", "#f1c40f");
                    
                    bgm.pause();
                    secretBgm.currentTime = 0;
                    secretBgm.volume = 0.6;
                    secretBgm.play().catch(err => console.log(err));

                    const modal = document.getElementById('secret-modal');
                    modal.style.display = 'block';
                    setTimeout(() => { modal.style.display = 'none'; }, 3000);
                    return; 
                }

                e.target.classList.add('found');
                score += 10; 
                foundCount++;
                playSfx('success');
                showBurst(e.clientX, e.clientY, "+10", "#2ed573");
                document.getElementById('bank-' + w).classList.add('completed');
                document.getElementById('score-val').textContent = score;
                
                if(foundCount === currentVocab.length) { 
                    playSfx('celebration'); 
                    calculateAndEndGame(); 
                }
            } else if (e.target.closest('#game-area') && !isTarget && !isFound) {
                score = Math.max(0, score - 2); 
                playSfx('error');
                showBurst(e.clientX, e.clientY, "-2", "#ff4757");
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 300);
                document.getElementById('score-val').textContent = score;
            }
        }

        function showBurst(x, y, txt, color) {
            const div = document.createElement('div');
            div.className = 'float-num';
            div.textContent = txt; div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function calculateAndEndGame() {
            clearInterval(interval);
            bgm.pause();
            secretBgm.pause(); 
            
            let multiplier = 1.0;
            let tierName = "🐢 標準 (x1.0)";
            
            if (seconds <= 60) { multiplier = 3.0; tierName = "⚡ SSS 級 (x3.0)"; }
            else if (seconds <= 120) { multiplier = 2.0; tierName = "🚀 SS 級 (x2.0)"; }
            else if (seconds <= 180) { multiplier = 1.5; tierName = "🏃 S 級 (x1.5)"; }
            else if (seconds <= 240) { multiplier = 1.2; tierName = "🚶 A 級 (x1.2)"; }
            
            const finalScore = Math.floor(score * multiplier);
            const m = Math.floor(seconds/60).toString().padStart(2,'0');
            const s = (seconds%60).toString().padStart(2,'0');
            const timeStr = `${m}m ${s}s`; 
            
            document.getElementById('base-score-display').textContent = score;
            document.getElementById('time-taken-display').textContent = timeStr;
            document.getElementById('multiplier-display').textContent = tierName;
            document.getElementById('final-total-display').textContent = finalScore;

            document.getElementById('end-msg').style.display = "flex";

            saveAndDisplayGlobalLeaderboard(finalScore, timeStr);
        }

        function saveAndDisplayGlobalLeaderboard(finalScore, timeStr) {
            const listDiv = document.getElementById('leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            const currentTheme = themeSelect.value;
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('end-board-title').innerText = `🌍 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 正在上傳成績到世界排行榜...</div>";
            
            const url = `${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${finalScore}&time=${encodeURIComponent(timeStr)}&theme=${currentTheme}`;

            fetch(url)
            .then(response => response.json())
            .then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) {
                    listDiv.innerHTML = "<div style='text-align:center; padding:10px;'>目前還沒有紀錄，你就是第一名！</div>";
                    return;
                }
                board.forEach((player, index) => {
                    const row = document.createElement('div');
                    row.className = 'board-row';
                    let rankStr = `#${index + 1}`;
                    if(index === 0) { rankStr = '🥇'; row.classList.add('rank-1'); }
                    if(index === 1) { rankStr = '🥈'; row.classList.add('rank-2'); }
                    if(index === 2) { rankStr = '🥉'; row.classList.add('rank-3'); }
                    row.innerHTML = `<span>${rankStr} ${player.name} (${player.time})</span> <span>${player.score} pts</span>`;
                    listDiv.appendChild(row);
                });
            })
            .catch(error => {
                listDiv.innerHTML = "<div style='text-align:center; color:var(--error); font-weight:700;'>排行榜連線失敗 😢</div>";
            });
        }
    </script>
</body>
</html>
