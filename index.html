<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Word Hunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --success: #00b894; --error: #d63031;
            --bg: #f1f2f6; --text-dark: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body {
            background-color: var(--bg); margin: 0; padding: 0; height: 100dvh; width: 100vw;
            font-family: 'Quicksand', sans-serif; overflow: hidden; display: flex;
            flex-direction: column; user-select: none;
        }

        .sound-toggle {
            position: fixed; top: 12px; right: 15px; background: white; border: 3px solid var(--success);
            border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900;
            cursor: pointer; font-family: 'Quicksand', sans-serif; color: var(--text-dark);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 50000; transition: 0.2s;
        }
        .sound-toggle:hover { transform: scale(1.05); } .sound-toggle:active { transform: scale(0.95); }

        #header {
            height: 60px; background: rgba(255,255,255,0.95); border-bottom: 3px solid var(--primary);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 140px 0 10px; flex-shrink: 0; visibility: hidden; z-index: 100;
        }

        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: var(--text-dark); }
        .exit-btn { background: #ff7675; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; font-family: 'Quicksand', sans-serif; box-shadow: 0 4px 0 #d63031; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d63031; }

        #game-area {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px; visibility: hidden; width: 100%; max-width: 600px; margin: 0 auto;
        }

        #target-word-display { font-size: 40px; font-weight: 900; color: var(--primary); margin-bottom: 10px; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #grid-container { display: grid; gap: 5px; padding: 15px; background: #636e72; border-radius: 15px; box-shadow: inset 0 5px 15px rgba(0,0,0,0.3); }

        .cell {
            background: white; color: var(--text-dark); display: flex; justify-content: center; align-items: center;
            font-size: 26px; font-weight: 900; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.1s; box-shadow: 0 4px 0 #b2bec3;
        }
        .cell:active { transform: translateY(4px); box-shadow: 0 0 0 #b2bec3; }
        .cell.selected { background: #f1c40f; color: white; border-color: #f39c12; transform: scale(1.05); z-index: 10; }
        .cell.found { background: var(--success); color: white; border-color: #009432; box-shadow: none; pointer-events: none; opacity: 0.8; }

        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 20000; overflow-y: auto; padding: 30px 10px; }
        #start-overlay { background: var(--primary); color: white; } #end-msg { background: rgba(255,255,255,0.98); display: none; text-align: center; }

        .name-input { font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 20px; width: 300px; max-width: 90%; outline: none; }
        .start-btn { background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 30px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #00b894; margin-bottom: 20px; }

        .grade-group { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 90%; max-width: 400px; }
        .grade-title { font-size: 18px; font-weight: 900; margin: 0 0 10px 0; color: #ffeaa7; text-align: left; }
        select.theme-select { width: 100%; font-size: 18px; padding: 10px 15px; border-radius: 10px; border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; }

        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark); }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; }

        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }
        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0; text-align: left; }
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; color: var(--text-dark);}

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 60px; z-index: 30000; animation: burst 0.8s forwards; text-shadow: 3px 3px 0px white, -3px -3px 0px white; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }

        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px 40px; border-radius: 20px; z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 85%; max-width: 450px; }

        @media (max-width: 768px) {
            .sound-toggle { top: 8px; right: 8px; font-size: 13px; padding: 6px 10px; } #header { padding: 0 100px 0 5px; height: 50px; gap: 5px; } .stat-pill { font-size: 13px !important; padding: 4px 6px; } .exit-btn { font-size: 13px; padding: 5px 8px; } #start-overlay h1 { font-size: 40px !important; } .name-input { font-size: 20px; padding: 10px; } .start-btn { font-size: 24px; padding: 10px 40px; } #target-word-display { font-size: 30px; } .cell { font-size: 20px; border-radius: 5px; }
        }
    </style>
</head>
<body>
    <audio id="bgm" src="music.mp3" loop></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>
    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 50px; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">⚡ Word Hunt</h1>
        <p style="font-size: 16px; margin-bottom: 15px;">極速單字尋寶！越快找到分數越高！</p>
        
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 尋寶英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入尋寶家姓名..." autocomplete="off" maxlength="12">
        <div class="grade-group">
            <div class="grade-title">📘 選擇挑戰關卡：</div>
            <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
                <optgroup label="四年級 (Grade 4)">
                    <option value="hunt-g4-unit1">🏠 G4 Unit 1 - Home Space</option>
                </optgroup>
                <optgroup label="五年級 (Grade 5)">
                    <option value="hunt-g5-unit1">🦴 G5 Unit 1 - Body Parts</option>
                </optgroup>
            </select>
        </div>
        <button class="start-btn" onclick="startGame()">開始尋寶！</button>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Player</span></div>
        <div class="stat-pill">⏱️ <span id="timer" style="color:var(--error);">0</span>s</div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:#f39c12;">0</span></div>
        <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>
    </div>

    <div id="game-area">
        <div id="target-word-display">TARGET</div>
        <div id="grid-container"></div>
    </div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:#f1c40f; font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">ROCK 老師親自幫你找！<br>獲得額外 <strong style="font-size: 30px;">+100</strong> 分！</p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">尋寶完成！🎉</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: var(--text-dark); text-align: center;">
                尋寶積分：<span id="final-total-display" style="color:var(--error); font-size:36px;">0</span> pts
            </div>
            <h2 style="font-size: 20px; color: var(--primary); margin: 0 0 10px 0; font-weight: 900; text-align: center;">🌍 尋寶英雄榜</h2>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px;">再找一次</button>
        <button onclick="location.href='index.html'" style="padding:12px 40px; font-size:20px; background:#636e72; color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px; margin-left: 10px;">回大廳</button>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return false; } });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);

        const themes = {
            "hunt-g4-unit1": ["bedroom", "livingroom", "diningroom", "kitchen", "bathroom", "balcony", "garage", "basement"],
            "hunt-g5-unit1": ["head", "eye", "ear", "nose", "mouth", "hand", "arm", "leg", "foot", "shoulder", "tooth"]
        };

        const badWords = [
            "fuck", "shit", "bitch", "pussy", "whore", "idiot", "stupid", "wtf", "mdfk", "nmsl", "retard", "psycho", "loser", "trash", "autist", "gay", "lesbian", 
            "幹", "靠北", "靠杯", "靠腰", "靠夭", "靠妖", "靠么", "機掰", "雞掰", "擊敗", "姬芭", "機八", "雞巴", "雞排", "操", "肏", "草泥馬", "操你", "媽的", "他媽", "幹你娘", "幹您娘", "趕羚羊", "機車", "ㄘㄠˋ", "ㄍㄢˋ", "ㄐㄅ", "e04", "林北", "恁爸", "老木", "老母", "哭爸", "哭夭",
            "智障", "白痴", "白癡", "北七", "北漆", "腦殘", "腦弱", "低能", "智缺", "喜憨兒", "殘障", "神經病", "有病", "精神病", "自閉", "腦袋進水", "弱智", "啟智", "白目", "丁丁", "特教班", "資源班", "唐氏症", "神經", "智商",
            "死", "孤兒", "沒爸", "沒媽", "沒爹", "沒娘", "沒家教", "全家", "沒人要", "找死", "去死", "短命", "夭壽", "挫冰", "祝你", "沒老母", "沒教養", "棄嬰", "孤兒院", "遺腹子", "沒生教",
            "娘炮", "娘娘腔", "基佬", "死玻璃", "玻璃心", "變態", "人妖", "同性戀", "假妹", "破麻", "綠茶", "婊", "渣男", "渣女", "公車", "妓", "欠幹", "欠操", "男妓", "老玻璃", "發情", "噁男",
            "垃圾", "沙小", "三小", "王八", "賤", "雜碎", "畜生", "狗娘", "狗屎", "屎", "尿", "糞", "大便", "吃大便", "甲賽", "假賽", "呷賽", "甲洨", "喝尿", "屌", "懶覺", "蘭嬌", "懶叫", "卵葩", "老二", "小雞雞", "陰莖", "鮑魚", "傻逼", "沙雕", "肥豬", "醜八怪", "🖕", "💩", "🐷", "🐶", "🐒"
        ];

        let currentVocab = [], score = 0, foundCount = 0, seconds = 0, interval;
        let playerName = "Player", currentTheme = "hunt-g4-unit1";
        let grid = [], gridSize = 10, currentWord = "";
        let selectedCells = [], startCell = null, currentDirection = null;
        let isMuted = false, eggBuffer = "";
        let userIP = "Unknown"; 

        const bgm = document.getElementById('bgm'); 
        const secretBgm = document.getElementById('secret-bgm');
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        window.onload = function() { 
            fetchFrontLeaderboard(); 
            document.addEventListener('keydown', (e) => { 
                if(document.getElementById('game-area').style.visibility === 'visible' && /^[a-zA-Z]$/.test(e.key)) { 
                    eggBuffer += e.key.toUpperCase(); if(eggBuffer.length > 4) eggBuffer = eggBuffer.slice(-4); 
                    if(eggBuffer === "ROCK") triggerEasterEgg(); 
                } 
            });
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };

        function toggleSound(e) { 
            if (e) e.stopPropagation(); isMuted = !isMuted; const btn = document.getElementById('sound-btn'); 
            if (isMuted) { btn.innerHTML = "🔇 音效：關"; btn.style.borderColor = "var(--error)"; bgm.muted = true; secretBgm.muted = true; } 
            else { btn.innerHTML = "🔊 音效：開"; btn.style.borderColor = "var(--success)"; bgm.muted = false; secretBgm.muted = false; } 
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            currentTheme = themeSelect.value; 
            const optionText = themeSelect.options[themeSelect.selectedIndex].text;
            const themeName = optionText.includes('-') ? optionText.split('-')[1].trim() : optionText;
            
            document.getElementById('front-board-title').innerText = `🏆 ${themeName} 榜`; 
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=get&theme=${currentTheme}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; 
                if (!board || board.length === 0) { listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1
