<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROCK 老師的英文遊戲廳</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #00cec9; --bg: #f1f2f6; --text: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); margin: 0; padding: 0;
            min-height: 100dvh; font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text); overflow-x: hidden;
        }

        /* ✨ 漂浮的音樂控制按鈕 */
        .sound-toggle {
            position: fixed; top: 20px; right: 20px;
            background: white; border: 3px solid #dfe6e9; border-radius: 50px;
            padding: 10px 20px; font-size: 18px; font-weight: 900;
            cursor: pointer; font-family: 'Quicksand', sans-serif; color: #2d3436;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.2s;
        }
        .sound-toggle:hover { transform: scale(1.05); border-color: var(--primary); }
        .sound-toggle:active { transform: scale(0.95); }

        .header-title {
            text-align: center; margin-bottom: 40px; animation: float 3s ease-in-out infinite;
        }
        .header-title h1 {
            font-size: 50px; color: var(--primary); margin: 0; text-shadow: 2px 2px 0px #dfe6e9;
        }
        .header-title p {
            font-size: 20px; color: #636e72; margin-top: 10px; font-weight: 700;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .game-container {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; padding: 0 20px; z-index: 10;
        }

        /* 遊戲卡片設計 */
        .game-card {
            background: white; border-radius: 25px; padding: 30px; width: 350px;
            text-align: center; text-decoration: none; color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid transparent;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }

        .game-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }

        .card-1:hover { border-color: var(--primary); }
        .card-1 .game-icon { background: #a29bfe; color: white; }
        .card-1 .play-btn { background: var(--primary); }

        .card-2:hover { border-color: var(--secondary); }
        .card-2 .game-icon { background: #81ecec; color: white; }
        .card-2 .play-btn { background: var(--secondary); }

        .game-icon {
            font-size: 60px; width: 120px; height: 120px; line-height: 120px;
            border-radius: 50%; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .game-title { font-size: 28px; font-weight: 900; margin: 0 0 10px 0; }
        .game-desc { font-size: 16px; color: #636e72; font-weight: 700; margin-bottom: 25px; line-height: 1.5; flex-grow: 1; }

        .play-btn {
            color: white; padding: 12px 40px; font-size: 22px; border-radius: 50px;
            font-weight: 900; box-shadow: 0 5px 0 rgba(0,0,0,0.2); width: 100%; transition: 0.1s;
        }
        .game-card:active .play-btn { transform: translateY(5px); box-shadow: 0 0 0 rgba(0,0,0,0.2); }

        @media (max-width: 768px) {
            .sound-toggle { top: 10px; right: 10px; font-size: 14px; padding: 8px 15px; }
            .header-title h1 { font-size: 40px; margin-top: 50px; }
            .game-container { flex-direction: column; align-items: center; gap: 20px; margin-bottom: 40px;}
            .game-card { width: 100%; max-width: 350px; padding: 25px; }
            .game-icon { font-size: 50px; width: 100px; height: 100px; line-height: 100px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="arcade.mp3" loop></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound()">🔇 音樂: 讀取中...</button>

    <div class="header-title">
        <h1>🎮 ROCK's Arcade</h1>
        <p>Choose your challenge! 選擇你要挑戰的關卡</p>
    </div>

    <div class="game-container">
        
        <a href="wordhunt.html" class="game-card card-1">
            <div class="game-icon">⚡</div>
            <h2 class="game-title">Word Hunt</h2>
            <p class="game-desc">極速單字尋寶！<br>在眼花撩亂的字母牆中找出目標單字，速度越快加成越高！</p>
            <div class="play-btn">PLAY NOW</div>
        </a>

        <a href="er.html" class="game-card card-2">
            <div class="game-icon">🏥</div>
            <h2 class="game-title">Dr. ROCK's ER</h2>
            <p class="game-desc">怪醫黑傑克急診室！<br>My foot hurts? 瞬間判斷單複數動詞，拯救病患！</p>
            <div class="play-btn">PLAY NOW</div>
        </a>

    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const soundBtn = document.getElementById('sound-btn');
        let isPlaying = false;

        // ✨ 網頁載入時，發動「自動播放嘗試」魔法
        window.onload = function() {
            bgm.volume = 0.5;
            let playPromise = bgm.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 瀏覽器超乖，允許自動播放！
                    isPlaying = true;
                    soundBtn.innerHTML = "🔊 音樂：開";
                    soundBtn.style.borderColor = "var(--success)";
                }).catch(error => {
                    // 瀏覽器擋下來了，沒關係，我們把按鈕變成提示狀態
                    isPlaying = false;
                    soundBtn.innerHTML = "🔇 音樂：關 (點擊播放)";
                    soundBtn.style.borderColor = "var(--error)";
                });
            }
        };

        // 按鈕點擊切換音樂
        function toggleSound() {
            if (isPlaying) {
                bgm.pause();
                isPlaying = false;
                soundBtn.innerHTML = "🔇 音樂：關";
                soundBtn.style.borderColor = "var(--error)";
            } else {
                bgm.play().then(() => {
                    isPlaying = true;
                    soundBtn.innerHTML = "🔊 音樂：開";
                    soundBtn.style.borderColor = "var(--success)";
                }).catch(e => console.log("播放失敗:", e));
            }
        }

        // 為了確保手機端體驗，點擊畫面任何地方(除了卡片)，如果音樂還沒播就幫他播
        document.body.addEventListener('click', function(e) {
            // 如果點擊的是遊戲卡片或音樂按鈕，就不要重複觸發
            if (e.target.closest('.game-card') || e.target.closest('#sound-btn')) return;
            
            if (!isPlaying) {
                toggleSound();
            }
        });
    </script>
</body>
</html>
