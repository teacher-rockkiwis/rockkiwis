<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROCK - 段考複習測驗網</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db; --secondary: #2980b9; --success: #2ecc71; --error: #e74c3c;
            --warning: #f39c12; --bg: #ecf0f1; --text-dark: #2c3e50; --card-bg: #ffffff; --gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg); margin: 0; padding: 0;
            min-height: 100dvh; font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            color: var(--text-dark); display: flex; flex-direction: column; align-items: center;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 800px; padding: 20px; flex-grow: 1; }
        .active-screen { display: flex !important; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 主選單樣式 --- */
        .header-title { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .header-title h1 { font-size: 40px; color: var(--secondary); margin: 0; text-shadow: 2px 2px 0px #bdc3c7; }
        .header-title p { font-size: 18px; color: #7f8c8d; margin-top: 10px; font-weight: 700;}

        /* ✨ 前十名英雄榜 ✨ */
        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 3px solid var(--gold); }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--text-dark); text-align: center; font-size: 22px; font-weight: 900; background: var(--gold); border-radius: 10px; padding: 5px; }
        #front-leaderboard-list { max-height: 250px; overflow-y: auto; padding-right: 5px; } 
        #front-leaderboard-list::-webkit-scrollbar { width: 6px; } 
        #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } 
        #front-leaderboard-list::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 900; } .front-board-row:last-child { border-bottom: none; }
        .rank-top3 { color: var(--error); font-size: 18px;}

        /* ✨ 題數選擇器樣式 ✨ */
        .settings-panel {
            background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px;
            border: 2px dashed #bdc3c7; width: 100%; max-width: 400px; justify-content: center;
        }
        .settings-panel select {
            font-size: 18px; padding: 8px 15px; border-radius: 10px; border: 2px solid var(--primary);
            outline: none; font-family: 'Quicksand', 'Noto Sans TC'; font-weight: 900; color: var(--primary);
            background: #f1f2f6; cursor: pointer;
        }

        .name-input { font-size: 20px; padding: 12px 20px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 100%; max-width: 400px; outline: none; }

        .grade-container { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; justify-content: center; }
        .grade-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px; width: 100%; max-width: 360px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 8px solid var(--primary);
            display: flex; flex-direction: column; gap: 12px;
        }
        .grade-card.g5 { border-top-color: #9b59b6; }
        .grade-card h2 { margin: 0 0 10px 0; color: var(--text-dark); font-size: 26px; text-align: center; }

        .btn-unit {
            background: #f1f2f6; color: #2d3436; border: 2px solid #dfe6e9; padding: 15px;
            border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.2s;
            text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-unit:hover, .btn-unit.selected { background: white; border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .btn-unit:active { transform: translateY(0); }
        
        .grade-card.g5 .btn-unit:hover, .grade-card.g5 .btn-unit.selected { border-color: #9b59b6; }

        .btn-midterm {
            background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; border: none;
            padding: 16px; border-radius: 15px; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #d35400; transition: 0.1s; text-align: center; margin-top: 10px;
        }
        .btn-midterm:hover, .btn-midterm.selected { filter: brightness(1.1); transform: translateY(-3px); box-shadow: 0 9px 0 #d35400;}
        .btn-midterm:active { transform: translateY(6px); box-shadow: 0 0 0 #d35400; }

        .start-btn { background: var(--success); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #219150; transition: 0.1s; width: 100%; max-width: 400px; margin-top: 20px;}
        .start-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #219150; }

        /* --- 測驗區樣式 --- */
        .quiz-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .quiz-title { font-size: 18px; font-weight: 900; color: var(--secondary); background: white; padding: 8px 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .exit-btn { background: var(--error); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #c0392b; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #c0392b; }

        .progress-bar { width: 100%; height: 12px; background: #dfe6e9; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; width: 0%; background: var(--success); transition: width 0.3s ease; }

        .question-box {
            background: white; width: 100%; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); font-size: 24px; font-weight: 900;
            text-align: center; margin-bottom: 25px; line-height: 1.5; color: var(--text-dark);
            border-left: 6px solid var(--primary);
        }
        
        .q-type-badge {
            display: inline-block; background: #f1c40f; color: #2d3436; font-size: 14px;
            padding: 4px 10px; border-radius: 8px; margin-bottom: 10px; letter-spacing: 1px;
        }
        .q-type-badge.typing { background: #9b59b6; color: white; }
        .q-type-badge.listening { background: #e84393; color: white; }

        /* 🔊 聽力播放按鈕樣式 */
        .speak-btn {
            background: #e84393; color: white; border: none; padding: 10px 20px;
            font-size: 20px; border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 0 #b71540; transition: 0.1s; font-family: 'Quicksand', sans-serif;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px;
        }
        .speak-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #b71540; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .opt-btn {
            background: white; border: 3px solid #dfe6e9; color: var(--text-dark);
            padding: 15px 10px; font-size: 20px; font-weight: 900; border-radius: 15px;
            cursor: pointer; transition: 0.2s; word-wrap: break-word;
        }
        .opt-btn:active { transform: scale(0.97); }
        .opt-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--error); color: white; border-color: var(--error); }
        .opt-btn.disabled { pointer-events: none; opacity: 0.8; }

        /* 填空題輸入框 */
        input[type="text"]:focus { border-color: var(--warning); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }

        /* --- 彈窗共用樣式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; border-radius: 25px; padding: 30px; width: 100%; max-width: 500px;
            text-align: center; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--error); max-height: 85vh; overflow-y: auto;
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* 錯題彈窗特定樣式 */
        .modal-content.review-mode { border-color: var(--warning); text-align: left; padding: 20px; }
        .mistake-item { background: #f8f9fa; border-left: 5px solid var(--error); padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.05);}
        .mistake-q { font-weight: 900; margin-bottom: 10px; color: var(--text-dark); font-size: 18px; line-height: 1.4;}
        .mistake-ans { margin-bottom: 5px; font-size: 16px; font-weight: 700; }
        .mistake-rat { background: #e8f8f5; padding: 10px; border-radius: 8px; font-size: 15px; color: #27ae60; font-weight: 900; margin-top: 10px; line-height: 1.4;}
        
        .modal-title { font-size: 30px; color: var(--error); margin: 0 0 15px 0; text-align: center; }
        .modal-body { font-size: 18px; line-height: 1.6; color: #34495e; font-weight: 700; margin-bottom: 25px; text-align: left; background: #fdf2e9; padding: 15px; border-radius: 15px;}
        .next-btn {
            background: var(--primary); color: white; border: none; width: 100%; padding: 15px;
            font-size: 22px; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #2980b9;
        }
        .next-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #2980b9; }

        /* --- 結算畫面 --- */
        .result-box {
            background: white; border-radius: 25px; padding: 30px 40px; width: 100%; max-width: 500px;
            text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.1); margin-top: 20px;
        }
        .result-score { font-size: 80px; font-weight: 900; color: var(--primary); margin: 10px 0; text-shadow: 3px 3px 0 #dfe6e9;}
        .result-rank { font-size: 30px; font-weight: 900; margin-bottom: 20px; color: var(--warning); }
        
        .review-btn {
            background: var(--warning); color: #2d3436; border: none; padding: 15px 20px;
            font-size: 20px; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #d35400;
            margin-bottom: 15px; width: 100%; transition: 0.1s;
        }
        .review-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #d35400; }

        .home-btn {
            background: var(--success); color: white; border: none; padding: 15px 20px;
            font-size: 20px; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #27ae60;
            width: 100%; transition: 0.1s;
        }
        .home-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #27ae60; }

        @media (max-width: 768px) {
            .header-title h1 { font-size: 32px; }
            .grade-card { padding: 20px; }
            .question-box { font-size: 20px; padding: 20px; }
            .opt-btn { font-size: 18px; padding: 12px 10px; }
            .options-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

    <!-- 主選單 -->
    <div id="screen-menu" class="screen active-screen">
        <div class="header-title">
            <h1 style="cursor: pointer;" onclick="location.href='index.html'">🔙 ROCK 段考複習網</h1>
            <p>選擇關卡後，點擊最下方按鈕開始測驗！</p>
        </div>

        <!-- ✨ 英雄榜 ✨ -->
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 選擇關卡查看前十名</h3>
            <div id="front-leaderboard-list">
                <div style="text-align:center; font-size:14px; color:#636e72;">點擊下方單元即可載入英雄榜！</div>
            </div>
        </div>

        <!-- 玩家姓名與題數 -->
        <input type="text" id="player-name" class="name-input" placeholder="👉 請輸入你的姓名..." autocomplete="off" maxlength="12">
        <div class="settings-panel">
            <label style="font-size: 18px; font-weight: 900; color: var(--text-dark);">⚙️ 選擇題數：</label>
            <select id="question-count">
                <option value="10">10 題</option>
                <option value="15">15 題</option>
                <option value="20" selected>20 題</option>
                <option value="25">25 題</option>
                <option value="50">50 題 (極限挑戰)</option>
            </select>
        </div>

        <div class="grade-container">
            <!-- 四年級 -->
            <div class="grade-card">
                <h2>📘 四年級 (Grade 4)</h2>
                <button class="btn-unit" id="btn-g4u1" onclick="selectTheme('g4u1')">
                    <span>L1: Where are you? (房間)</span><span>▶</span>
                </button>
                <button class="btn-unit" id="btn-g4u2" onclick="selectTheme('g4u2')">
                    <span>L2: What are you doing?</span><span>▶</span>
                </button>
                <button class="btn-midterm" id="btn-g4mid" onclick="selectTheme('g4mid')">🏆 四年級 期中考總複習</button>
            </div>

            <!-- 五年級 -->
            <div class="grade-card g5">
                <h2>📙 五年級 (Grade 5)</h2>
                <button class="btn-unit" id="btn-g5u1" onclick="selectTheme('g5u1')">
                    <span>L1: hurt vs hurts (身體)</span><span>▶</span>
                </button>
                <button class="btn-unit" id="btn-g5u2" onclick="selectTheme('g5u2')">
                    <span>L2: have vs has (生病)</span><span>▶</span>
                </button>
                <button class="btn-midterm" id="btn-g5mid" onclick="selectTheme('g5mid')">🏆 五年級 期中考總複習</button>
            </div>
        </div>
        
        <button class="start-btn" onclick="startGame()">🚀 開始測驗！</button>
    </div>

    <!-- 測驗畫面 -->
    <div id="screen-quiz" class="screen">
        <div class="quiz-header">
            <div class="quiz-title" id="quiz-title-display">測驗載入中...</div>
            <button class="exit-btn" onclick="showMenu()">放棄測驗</button>
        </div>
        
        <div style="width:100%; text-align:right; font-weight:900; color:#7f8c8d; margin-bottom:5px;" id="q-counter">Q: 1 / 10</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="question-box" id="question-text">
            題目載入中...
        </div>

        <div class="options-grid" id="options-container">
            <!-- 選項會動態產生在這裡 -->
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="screen-result" class="screen">
        <div class="result-box">
            <h2 style="margin:0; color:#2c3e50; font-size: 30px;">測驗完成！</h2>
            <div class="result-score" id="result-score">100</div>
            <div class="result-rank" id="result-rank">S 級學霸</div>
            <p style="color:#7f8c8d; font-weight:700; font-size:18px; margin-bottom: 20px;" id="result-feedback">成績已自動上傳至英雄榜！</p>
            
            <button class="review-btn" onclick="showMistakes()">📝 查看錯題與解析</button>
            <button class="home-btn" onclick="showMenu()">🔙 回首頁查看排名</button>
        </div>
    </div>

    <!-- 即時解析彈窗 (答錯時顯示) -->
    <div class="modal-overlay" id="rationale-modal">
        <div class="modal-content">
            <div class="modal-title">❌ 哎呀，答錯了！</div>
            <div class="modal-body">
                <strong style="color:var(--primary);">💡 觀念解析：</strong><br>
                <span id="rationale-text">這裡會顯示文法解析...</span>
            </div>
            <button class="next-btn" onclick="nextQuestion()">了解！下一題 👉</button>
        </div>
    </div>

    <!-- 錯題總複習彈窗 -->
    <div class="modal-overlay" id="mistake-review-modal">
        <div class="modal-content review-mode">
            <h2 style="color:var(--warning); text-align:center; margin-top:0; font-size:28px;">📝 錯題總複習</h2>
            <div id="mistake-list-container">
                <!-- 錯題內容將會動態生成於此 -->
            </div>
            <button class="next-btn" style="background:#7f8c8d; box-shadow:0 5px 0 #34495e; margin-top: 15px;" onclick="closeMistakes()">關閉解析</button>
        </div>
    </div>

    <script>
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";
        let userIP = "Unknown";

        // ✨ 全局文字轉語音 (Text-to-Speech) 播放功能 ✨
        window.speakWord = function(text, event) {
            if(event) {
                event.stopPropagation();
                event.preventDefault();
            }
            
            // 取消正在播放的語音
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; // 美式發音
                utterance.rate = 0.85;     // 稍微放慢速度，適合小學生
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("很抱歉，你的瀏覽器不支援發音功能喔！");
            }
        };

        // 📚 終極海量題庫資料 (已更新 G4 U1 th 與 所有單元的聽力測驗)
        const quizData = {
            "g4u1": [
                // ===== 文法題 (Be 動詞 & 介系詞) =====
                { type: "文法", q: "A: Where is your brother?<br>B: He ____ in the bedroom.", opts: ["is", "are", "am"], ans: "is", rationale: "He (他) 是第三人稱單數，搭配的 be 動詞必須是 is。are 只能配 you/we/they，am 專屬於 I。" },
                { type: "文法", q: "Where ____ you?", opts: ["are", "is", "am"], ans: "are", rationale: "主詞是 you (你/你們)，在英文中 you 永遠搭配 be 動詞 are。" },
                { type: "文法", q: "Where ____ they?", opts: ["are", "is", "am"], ans: "are", rationale: "主詞是 they (他們/牠們/它們)，代表複數，複數主詞一律搭配 are。" },
                { type: "文法", q: "Where ____ she?", opts: ["is", "are", "am"], ans: "is", rationale: "主詞是 she (她)，第三人稱單數搭配 is。" },
                { type: "文法", q: "I ____ in the living room.", opts: ["am", "is", "are"], ans: "am", rationale: "主詞是 I (我)，am 是 I 的專屬 be 動詞夥伴！" },
                { type: "文法", q: "Where ____ Tom and Mary?", opts: ["are", "is", "am"], ans: "are", rationale: "Tom and Mary 是兩個人(複數)，只要大於等於兩個人，be 動詞就要用 are。" },
                { type: "文法", q: "____ your sister in the kitchen?", opts: ["Is", "Are", "Am"], ans: "Is", rationale: "這是一個疑問句。主詞 your sister (你的妹妹/姐姐) 是單數(她)，所以開頭的 be 動詞要用 Is。" },
                { type: "文法", q: "____ the dogs in the yard?", opts: ["Are", "Is", "Am"], ans: "Are", rationale: "dogs 字尾有加 s，代表是複數(很多隻狗)，複數主詞的疑問句開頭要用 Are。" },
                { type: "文法", q: "A: Are they in the dining room?<br>B: Yes, ____.", opts: ["they are", "we are", "they aren't"], ans: "they are", rationale: "英文問答規則「怎麼問就怎麼答」。用 Are they 問，肯定回答就是 Yes, they are。" },
                { type: "文法", q: "The cat is ____ the table.", opts: ["under", "in", "on"], ans: "under", rationale: "貓咪通常會躲在桌子「下面」，介系詞要用 under (在...下面)。" },
                { type: "文法", q: "Mom is ____ the kitchen.", opts: ["in", "on", "under"], ans: "in", rationale: "在一個立體的空間(如房間)「裡面」，介系詞要使用 in (在...裡面)。" },
                { type: "文法", q: "____ are you? I'm in the yard.", opts: ["Where", "What", "Who"], ans: "Where", rationale: "答句說 I'm in the yard (我在庭院裡)，回答的是「地點」，所以問句必須用 Where (哪裡) 發問。" },
                
                // ===== 單字選擇與邏輯分類 =====
                { type: "單字", q: "「客廳」的英文是？", opts: ["living room", "bedroom", "bathroom", "kitchen"], ans: "living room", rationale: "living room 是客廳。bedroom(臥室)、bathroom(浴室)、kitchen(廚房)。" },
                { type: "單字", q: "「廚房」的英文是？", opts: ["kitchen", "dining room", "balcony", "garage"], ans: "kitchen", rationale: "kitchen 是廚房。dining room 是飯廳。" },

        let currentTheme = "";

        window.onload = function() {
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function showMenu() {
            switchScreen('screen-menu');
        }

        function selectTheme(themeId) {
            document.querySelectorAll('.btn-unit, .btn-midterm').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-' + themeId).classList.add('selected');
            
            currentTheme = themeId;
            let themeName = document.getElementById('btn-' + themeId).innerText.split(':')[0].replace('🏆 ', '').replace('▶', '').trim();
            if(themeId.includes('mid')) themeName = document.getElementById('btn-' + themeId).innerText.replace('🏆 ', '');
            
            document.getElementById('front-board-title').innerText = `🏆 ${themeName} 前十名`;
            const listDiv = document.getElementById('front-leaderboard-list');
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=get&theme=exam-${currentTheme}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; 
                if (!board || board.length === 0) { 
                    listDiv.innerHTML = "<div style='text-align:center; font-size:14px; padding:10px;'>目前無紀錄，搶下榜首吧！</div>"; 
                    return; 
                }
                board.slice(0, 10).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    let rankClass = i < 3 ? 'rank-top3' : '';
                    listDiv.innerHTML += `<div class='front-board-row ${rankClass}'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score}</span></div>`; 
                });
            }).catch(e => { listDiv.innerHTML = "<div style='text-align:center; color:var(--error); font-size:14px;'>排行榜連線失敗 😢</div>"; });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("⚠️ 請先輸入你的姓名喔！"); return; }
            if(currentTheme === "") { alert("⚠️ 請先點擊選擇一個【挑戰關卡】！"); return; }

            let fullQuizPool = [];
            let title = "";

            if (currentTheme === 'g4u1') { fullQuizPool = [...quizData["g4u1"]]; title = "G4 L1: 房間與位置"; }
            else if (currentTheme === 'g4u2') { fullQuizPool = [...quizData["g4u2"]]; title = "G4 L2: 現在進行式"; }
            else if (currentTheme === 'g5u1') { fullQuizPool = [...quizData["g5u1"]]; title = "G5 L1: 身體與 hurt/hurts"; }
            else if (currentTheme === 'g5u2') { fullQuizPool = [...quizData["g5u2"]]; title = "G5 L2: 生病與 have/has"; }
            else if (currentTheme === 'g4mid') { fullQuizPool = [...quizData["g4u1"], ...quizData["g4u2"]]; title = "🏆 四年級 期中考總複習"; }
            else if (currentTheme === 'g5mid') { fullQuizPool = [...quizData["g5u1"], ...quizData["g5u2"]]; title = "🏆 五年級 期中考總複習"; }

            selectedQuestionCount = parseInt(document.getElementById('question-count').value);
            shuffleArray(fullQuizPool);
            
            if (fullQuizPool.length > selectedQuestionCount) {
                currentQuizList = fullQuizPool.slice(0, selectedQuestionCount);
            } else {
                currentQuizList = [...fullQuizPool];
            }

            document.getElementById('quiz-title-display').innerText = title;
            currentQuestionIndex = 0;
            score = 0;
            mistakeLog = []; 
            
            switchScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            // 切換題目時，確保停止任何正在發音的語音
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            const qData = currentQuizList[currentQuestionIndex];
            const totalQ = currentQuizList.length;
            
            document.getElementById('q-counter').innerText = `Q: ${currentQuestionIndex + 1} / ${totalQ}`;
            const progressPct = ((currentQuestionIndex) / totalQ) * 100;
            document.getElementById('progress-fill').style.width = `${progressPct}%`;

            let badgeType = "q-type-badge";
            if (qData.type && qData.type.includes("填空")) badgeType += " typing";
            if (qData.type && qData.type.includes("聽力")) badgeType += " listening";

            let badgeHtml = qData.type ? `<span class="${badgeType}">${qData.type}</span><br>` : "";
            document.getElementById('question-text').innerHTML = badgeHtml + qData.q;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            if (qData.opts && qData.opts.length > 0) {
                // 一般選擇題 / 是非題
                let shuffledOpts = [...qData.opts];
                shuffleArray(shuffledOpts);

                shuffledOpts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerHTML = opt; 
                    btn.onclick = () => checkAnswer(btn, opt, qData.ans, qData.rationale);
                    optionsContainer.appendChild(btn);
                });
            } else {
                // ✨ 填空題輸入框 UI ✨
                const div = document.createElement('div');
                div.style.gridColumn = "span 2";
                div.style.display = "flex";
                div.style.flexDirection = "column";
                div.style.gap = "10px";
                div.innerHTML = `
                    <input type="text" id="text-ans" placeholder="輸入英文答案 (注意拼字與空格)..." style="font-size:24px; padding:15px; border-radius:15px; border:3px solid var(--primary); text-align:center; font-family:'Quicksand'; font-weight:900; outline:none; text-transform: lowercase;">
                    <button class="opt-btn" id="text-submit-btn" style="background:var(--secondary); color:white; border-color:var(--secondary);" onclick="checkTextAnswer()">送出答案</button>
                `;
                optionsContainer.appendChild(div);
                
                setTimeout(() => {
                    const txt = document.getElementById('text-ans');
                    if(txt) {
                        txt.focus();
                        txt.addEventListener('keypress', function(e) {
                            if(e.key === 'Enter') checkTextAnswer();
                        });
                    }
                }, 100);
            }
        }

        // 選擇題判斷
        function checkAnswer(btn, selectedOpt, correctAns, rationale) {
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => b.classList.add('disabled'));

            if (selectedOpt === correctAns) {
                btn.classList.add('correct');
                score += (100 / currentQuizList.length);
                setTimeout(nextQuestion, 800); 
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if (b.innerHTML === correctAns || b.innerText === correctAns) b.classList.add('correct');
                });
                
                mistakeLog.push({
                    q: currentQuizList[currentQuestionIndex].q,
                    userAns: selectedOpt,
                    correctAns: correctAns,
                    rationale: rationale
                });

                document.getElementById('rationale-text').innerHTML = rationale;
                setTimeout(() => {
                    document.getElementById('rationale-modal').style.display = 'flex';
                }, 800);
            }
        }

        // 填空題判斷
        function checkTextAnswer() {
            const inputEl = document.getElementById('text-ans');
            const submitBtn = document.getElementById('text-submit-btn');
            if (inputEl.disabled) return;
            
            inputEl.disabled = true;
            submitBtn.classList.add('disabled');

            const qData = currentQuizList[currentQuestionIndex];
            const correctAns = qData.ans;
            const rationale = qData.rationale;
            
            const userAns = inputEl.value.trim().toLowerCase();
            const correct = correctAns.toLowerCase();

            if (userAns === correct) {
                inputEl.style.backgroundColor = "var(--success)";
                inputEl.style.color = "white";
                score += (100 / currentQuizList.length);
                setTimeout(nextQuestion, 800);
            } else {
                inputEl.style.backgroundColor = "var(--error)";
                inputEl.style.color = "white";
                
                mistakeLog.push({
                    q: qData.q,
                    userAns: userAns || "(未作答)",
                    correctAns: correctAns,
                    rationale: rationale
                });

                document.getElementById('rationale-text').innerHTML = rationale;
                setTimeout(() => {
                    document.getElementById('rationale-modal').style.display = 'flex';
                }, 800);
            }
        }

        function nextQuestion() {
            document.getElementById('rationale-modal').style.display = 'none';
            currentQuestionIndex++;

            if (currentQuestionIndex < currentQuizList.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('progress-fill').style.width = `100%`;
            
            setTimeout(() => {
                switchScreen('screen-result');
                let finalScore = Math.round(score);
                document.getElementById('result-score').innerText = finalScore;

                let rank = ""; let color = "";

                if (finalScore === 100) { rank = "🌟 S 級學霸"; color = "#f39c12"; } 
                else if (finalScore >= 80) { rank = "🚀 A 級高手"; color = "#2ecc71"; } 
                else if (finalScore >= 60) { rank = "👍 B 級勇者"; color = "#3498db"; } 
                else { rank = "💪 C 級新手"; color = "#e74c3c"; }

                const rankEl = document.getElementById('result-rank');
                rankEl.innerText = rank; rankEl.style.color = color;
                document.getElementById('result-score').style.color = color;
                
                const playerName = document.getElementById('player-name').value.trim();
                document.getElementById('result-feedback').innerText = "📡 正在上傳成績...";
                
                fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${finalScore}&time=${selectedQuestionCount}Qs&theme=exam-${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                    document.getElementById('result-feedback').innerText = "✅ 成績已成功上傳至英雄榜！";
                    selectTheme(currentTheme);
                }).catch(() => {
                    document.getElementById('result-feedback').innerText = "❌ 網路不穩，上傳失敗。";
                });

            }, 500);
        }

        function showMistakes() {
            const container = document.getElementById('mistake-list-container');
            
            if (mistakeLog.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:30px 10px; font-size:24px; color:var(--success); font-weight:900;'>太神啦！<br>你這回合沒有任何錯題！🎉</div>";
            } else {
                container.innerHTML = mistakeLog.map((m, i) => `
                    <div class="mistake-item">
                        <div class="mistake-q">Q${i+1}. ${m.q}</div>
                        <div class="mistake-ans"><span style="color:var(--error);">❌ 你的答案：${m.userAns}</span></div>
                        <div class="mistake-ans"><span style="color:var(--success);">✅ 正確答案：${m.correctAns}</span></div>
                        <div class="mistake-rat">💡 解析：${m.rationale}</div>
                    </div>
                `).join('');
            }
            
            document.getElementById('mistake-review-modal').style.display = 'flex';
        }

        function closeMistakes() {
            document.getElementById('mistake-review-modal').style.display = 'none';
        }
    </script>
</body>
</html>
