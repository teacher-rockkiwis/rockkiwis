<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dr. ROCK - Phonics Ninja</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c0392b; --secondary: #e74c3c; --success: #27ae60; --error: #c0392b;
            --bg: #2c3e50; --text-light: #ecf0f1; --gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; outline: none; }
        body, html {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            overscroll-behavior-x: none; overscroll-behavior-y: none;
        }

        #game-canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; }

        .sound-toggle {
            position: fixed; top: max(15px, env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.9);
            border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px;
            font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; transition: 0.2s;
        }
        .exit-btn {
            position: fixed; top: max(15px, env(safe-area-inset-top)); left: 15px; background: rgba(231,76,60,0.9);
            color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #c0392b;
        }

        #ui-layer {
            position: absolute; top: max(75px, env(safe-area-inset-top) + 60px); left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 20; pointer-events: none;
        }
        .hud-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 15px; border: 2px solid #7f8c8d; color: white; text-align: center; }
        #score-display { font-size: 30px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #lives-display { font-size: 24px; letter-spacing: 2px; }
        #combo-hud { font-size: 20px; font-weight: 900; color: #3498db; margin-top: 5px; transition: 0.2s; }
        .combo-active { color: var(--gold) !important; text-shadow: 0 0 15px var(--gold); transform: scale(1.2); display: inline-block;}

        #word-prompt {
            position: absolute; top: max(160px, env(safe-area-inset-top) + 150px); left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #2d3436; padding: 10px 30px;
            border-radius: 50px; font-size: 24px; font-weight: 900; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary);
            display: none; align-items: center; gap: 10px; pointer-events: auto; cursor: pointer;
        }
        .replay-btn { background: var(--gold); color: #2d3436; font-size: 14px; padding: 4px 10px; border-radius: 20px; }

        /* Overlays */
        #start-overlay, #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 60000; overflow-y: auto; padding: 20px; background: rgba(44, 62, 80, 0.95);
        }
        #end-msg { display: none; text-align: center; }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 22px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #922b21; transition: 0.1s;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #922b21; }
        .fs-btn { background: var(--success); box-shadow: 0 6px 0 #1e8449; }
        .fs-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #1e8449; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        /* ✨ 終極修正：強制指定顏色與外觀，解決 iOS Safari 白底白字的問題 ✨ */
        select.theme-select { 
            width: 100%; font-size: 16px; padding: 12px 15px; border-radius: 15px; 
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; margin-bottom: 20px;
            color: #2c3e50; background-color: #ffffff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px;
        }
        select.theme-select option, select.theme-select optgroup { color: #2c3e50; background-color: #ffffff; }

        /* ✨ 新增錯誤提示訊息樣式 ✨ */
        #error-msg { display: none; color: #ffcccc; font-weight: 900; margin-bottom: 15px; background: rgba(255, 71, 87, 0.9); padding: 10px 20px; border-radius: 20px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        #fever-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(241, 196, 15, 0); pointer-events: none; z-index: 5; transition: 0.3s;
        }
        .fever-active { box-shadow: inset 0 0 150px rgba(241, 196, 15, 0.6) !important; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { box-shadow: inset 0 0 100px rgba(241, 196, 15, 0.4); } 100% { box-shadow: inset 0 0 200px rgba(230, 126, 34, 0.8); } }

        #portrait-warning { display: none; }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #portrait-warning {
                display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(44, 62, 80, 0.98); z-index: 99999; color: white;
                flex-direction: column; justify-content: center; align-items: center;
                font-size: 24px; font-weight: bold; text-align: center; padding: 20px;
            }
        }

        @media screen and (max-width: 900px), screen and (max-height: 600px) {
            .sound-toggle { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); right: 5px; }
            .exit-btn { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); left: 5px; }
            
            #ui-layer { top: max(45px, env(safe-area-inset-top) + 35px); padding: 0 10px; }
            .hud-box { padding: 5px 10px; border-radius: 10px; border-width: 2px; }
            
            .hud-box > div:first-child { font-size: 10px !important; }
            #score-display { font-size: 20px; }
            #lives-display { font-size: 16px; letter-spacing: 0; }
            #combo-hud { font-size: 12px; margin-top: 2px; }

            #word-prompt {
                top: max(45px, env(safe-area-inset-top) + 35px); 
                padding: 5px 15px; font-size: 14px; border-width: 2px;
            }
            .replay-btn { font-size: 11px; padding: 2px 8px; }
            
            #start-overlay h1 { font-size: 36px; margin-bottom: 5px; margin-top: 10px; }
            .start-btn { font-size: 18px; padding: 12px 20px; margin-bottom: 10px;}
            
            #end-msg h1 { font-size: 30px !important; margin-top: 5px !important; }
            .result-panel { padding: 10px !important; margin: 5px 0 !important; width: 95%; }
            #final-total-display { font-size: 32px !important; }
            #leaderboard-list { max-height: 100px !important; }
            .board-row { padding: 4px 5px !important; font-size: 14px !important; }
            #end-msg button { padding: 8px 30px !important; font-size: 18px !important; margin-bottom: 5px !important; }
        }

</head>

    <div id="start-overlay">

        </div>

        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入忍者尊姓大名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
            <option value="" disabled selected hidden>▼ 請先選擇挑戰關卡...</option>
            <optgroup label="四年級 (Grade 4)">
                <option value="ninja-g4-th">👅 L1: 無聲與有聲 [th] 大對決</option>
                <option value="ninja-g4-ng-nk">🎵 L2: [ng] 與 [nk] 尾音斬擊</option>

            </optgroup>
        </select>

        <div class="btn-group">

    </div>

        class Target {
            constructor(x, y, vx, vy, text, isCorrect, isRock = false) {
                this.x = x; this.y = y; 
                this.vx = vx; 
                this.vy = vy;
                this.text = text; this.isCorrect = isCorrect;
                this.isRock = isRock; 
                
                let isSmallScreen = window.innerWidth < 768 || window.innerHeight < 500;
                this.radius = isSmallScreen ? 32 : 45;
                this.fontSize = isSmallScreen ? 24 : 36;
                
                this.sliced = false;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.08;
                
                if (this.isRock) {
                    this.gravity = 0.01; 
                    this.radius += 5; 
                    this.color = "#f1c40f";
                } else {
                    this.gravity = 0.18 * speedMult; 
                    this.color = isCorrect ? "#34495e" : "#8e44ad"; 
                    if(Math.random() > 0.7) this.color = "#d35400"; 
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (!this.isRock) {
                    if (Math.abs(this.vy) < 2.0 * speedMult) {
                        this.vy += this.gravity * (0.2 * speedMult); 
                    } else {
                        this.vy += this.gravity;
                    }
                } else {
                    this.vy += this.gravity;
                }
                
                this.rotation += this.rotSpeed;
            }
            draw(ctx) {
                if(this.sliced) return; 
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.isRock) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "#f1c40f";
                }

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isRock ? "#fff3cd" : "#ecf0f1"; 
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = this.color;
                ctx.stroke();

                ctx.fillStyle = this.isRock ? "#e67e22" : "#2c3e50";
                ctx.font = `bold ${this.fontSize}px Quicksand`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, 0, 2);
                
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.03; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class FloatText {
            constructor(x, y, text, color, isBig = false) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -2; this.isBig = isBig;
            }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                let size = this.isBig ? (window.innerWidth < 768 ? 30 : 40) : (window.innerWidth < 768 ? 20 : 26);
                ctx.font = `bold ${size}px Quicksand`;
                ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y);
                ctx.lineWidth = 1; ctx.strokeStyle = "white"; ctx.strokeText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function setupInputHandling() {
            canvas.addEventListener('pointerdown', (e) => {
                let path = [{x: e.clientX, y: e.clientY, age: 0}];
                activeTouches[e.pointerId] = { path: path, hits: 0 };
                allPaths.push(path);
                checkSlice(e.clientX, e.clientY, e.pointerId);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!activeTouches[e.pointerId]) return;
                activeTouches[e.pointerId].path.push({x: e.clientX, y: e.clientY, age: 0});
                checkSlice(e.clientX, e.clientY, e.pointerId);
            });

            const endPointer = (e) => { delete activeTouches[e.pointerId]; };

            canvas.addEventListener('pointerup', endPointer);
            canvas.addEventListener('pointercancel', endPointer);
            canvas.addEventListener('pointerout', endPointer);
        }

        function checkSlice(x, y, pointerId) {
            if(!isPlaying) return;
            let touchInfo = activeTouches[pointerId];
            if (!touchInfo) return;

            for (let i = 0; i < targets.length; i++) {
                let t = targets[i];
                if (t.sliced) continue;

                let dx = x - t.x; let dy = y - t.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist <= t.radius) {
                    t.sliced = true;
                    
                    if (t.isRock) {
                        createExplosion(t.x, t.y, "#f1c40f");
                        playAudio(sfxCombo, true);
                        let earned = 1000 * multiplier; 
                        score += earned;
                        floatTexts.push(new FloatText(t.x, t.y, `+${earned} ROCK!`, "#f1c40f", true));
                        updateGameSpeed(); 
                        continue; 
                    }

                    createExplosion(t.x, t.y, t.isCorrect ? "#2ecc71" : "#e74c3c");
                    if (t.isCorrect) {
                        playAudio(sfxBlade);
                        touchInfo.hits++; 
                        combo++; updateMultiplier();
                        
                        let basePts = 10;
                        if (touchInfo.hits >= 3) {
                            playAudio(sfxCombo, false);
                            basePts += 20; 
                            floatTexts.push(new FloatText(t.x, t.y - 30, "COMBO!", "#f1c40f", true));
                        }
                        
                        let earned = basePts * multiplier;
                        score += earned;
                        floatTexts.push(new FloatText(t.x, t.y, `+${earned}`, "#2ecc71"));
                        updateGameSpeed(); 
                        
                    } else {
                        playAudio(sfxWrong);
                        breakCombo(true); 
                        lives--;
                        floatTexts.push(new FloatText(t.x, t.y, "WRONG!", "#e74c3c", true));
                        updateGameSpeed();
                        if (lives <= 0) endGame();
                    }
                }
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) { particles.push(new Particle(x, y, color)); particles.push(new Particle(x, y, "#ecf0f1")); }
        }

        function updateGameSpeed() {
            if (score >= 20000) speedMult = 2.2;
            else if (score >= 10000) speedMult = 1.8;
            else if (score >= 5000) speedMult = 1.5;
            else if (score >= 2000) speedMult = 1.2;
            else speedMult = 1.0;

            updateMultiplier();
        }

        function updateMultiplier() {
            if (combo >= 10) { 
                if (!isFever) triggerFever();
                multiplier = 20; 
            } 
            else if (combo >= 6) { multiplier = 3; } 
            else if (combo >= 3) { multiplier = 2; } 
            else { multiplier = 1; }
            updateHUD();
        }

        function triggerFever() {
            if (!isFever) {
                bgm.pause();
                playAudio(sfxBuff, true); 
            }
            isFever = true; multiplier = 20; feverTimer = 10000; 
            document.getElementById('fever-overlay').classList.add('fever-active');
            document.getElementById('combo-hud').classList.add('combo-active');
        }

        function breakCombo(showFlash = true) {
            combo = 0; 
            multiplier = 1;
            
            if (isFever) {
                isFever = false;
                document.getElementById('fever-overlay').classList.remove('fever-active');
                document.getElementById('combo-hud').classList.remove('combo-active');
                
                sfxBuff.pause();
                sfxBuff.currentTime = 0;
                if (isPlaying && !isMuted) bgm.play().catch(e => {});
            }
            
            if (showFlash) {
                document.body.style.backgroundColor = "rgba(231, 76, 60, 0.4)";
                setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 150);
            }
            
            updateMultiplier();
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = score;
            let hearts = ""; for(let i=0; i<5; i++) { hearts += (i < lives) ? "❤️" : "🖤"; }
            document.getElementById('lives-display').innerText = hearts;
            
            const comboEl = document.getElementById('combo-hud');
            if(isFever) {
                comboEl.innerText = `🔥 FEVER x20 (Combo: ${combo}) 🔥`;
                comboEl.style.color = "#f1c40f";
            } else {
                comboEl.innerText = `${multiplier}x 倍率 (Combo: ${combo})`;
                if(multiplier > 1) comboEl.style.color = "#f1c40f"; else comboEl.style.color = "#3498db";
            }
        }

        function startGame(requestFullscreen) {
            const inputName = document.getElementById('player-name').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const themeSelect = document.getElementById('theme-select');
            
            errorMsg.style.display = "none";
            
            if(inputName === "") { errorMsg.innerText = "⚠️ 請輸入忍者姓名喔！"; errorMsg.style.display = "block"; return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { errorMsg.innerText = "⚠️ 請保持禮貌喔！😇"; errorMsg.style.display = "block"; return; }
            
            // ✨ 防呆機制：沒選關卡會跳錯 ✨
            if(themeSelect.value === "") { errorMsg.innerText = "⚠️ 請先選擇挑戰關卡！"; errorMsg.style.display = "block"; return; }
            
            if (requestFullscreen) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(e => console.log("旋轉鎖定失敗或不支援"));
                    }).catch(err => console.log("全螢幕請求失敗"));
                } else if (elem.webkitRequestFullscreen) { 
                    elem.webkitRequestFullscreen();
                } else {
                    alert("⚠️ 蘋果設備(iPhone/iPad) 限制說明 ⚠️\n\nSafari 不允許網頁自動全螢幕。\n💡 破解秘訣：\n1. 點擊上方網址列的「大小 (aA)」➔ 點選「隱藏工具列」\n2. 或點選下方分享按鈕 ➔「加入主畫面」(最完美！)\n\n設定好後再開始斬擊吧！");
                }
            }

            if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

            playerName = inputName; 
            currentTheme = themeSelect.value;
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('word-prompt').style.display = 'flex';
            
            score = 0; lives = 5; combo = 0; multiplier = 1; isFever = false; speedMult = 1.0;
            targets = []; particles = []; floatTexts = []; 
            activeTouches = {}; allPaths = []; 
            isPlaying = true; isSpawningPhase = false;

            updateHUD();
            document.getElementById('fever-overlay').classList.remove('fever-active');
            document.getElementById('combo-hud').classList.remove('combo-active');

            sfxBuff.pause();
            sfxBuff.currentTime = 0;

            bgm.volume = 0.5; playAudio(bgm);
            animationId = requestAnimationFrame(gameLoop);
        }

        function speakWord(word, callback) {
            try {
                if ('speechSynthesis' in window && !isMuted) {
                    bgm.volume = 0.2; 
                    const utterance = new SpeechSynthesisUtterance(word); 
                    utterance.lang = 'en-US'; utterance.rate = 0.85;
                    
                    let isFired = false;
                    const safeCallback = () => {
                        if (isFired) return;
                        isFired = true;
                        if(isPlaying) bgm.volume = 0.5; 
                        if(callback) callback();
                    };

                    utterance.onend = safeCallback;
                    utterance.onerror = (e) => { console.log("TTS錯誤", e); safeCallback(); };
                    
                    window.speechSynthesis.cancel(); 
                    window.speechSynthesis.speak(utterance);
                    
                    setTimeout(safeCallback, 2500); 
                } else {
                    if(callback) setTimeout(callback, 1000);
                }
            } catch(e) {
                console.log(e);
                if(callback) setTimeout(callback, 1000);
            }
        }

        function replayWord() {
            if(currentWordData) speakWord(currentWordData.word);
        }

        function launchWave() {
            if (width <= 0 || height <= 0) return; 
            isSpawningPhase = true;
            let bank = wordBanks[currentTheme];
            currentWordData = bank[Math.floor(Math.random() * bank.length)];
            
            speakWord(currentWordData.word, () => {
                if(!isPlaying) return;
                
                let correctCount = Math.floor(Math.random() * 3) + 3 + Math.floor(speedMult); 
                let wrongCount = 2;  

                let spawnList = [];
                for(let i=0; i<correctCount; i++) spawnList.push({ t: currentWordData.target, c: true });
                for(let i=0; i<wrongCount; i++) {
                    let dist = currentWordData.distractors[Math.floor(Math.random() * currentWordData.distractors.length)];
                    spawnList.push({ t: dist, c: false });
                }
                
                let sections = spawnList.length;
                let positions = [];
                for(let i=0; i<sections; i++) {
                    let sectionWidth = width / sections;
                    let px = (i * sectionWidth) + (sectionWidth / 2) + (Math.random() - 0.5) * (sectionWidth * 0.6);
                    positions.push(px);
                }
                positions.sort(() => Math.random() - 0.5);

                let baseInterval = 250;
                if (speedMult >= 2.0) baseInterval = 100;
                else if (speedMult >= 1.5) baseInterval = 150;
                else if (speedMult >= 1.2) baseInterval = 200;

                spawnList.forEach((item, index) => {
                    let startX = positions[index];
                    let startY = height + 50;
                    
                    let g = 0.18 * speedMult; 
                    let targetHeight = height * 0.75 + Math.random() * (height * 0.1); 
                    let vy = -Math.sqrt(2 * g * targetHeight);
                    let vx = (Math.random() - 0.5) * 0.8 * Math.sqrt(speedMult); 
                    
                    setTimeout(() => {
                        if(isPlaying) targets.push(new Target(startX, startY, vx, vy, item.t, item.c));
                    }, index * baseInterval); 
                });

                let eggChance = 0.005; 
                if (Math.random() < eggChance) {
                    let startLeft = Math.random() > 0.5;
                    let startX = startLeft ? -50 : width + 50;
                    let startY = height * 0.2 + Math.random() * (height * 0.3); 
                    let rockVx = (startLeft ? 1 : -1) * (width * 0.012 * speedMult); 
                    let rockVy = (Math.random() - 0.5) * 1.5; 
                    
                    setTimeout(() => {
                        if(isPlaying) targets.push(new Target(startX, startY, rockVx, rockVy, "ROCK", true, true));
                    }, Math.random() * 800); 
                }
                
                isSpawningPhase = false;
            });
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!isPlaying) return;
            resizeCanvas(); 
            
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            if (width <= 0 || height <= 0) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, width, height);

            if (isFever) {
                feverTimer -= dt;
                if (feverTimer <= 0) {
                    isFever = false;
                    document.getElementById('fever-overlay').classList.remove('fever-active');
                    document.getElementById('combo-hud').classList.remove('combo-active');
                    
                    sfxBuff.pause();
                    sfxBuff.currentTime = 0;
                    if (isPlaying && !isMuted) bgm.play().catch(e => {});

                    updateMultiplier();
                }
            }

            let activeTargets = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                t.update();
                t.draw(ctx);
                
                if (!t.sliced && (t.y > height + 100 || t.x < -100 || t.x > width + 100)) {
                    if (t.isCorrect && !t.isRock) breakCombo(false);
                    targets.splice(i, 1);
                } else if (!t.sliced) {
                    activeTargets = true;
                } else if (t.sliced) {
                    targets.splice(i, 1); 
                }
            }

            if (!activeTargets && !isSpawningPhase && targets.length === 0) launchWave();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                floatTexts[i].update(); floatTexts[i].draw(ctx);
                if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
            }

            drawBladePath();
            animationId = requestAnimationFrame(gameLoop);
        }

        function drawBladePath() {
            for (let i = allPaths.length - 1; i >= 0; i--) {
                let path = allPaths[i];
                
                if (path.length >= 2) {
                    ctx.beginPath();
                    ctx.moveTo(path[0].x, path[0].y);
                    for (let j = 1; j < path.length; j++) {
                        ctx.lineTo(path[j].x, path[j].y);
                    }
                    ctx.lineWidth = isFever ? 12 : 6;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.strokeStyle = isFever ? '#f39c12' : '#ecf0f1';
                    ctx.shadowBlur = 15; ctx.shadowColor = isFever ? '#f1c40f' : '#bdc3c7';
                    ctx.stroke(); ctx.shadowBlur = 0;
                }

                for (let j = 0; j < path.length; j++) { path[j].age++; }
                while (path.length > 0 && path[0].age > 10) { path.shift(); }

                if (path.length === 0) {
                    let stillActive = false;
                    for (let key in activeTouches) {
                        if (activeTouches[key].path === path) { stillActive = true; break; }
                    }
                    if (!stillActive) {
                        allPaths.splice(i, 1);
                    }
                }
            }
        }

        function triggerEasterEgg() { eggBuffer = ""; score += 100; document.getElementById('score-display').textContent = score; showBurst(window.innerWidth/2 - 50, window.innerHeight/2, "+100 🌟", "#f1c40f"); bgm.pause(); secretBgm.currentTime = 0; secretBgm.volume = 0.6; secretBgm.play().catch(err => console.log(err)); const modal = document.getElementById('secret-modal'); modal.style.display = 'block'; setTimeout(() => { modal.style.display = 'none'; if(isPlaying) bgm.play(); }, 3000); }

        function endGame() {
            isPlaying = false; cancelAnimationFrame(animationId); 
            bgm.pause(); sfxBuff.pause(); 
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('word-prompt').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text;
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳忍者戰績...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=Dead&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
