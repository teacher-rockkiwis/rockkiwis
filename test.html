<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- ✨ 蘋果手機全螢幕優化標籤 ✨ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dr. ROCK - Phonics Ninja</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c0392b; --secondary: #e74c3c; --success: #27ae60; --error: #c0392b;
            --bg: #2c3e50; --text-light: #ecf0f1; --gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; outline: none; }
        body, html {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            overscroll-behavior-x: none; overscroll-behavior-y: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }

        .sound-toggle {
            position: fixed; top: 12px; right: 15px; background: rgba(255,255,255,0.9);
            border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px;
            font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; transition: 0.2s;
        }
        .exit-btn {
            position: fixed; top: 12px; left: 15px; background: rgba(231,76,60,0.9);
            color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #c0392b;
        }

        #ui-layer {
            position: absolute; top: 60px; left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 20; pointer-events: none;
        }
        .hud-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 15px; border: 2px solid #7f8c8d; color: white; text-align: center; }
        #score-display { font-size: 30px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #lives-display { font-size: 24px; letter-spacing: 2px; }
        #combo-hud { font-size: 20px; font-weight: 900; color: #3498db; margin-top: 5px; transition: 0.2s; }
        .combo-active { color: var(--gold) !important; text-shadow: 0 0 15px var(--gold); transform: scale(1.2); }

        #word-prompt {
            position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #2d3436; padding: 10px 30px;
            border-radius: 50px; font-size: 24px; font-weight: 900; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary);
            display: none; align-items: center; gap: 10px; pointer-events: auto; cursor: pointer;
        }
        .replay-btn { background: var(--gold); color: #2d3436; font-size: 14px; padding: 4px 10px; border-radius: 20px; }

        #start-overlay, #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 60000; overflow-y: auto; padding: 20px; background: rgba(44, 62, 80, 0.95);
        }
        #end-msg { display: none; text-align: center; }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 22px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #922b21; transition: 0.1s;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #922b21; }
        .fs-btn { background: var(--success); box-shadow: 0 6px 0 #1e8449; }
        .fs-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #1e8449; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        select.theme-select { width: 90%; max-width: 350px; font-size: 16px; padding: 12px; border-radius: 15px; border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; margin-bottom: 20px; }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        #fever-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(241, 196, 15, 0); pointer-events: none; z-index: 5; transition: 0.3s;
        }
        .fever-active { box-shadow: inset 0 0 150px rgba(241, 196, 15, 0.6) !important; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { box-shadow: inset 0 0 100px rgba(241, 196, 15, 0.4); } 100% { box-shadow: inset 0 0 200px rgba(230, 126, 34, 0.8); } }

        #portrait-warning { display: none; }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #portrait-warning {
                display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(44, 62, 80, 0.98); z-index: 99999; color: white;
                flex-direction: column; justify-content: center; align-items: center;
                font-size: 24px; font-weight: bold; text-align: center; padding: 20px;
            }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="ninja.mp3" loop></audio>
    <audio id="sfx-blade" src="blade.mp3"></audio>
    <audio id="sfx-combo" src="combo.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="portrait-warning">
        <div style="font-size: 80px; margin-bottom: 20px; animation: shake 2s infinite;">📱🔄</div>
        <div style="line-height: 1.5; margin-bottom: 20px;">請將手機旋轉至<strong style="color:var(--gold)">橫向</strong><br>以獲得最佳斬擊視野！</div>
        <div style="font-size: 16px; color: #bdc3c7;">💡 iPhone 若無法全螢幕，請點選下方分享<br>並選擇「加入主畫面」</div>
    </div>

    <div id="start-overlay">
        <h1 style="font-size: 50px; color: var(--gold); text-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; margin-bottom: 5px; margin-top: 20px;">🥷 Phonics Ninja</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 20px; text-align: center; line-height: 1.5;">
            聽單字，切開正確發音！<br>切錯扣命，連擊滿10次進入20倍狂熱模式！
        </p>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入忍者尊姓大名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
            <optgroup label="四年級 (Grade 4)">
                <option value="ninja-g4-th">👅 U1: 無聲與有聲 [th] 大對決</option>

            <optgroup label="五年級 (Grade 5)">
                <option value="ninja-g5-wh-ph">🐳 U1: [wh] 與 [ph] 終極試煉</option>

        </select>

        <div class="btn-group">
            <button class="start-btn" onclick="startGame(false)">⚔️ 一般啟動</button>
            <button class="start-btn fs-btn" onclick="startGame(true)">📱 全螢幕橫式遊玩</button>
        </div>

        <div class="result-panel" style="margin-top: 0px; padding: 15px;">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">🏆 忍者英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-box" style="text-align: left;">
            <div style="font-size: 14px; color: #bdc3c7;">SCORE</div>

        </div>

            <div style="font-size: 14px; color: #bdc3c7;">LIVES</div>
            <div id="lives-display">❤️❤️❤️❤️❤️</div>
        </div>
    </div>

    <div id="word-prompt" onclick="replayWord()">🎧 系統發音中... <div class="replay-btn">重聽</div></div>

    <div id="fever-overlay"></div>
    <canvas id="game-canvas"></canvas>

    <div id="end-msg">
        <h1 style="font-size: 45px; color: var(--error); margin: 0; margin-top: 10px;">力盡倒下！💀</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: #2d3436; text-align: center;">
                斬擊總分：<br><span id="final-total-display" style="color:var(--primary); font-size:45px;">0</span> pts
            </div>
            <h2 class="board-row" style="color: var(--primary); justify-content: center; border-top: 2px dashed #ddd; padding-top: 15px;">🌍 忍者英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再戰一回</button>
    </div>

    <script>

        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);

        const badWords = [
            "fuck", "shit", "bitch", "pussy", "whore", "idiot", "stupid", "wtf", "mdfk", "nmsl", "retard", "psycho", "loser", "trash", "autist", "gay", "lesbian", 
            "幹", "靠北", "靠杯", "靠腰", "靠夭", "靠妖", "靠么", "機掰", "雞掰", "擊敗", "姬芭", "機八", "雞巴", "雞排", "操", "肏", "草泥馬", "操你", "媽的", "他媽", "幹你娘", "幹您娘", "趕羚羊", "機車", "ㄘㄠˋ", "ㄍㄢˋ", "ㄐㄅ", "e04", "林北", "恁爸", "老木", "老母", "哭爸", "哭夭",
            "智障", "白痴", "白癡", "北七", "北漆", "腦殘", "腦弱", "低能", "智缺", "喜憨兒", "殘障", "神經病", "有病", "精神病", "自閉", "腦袋進水", "弱智", "啟智", "白目", "丁丁", "特教班", "資源班", "唐氏症", "神經", "智商",
            "死", "孤兒", "沒爸", "沒媽", "沒爹", "沒娘", "沒家教", "全家", "沒人要", "找死", "去死", "短命", "夭壽", "挫冰", "祝你", "沒老母", "沒教養", "棄嬰", "孤兒院", "遺腹子", "沒生教",
            "娘炮", "娘娘腔", "基佬", "死玻璃", "玻璃心", "變態", "人妖", "同性戀", "假妹", "破麻", "綠茶", "婊", "渣男", "渣女", "公車", "妓", "欠幹", "欠操", "男妓", "老玻璃", "發情", "噁男",
            "垃圾", "沙小", "三小", "王八", "賤", "雜碎", "畜生", "狗娘", "狗屎", "屎", "尿", "糞", "大便", "吃大便", "甲賽", "假賽", "呷賽", "甲洨", "喝尿", "屌", "懶覺", "蘭嬌", "懶叫", "卵葩", "老二", "小雞雞", "陰莖", "鮑魚", "傻逼", "沙雕", "肥豬", "醜八怪", "🖕", "💩", "🐷", "🐶", "🐒"
        ];

        let userIP = "Unknown";
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        const wordBanks = {
            "ninja-g4-th": [
                { word: "thin", target: "th", distractors: ["f", "s", "t", "v"] },
                { word: "this", target: "th", distractors: ["z", "v", "d", "f"] },
                { word: "fish", target: "f", distractors: ["th", "v", "ph", "s"] },
                { word: "think", target: "th", distractors: ["f", "s", "k", "v"] },
                { word: "math", target: "th", distractors: ["f", "s", "v", "m"] },
                { word: "bath", target: "th", distractors: ["f", "s", "v", "b"] },
                { word: "father", target: "th", distractors: ["f", "v", "d", "z"] },
                { word: "face", target: "f", distractors: ["th", "v", "p", "s"] }
            ],
            "ninja-g5-wh-ph": [
                { word: "whale", target: "wh", distractors: ["w", "h", "ph", "v"] },
                { word: "phone", target: "ph", distractors: ["f", "v", "wh", "p"] },
                { word: "white", target: "wh", distractors: ["w", "h", "ph", "f"] },
                { word: "elephant", target: "ph", distractors: ["f", "v", "p", "wh"] },
                { word: "when", target: "wh", distractors: ["w", "h", "ph", "v"] },
                { word: "photo", target: "ph", distractors: ["f", "p", "wh", "v"] },
                { word: "dolphin", target: "ph", distractors: ["f", "p", "wh", "v"] }
            ]
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let animationId;
        
        let isPlaying = false, isMuted = false;
        let score = 0, lives = 5, combo = 0, multiplier = 1;
        let isFever = false, feverTimer = 0;
        let playerName = "Player", currentTheme = "";
        
        let targets = [];
        let particles = [];
        let floatTexts = [];
        let bladePath = [];
        let swipeHitsInCurrentStroke = 0; 
        
        let currentWordData = null;
        let isSpawningPhase = false;

        const bgm = document.getElementById('bgm');
        const sfxBlade = document.getElementById('sfx-blade');
        const sfxCombo = document.getElementById('sfx-combo');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxBuff = document.getElementById('sfx-buff');
        
        bgm.volume = 0.5; sfxBlade.volume = 0.8; sfxCombo.volume = 1.0; sfxWrong.volume = 1.0; sfxBuff.volume = 1.0;

        window.onload = function() { 
            fetchFrontLeaderboard();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            canvas.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
            
            setupInputHandling();
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function toggleSound(e) { 
            if (e) e.stopPropagation(); isMuted = !isMuted; 
            const btn = document.getElementById('sound-btn'); 
            if (isMuted) { 
                btn.innerHTML = "🔇 音效：關"; btn.style.borderColor = "var(--error)"; 
                bgm.muted = true; sfxBlade.muted = true; sfxCombo.muted = true; sfxWrong.muted = true; sfxBuff.muted = true;
            } else { 
                btn.innerHTML = "🔊 音效：開"; btn.style.borderColor = "var(--success)"; 
                bgm.muted = false; sfxBlade.muted = false; sfxCombo.muted = false; sfxWrong.muted = false; sfxBuff.muted = false;
            } 
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); 
            const themeSelect = document.getElementById('theme-select');
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${themeSelect.value}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        function playAudio(audioEl, restart = true) {
            if (isMuted) return;
            if (restart) audioEl.currentTime = 0;
            audioEl.play().catch(e => {});
        }

        // ✨ 強化物理引擎：提高重力與初速，增加極致滯空 ✨
        class Target {
            constructor(x, y, vx, vy, text, isCorrect) {
                this.x = x; this.y = y; 
                this.vx = vx; 
                this.vy = vy;
                this.text = text; this.isCorrect = isCorrect;
                this.radius = 45;
                this.sliced = false;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.08;
                this.gravity = 0.18; // 重力大幅增加，掉落更快
                
                this.color = isCorrect ? "#34495e" : "#8e44ad"; 
                if(Math.random() > 0.7) this.color = "#d35400"; 
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // ✨ 滯空魔法升級：當垂直速度介於 -2 到 2 之間，重力瞬間變為原來的 15%
                if (Math.abs(this.vy) < 2.0) {
                    this.vy += this.gravity * 0.15; // 懸停時間變長
                } else {
                    this.vy += this.gravity;
                }
                
                this.rotation += this.rotSpeed;
            }
            draw(ctx) {
                if(this.sliced) return; 
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ecf0f1"; 
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = this.color;
                ctx.stroke();

                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 36px Quicksand";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, 0, 2);
                
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.03; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class FloatText {
            constructor(x, y, text, color, isBig = false) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -2; this.isBig = isBig;
            }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.font = `bold ${this.isBig ? '40px' : '26px'} Quicksand`;
                ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y);
                ctx.lineWidth = 1; ctx.strokeStyle = "white"; ctx.strokeText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function setupInputHandling() {
            let isDown = false;

            const addPoint = (x, y) => {
                bladePath.push({x, y, age: 0});
                checkSlice(x, y);
            };

            canvas.addEventListener('pointerdown', (e) => {
                isDown = true; swipeHitsInCurrentStroke = 0; addPoint(e.clientX, e.clientY);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!isDown) return; addPoint(e.clientX, e.clientY);
            });

            window.addEventListener('pointerup', () => { isDown = false; swipeHitsInCurrentStroke = 0; });
        }

        function checkSlice(x, y) {
            if(!isPlaying) return;

            for (let i = 0; i < targets.length; i++) {
                let t = targets[i];
                if (t.sliced) continue;

                let dx = x - t.x; let dy = y - t.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist <= t.radius) {
                    t.sliced = true;
                    createExplosion(t.x, t.y, t.isCorrect ? "#2ecc71" : "#e74c3c");
                    
                    if (t.isCorrect) {
                        playAudio(sfxBlade);
                        swipeHitsInCurrentStroke++;
                        combo++; updateMultiplier();
                        
                        let basePts = 10;
                        if (swipeHitsInCurrentStroke >= 3) {
                            playAudio(sfxCombo, false);
                            basePts += 20; 
                            floatTexts.push(new FloatText(t.x, t.y - 30, "COMBO!", "#f1c40f", true));
                        }
                        
                        let earned = basePts * multiplier;
                        score += earned;
                        floatTexts.push(new FloatText(t.x, t.y, `+${earned}`, "#2ecc71"));
                        updateHUD();
                        
                    } else {
                        playAudio(sfxWrong);
                        breakCombo();
                        lives--;
                        floatTexts.push(new FloatText(t.x, t.y, "WRONG!", "#e74c3c", true));
                        updateHUD();
                        if (lives <= 0) endGame();
                    }
                }
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) { particles.push(new Particle(x, y, color)); particles.push(new Particle(x, y, "#ecf0f1")); }
        }

        function updateMultiplier() {
            if (isFever) { multiplier = 20; } 
            else if (combo >= 10) { triggerFever(); } 
            else if (combo >= 6) { multiplier = 3; } 
            else if (combo >= 3) { multiplier = 2; } 
            else { multiplier = 1; }
            updateHUD();
        }

        function triggerFever() {
            isFever = true; multiplier = 20; feverTimer = 10000; 
            document.getElementById('fever-overlay').classList.add('fever-active');
            document.getElementById('combo-hud').innerText = "🔥 FEVER x20 🔥";
            document.getElementById('combo-hud').classList.add('combo-active');
            playAudio(sfxBuff);
        }

        function breakCombo() {
            combo = 0; isFever = false; feverTimer = 0;
            document.getElementById('fever-overlay').classList.remove('fever-active');
            document.getElementById('combo-hud').classList.remove('combo-active');
            
            document.body.style.backgroundColor = "rgba(231, 76, 60, 0.4)";
            setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 150);
            updateMultiplier();
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = score;
            let hearts = ""; for(let i=0; i<5; i++) { hearts += (i < lives) ? "❤️" : "🖤"; }
            document.getElementById('lives-display').innerText = hearts;
            if(!isFever) {
                const comboEl = document.getElementById('combo-hud');
                comboEl.innerText = `${multiplier}x 倍率 (Combo: ${combo})`;
                if(multiplier > 1) comboEl.style.color = "#f1c40f"; else comboEl.style.color = "#3498db";
            }
        }

        function startGame(requestFullscreen) {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入忍者姓名！"); return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { alert("請保持禮貌喔！😇"); return; }
            
            if (requestFullscreen) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(e => console.log("旋轉鎖定失敗或不支援"));
                    }).catch(err => console.log("全螢幕請求失敗"));
                } else if (elem.webkitRequestFullscreen) { 
                    elem.webkitRequestFullscreen();
                } else {
                    // ✨ 針對 iPhone 的特別提示 ✨
                    alert("蘋果設備(iPhone/iPad) 無法自動進入全螢幕。\n\n請將手機打橫後，用手指輕輕「往上滑動」即可隱藏網址列。\n或者點擊瀏覽器下方的「分享」按鈕，選擇「加入主畫面」獲得最佳體驗！");
                }
            }

            if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

            playerName = inputName; 
            currentTheme = document.getElementById('theme-select').value;
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('word-prompt').style.display = 'flex';
            
            score = 0; lives = 5; combo = 0; multiplier = 1; isFever = false; feverTimer = 0;
            targets = []; particles = []; floatTexts = []; bladePath = [];
            isPlaying = true; isSpawningPhase = false;

            updateHUD();
            document.getElementById('fever-overlay').classList.remove('fever-active');
            document.getElementById('combo-hud').classList.remove('combo-active');

            bgm.volume = 0.5; playAudio(bgm);
            animationId = requestAnimationFrame(gameLoop);
        }

        function speakWord(word, callback) {
            if ('speechSynthesis' in window && !isMuted) {
                bgm.volume = 0.2; 
                const utterance = new SpeechSynthesisUtterance(word); 
                utterance.lang = 'en-US'; utterance.rate = 0.85;
                utterance.onend = () => { if(isPlaying) bgm.volume = 0.5; if(callback) callback(); }; 
                window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance);
            } else {
                if(callback) setTimeout(callback, 1000);
            }
        }

        function replayWord() {
            if(currentWordData) speakWord(currentWordData.word);
        }

        function launchWave() {
            isSpawningPhase = true;
            let bank = wordBanks[currentTheme];
            currentWordData = bank[Math.floor(Math.random() * bank.length)];
            
            speakWord(currentWordData.word, () => {
                if(!isPlaying) return;
                
                // ✨ 增加字卡數量 ✨ (3~5張正確，2~3張錯誤，總共 5~8 張)
                let correctCount = Math.floor(Math.random() * 3) + 3; 
                let wrongCount = Math.floor(Math.random() * 2) + 2;  

                let spawnList = [];
                for(let i=0; i<correctCount; i++) spawnList.push({ t: currentWordData.target, c: true });
                for(let i=0; i<wrongCount; i++) {
                    let dist = currentWordData.distractors[Math.floor(Math.random() * currentWordData.distractors.length)];
                    spawnList.push({ t: dist, c: false });
                }
                
                let sections = spawnList.length;
                let positions = [];
                for(let i=0; i<sections; i++) {
                    let sectionWidth = width / sections;
                    let px = (i * sectionWidth) + (sectionWidth / 2) + (Math.random() - 0.5) * (sectionWidth * 0.6);
                    positions.push(px);
                }
                positions.sort(() => Math.random() - 0.5);

                spawnList.forEach((item, index) => {
                    let startX = positions[index];
                    let startY = height + 50;
                    
                    // ✨ 配合強大重力的超高初速拋物線 ✨
                    let g = 0.18; 
                    let targetHeight = height * 0.7 + Math.random() * (height * 0.1); 
                    let vy = -Math.sqrt(2 * g * targetHeight);
                    let vx = (Math.random() - 0.5) * 0.8; 
                    
                    // ✨ 彈出間隔縮短到 250ms，更有連續噴發的爽快感 ✨
                    setTimeout(() => {
                        if(isPlaying) targets.push(new Target(startX, startY, vx, vy, item.t, item.c));
                    }, index * 250); 
                });
                
                isSpawningPhase = false;
            });
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!isPlaying) return;
            let dt = timestamp - lastTime;
            lastTime = timestamp;

            ctx.clearRect(0, 0, width, height);

            if (isFever) {
                feverTimer -= dt;
                if (feverTimer <= 0) {
                    isFever = false;
                    document.getElementById('fever-overlay').classList.remove('fever-active');
                    document.getElementById('combo-hud').classList.remove('combo-active');
                    updateMultiplier();
                }
            }

            let activeTargets = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                t.update();
                t.draw(ctx);
                
                if (!t.sliced && t.y > height + 100) {
                    if (t.isCorrect) breakCombo();
                    targets.splice(i, 1);
                } else if (!t.sliced) {
                    activeTargets = true;
                } else if (t.sliced) {
                    targets.splice(i, 1); 
                }
            }

            if (!activeTargets && !isSpawningPhase && targets.length === 0) launchWave();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                floatTexts[i].update(); floatTexts[i].draw(ctx);
                if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
            }

            drawBladePath();
            animationId = requestAnimationFrame(gameLoop);
        }

        function drawBladePath() {
            if (bladePath.length < 2) return;
            
            ctx.beginPath();
            ctx.moveTo(bladePath[0].x, bladePath[0].y);
            for (let i = 1; i < bladePath.length; i++) {
                ctx.lineTo(bladePath[i].x, bladePath[i].y);
            }
            
            ctx.lineWidth = isFever ? 12 : 6;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isFever ? '#f39c12' : '#ecf0f1';
            ctx.shadowBlur = 15; ctx.shadowColor = isFever ? '#f1c40f' : '#bdc3c7';
            ctx.stroke(); ctx.shadowBlur = 0;

            for (let i = 0; i < bladePath.length; i++) { bladePath[i].age++; }
            while (bladePath.length > 0 && bladePath[0].age > 10) { bladePath.shift(); }
        }

        function endGame() {
            isPlaying = false; cancelAnimationFrame(animationId); bgm.pause();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('word-prompt').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text;
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳忍者戰績...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=Dead&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
</body>
