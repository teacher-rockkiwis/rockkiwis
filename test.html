<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dr. ROCK - Grammar Defender</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e44ad; --secondary: #9b59b6; --success: #2ecc71; --error: #e74c3c;
            --bg: #2c3e50; --text-light: #ecf0f1; --gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; outline: none; }
        body, html {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            overscroll-behavior: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }

        .sound-toggle {
            position: fixed; top: max(15px, env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.9);
            border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px;
            font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; transition: 0.2s;
        }
        .exit-btn {
            position: fixed; top: max(15px, env(safe-area-inset-top)); left: 15px; background: rgba(231,76,60,0.9);
            color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #c0392b;
        }

        #ui-layer {
            position: absolute; top: max(60px, env(safe-area-inset-top) + 50px); left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 20; pointer-events: none;
        }
        .hud-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 15px; border: 2px solid var(--primary); color: white; text-align: center; }
        #score-display { font-size: 26px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #lives-display { font-size: 20px; letter-spacing: 2px; }
        #combo-hud { font-size: 18px; font-weight: 900; color: #3498db; margin-top: 5px; transition: 0.2s; }
        .combo-active { color: var(--gold) !important; text-shadow: 0 0 15px var(--gold); transform: scale(1.1); display: inline-block;}

        #question-board {
            position: absolute; top: max(130px, env(safe-area-inset-top) + 120px); left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #2d3436; padding: 15px 30px;
            border-radius: 20px; font-size: 28px; font-weight: 900; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary);
            text-align: center; pointer-events: none; max-width: 90%; word-wrap: break-word;
        }
        .blank-space { color: var(--error); border-bottom: 3px solid var(--error); padding: 0 10px; display: inline-block; min-width: 60px; margin: 0 5px; }

        /* Overlays */
        #start-overlay, #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 60000; overflow-y: auto; padding: 20px; background: rgba(44, 62, 80, 0.95);
        }
        #end-msg { display: none; text-align: center; }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #6c3483; transition: 0.1s; margin-bottom: 20px;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #6c3483; }
        
        select.theme-select { width: 90%; max-width: 350px; font-size: 16px; padding: 12px; border-radius: 15px; border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; margin-bottom: 20px; }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        #portrait-warning { display: none; }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #portrait-warning {
                display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(44, 62, 80, 0.98); z-index: 99999; color: white;
                flex-direction: column; justify-content: center; align-items: center;
                font-size: 24px; font-weight: bold; text-align: center; padding: 20px;
            }
        }

        @media screen and (max-width: 900px), screen and (max-height: 500px) {
            .sound-toggle { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); right: 5px; }
            .exit-btn { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); left: 5px; }
            #ui-layer { top: max(45px, env(safe-area-inset-top) + 35px); padding: 0 10px; }
            #question-board { font-size: 18px; padding: 10px 20px; top: max(100px, env(safe-area-inset-top) + 90px); }
            #start-overlay h1 { font-size: 36px; margin-top: 10px;}
            .start-btn { font-size: 20px; padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="defender_bgm.mp3" loop></audio>
    <audio id="sfx-shoot" src="shoot.mp3"></audio>
    <audio id="sfx-hit" src="hit.mp3"></audio>
    <audio id="sfx-wrong" src="wrong.mp3"></audio>
    <audio id="sfx-damage" src="damage.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="portrait-warning">
        <div style="font-size: 80px; margin-bottom: 20px; animation: shake 2s infinite;">📱🔄</div>
        <div style="line-height: 1.5; margin-bottom: 20px;">請將手機旋轉至<strong style="color:var(--gold)">橫向</strong><br>以獲得最佳防守視野！</div>
    </div>

    <div id="start-overlay">
        <h1 style="font-size: 50px; color: var(--gold); text-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; margin-bottom: 5px; margin-top: 20px;">🏰 Grammar Defender</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 20px; text-align: center; line-height: 1.5;">
            城堡保衛戰！閱讀上方文法題目，<br>點擊發射飛彈，擊敗身上帶有「正確答案」的怪物！
        </p>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入法師姓名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
            <optgroup label="四年級 (Grade 4)">
                <option value="defend-g4-l1">📍 L1: Where are you? (be動詞)</option>
                <option value="defend-g4-l2">🏃‍♂️ L2: What are you doing? (Ving)</option>
            </optgroup>
            <optgroup label="五年級 (Grade 5)">
                <option value="defend-g5-l1">🤕 L1: hurt vs hurts (身體部位)</option>
                <option value="defend-g5-l2">🤒 L2: Do/Does have a fever?</option>
            </optgroup>
        </select>

        <button class="start-btn" onclick="startGame()">⚔️ 開始防守</button>

        <div class="result-panel" style="margin-top: 0px; padding: 15px;">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">🏆 防衛英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-box" style="text-align: left;">
            <div style="font-size: 12px; color: #bdc3c7;">SCORE</div>
            <div id="score-display">0</div>
            <div id="combo-hud">1x 倍率</div>
        </div>
        <div class="hud-box" style="text-align: right;">
            <div style="font-size: 12px; color: #bdc3c7;">CASTLE HP</div>
            <div id="lives-display">❤️❤️❤️</div>
        </div>
    </div>

    <div id="question-board">Loading...</div>

    <canvas id="game-canvas"></canvas>

    <div id="end-msg">
        <h1 style="font-size: 45px; color: var(--error); margin: 0; margin-top: 10px;">城堡陷落！💀</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: #2d3436; text-align: center;">
                防守積分：<br><span id="final-total-display" style="color:var(--primary); font-size:45px;">0</span> pts
            </div>
            <h2 class="board-row" style="color: var(--primary); justify-content: center; border-top: 2px dashed #ddd; padding-top: 15px;">🌍 防衛英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再戰一回</button>
    </div>

    <script>
        // 🛡️ 防外掛系統
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return false; } });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);

        const badWords = [
            "fuck", "shit", "bitch", "pussy", "whore", "idiot", "stupid", "wtf", "mdfk", "nmsl", "retard", "psycho", "loser", "trash", "autist", "gay", "lesbian", 
            "幹", "靠北", "靠杯", "靠腰", "靠夭", "靠妖", "靠么", "機掰", "雞掰", "擊敗", "姬芭", "機八", "雞巴", "雞排", "操", "肏", "草泥馬", "操你", "媽的", "他媽", "幹你娘", "幹您娘", "趕羚羊", "機車", "ㄘㄠˋ", "ㄍㄢˋ", "ㄐㄅ", "e04", "林北", "恁爸", "老木", "老母", "哭爸", "哭夭",
            "智障", "白痴", "白癡", "北七", "北漆", "腦殘", "腦弱", "低能", "智缺", "喜憨兒", "殘障", "神經病", "有病", "精神病", "自閉", "腦袋進水", "弱智", "啟智", "白目", "丁丁", "特教班", "資源班", "唐氏症", "神經", "智商"
        ];

        let userIP = "Unknown";
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        // ✨ 文法題庫 ✨
        const grammarBanks = {
            "defend-g4-l1": [
                { q: "Where ____ you?", a: "are", w: ["is", "am"] },
                { q: "Where ____ he?", a: "is", w: ["are", "am"] },
                { q: "I ____ in the bedroom.", a: "am", w: ["is", "are"] },
                { q: "They ____ in the kitchen.", a: "are", w: ["is", "am"] },
                { q: "She ____ in the dining room.", a: "is", w: ["are", "am"] },
                { q: "Where ____ they?", a: "are", w: ["is", "am"] },
                { q: "Where ____ she?", a: "is", w: ["are", "am"] },
                { q: "He ____ in the yard.", a: "is", w: ["are", "am"] },
                { q: "We ____ in the living room.", a: "are", w: ["is", "am"] },
                { q: "The dog ____ in the house.", a: "is", w: ["are", "am"] }
            ],
            "defend-g4-l2": [
                { q: "What ____ you doing?", a: "are", w: ["is", "am"] },
                { q: "What is he ____?", a: "doing", w: ["do", "does"] },
                { q: "I am ____.", a: "running", w: ["run", "runs"] },
                { q: "She is ____ a book.", a: "reading", w: ["read", "reads"] },
                { q: "They are ____ TV.", a: "watching", w: ["watch", "watches"] },
                { q: "Where ____ you going?", a: "are", w: ["is", "am"] },
                { q: "Where is she ____?", a: "going", w: ["go", "goes"] },
                { q: "I am going ____ the park.", a: "to", w: ["in", "on"] },
                { q: "We ____ going to the shop.", a: "are", w: ["is", "am"] },
                { q: "He is going to ____.", a: "sleep", w: ["sleeping", "sleeps"] }
            ],
            "defend-g5-l1": [
                { q: "What's ____?", a: "wrong", w: ["matter", "bad"] },
                { q: "My head ____.", a: "hurts", w: ["hurt", "hurting"] },
                { q: "My eyes ____.", a: "hurt", w: ["hurts", "hurting"] },
                { q: "His leg ____.", a: "hurts", w: ["hurt", "hurting"] },
                { q: "Her ears ____.", "a": "hurt", w: ["hurts", "hurting"] },
                { q: "My tooth ____.", a: "hurts", w: ["hurt", "hurting"] },
                { q: "Your hands ____.", a: "hurt", w: ["hurts", "hurting"] },
                { q: "His shoulder ____.", a: "hurts", w: ["hurt", "hurting"] },
                { q: "Her feet ____.", a: "hurt", w: ["hurts", "hurting"] },
                { q: "My back ____.", a: "hurts", w: ["hurt", "hurting"] }
            ],
            "defend-g5-l2": [
                { q: "____ you have a fever?", a: "Do", w: ["Does", "Are"] },
                { q: "Yes, I ____.", a: "do", w: ["does", "am"] },
                { q: "No, I ____.", "a": "don't", w: ["doesn't", "not"] },
                { q: "I ____ a runny nose.", a: "have", w: ["has", "having"] },
                { q: "____ he have a headache?", a: "Does", w: ["Do", "Is"] },
                { q: "Yes, he ____.", a: "does", w: ["do", "is"] },
                { q: "No, she ____.", a: "doesn't", w: ["don't", "isn't"] },
                { q: "He ____ a sore throat.", a: "has", w: ["have", "having"] },
                { q: "She ____ a stomachache.", a: "has", w: ["have", "having"] },
                { q: "____ they have a cold?", a: "Do", w: ["Does", "Are"] }
            ]
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let animationId;
        let audioCtx = null;
        
        let isPlaying = false, isMuted = false;
        let score = 0, lives = 3, combo = 0, multiplier = 1;
        let playerName = "Player", currentTheme = "";
        let currentQuestions = [];
        let currentQuestionObj = null;
        let speedMult = 1.0;
        
        // Game Objects
        let monsters = [];
        let projectiles = [];
        let particles = [];
        let floatTexts = [];
        let playerObj = { x: 50, y: 0 }; // Will be centered vertically
        let castleX = 120; // Defense line

        const bgm = document.getElementById('bgm');
        const sfxShoot = document.getElementById('sfx-shoot');
        const sfxHit = document.getElementById('sfx-hit');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxDamage = document.getElementById('sfx-damage');
        
        bgm.volume = 0.5; sfxShoot.volume = 0.6; sfxHit.volume = 0.8; sfxWrong.volume = 0.8; sfxDamage.volume = 0.8;

        window.onload = function() { 
            fetchFrontLeaderboard();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setupInput();
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };

        function resizeCanvas() {
            let newWidth = canvas.clientWidth || window.innerWidth;
            let newHeight = canvas.clientHeight || window.innerHeight;
            if (newWidth > 0 && newHeight > 0 && (canvas.width !== newWidth || canvas.height !== newHeight)) {
                width = newWidth;
                height = newHeight;
                canvas.width = width;
                canvas.height = height;
                playerObj.y = height / 2;
            }
        }

        function toggleSound(e) { 
            if (e) e.stopPropagation(); isMuted = !isMuted; 
            const btn = document.getElementById('sound-btn'); 
            if (isMuted) { 
                btn.innerHTML = "🔇 音效：關"; btn.style.borderColor = "var(--error)"; 
                bgm.muted = true; sfxShoot.muted = true; sfxHit.muted = true; sfxWrong.muted = true; sfxDamage.muted = true;
            } else { 
                btn.innerHTML = "🔊 音效：開"; btn.style.borderColor = "var(--success)"; 
                bgm.muted = false; sfxShoot.muted = false; sfxHit.muted = false; sfxWrong.muted = false; sfxDamage.muted = false;
            } 
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); 
            const themeSelect = document.getElementById('theme-select');
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${themeSelect.value}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        function safePlayAudio(audioEl) {
            if (isMuted) return;
            try {
                audioEl.currentTime = 0;
                let p = audioEl.play();
                if (p !== undefined) p.catch(e => {});
            } catch (e) {}
        }

        // --- Game Classes ---
        class Monster {
            constructor(x, y, text, isCorrect) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.isCorrect = isCorrect;
                this.radius = window.innerHeight < 500 ? 30 : 40;
                this.speed = (Math.random() * 0.8 + 1.0) * speedMult;
                this.emoji = ["👹", "👺", "👽", "👾", "👻"][Math.floor(Math.random() * 5)];
                this.markedForDeath = false;
            }
            update() {
                this.x -= this.speed;
            }
            draw(ctx) {
                // Draw Word Bubble
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.beginPath();
                ctx.roundRect(this.x - 40, this.y - this.radius - 35, 80, 30, 8);
                ctx.fill();
                ctx.strokeStyle = "#34495e";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 16px Quicksand";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, this.x, this.y - this.radius - 20);

                // Draw Monster Emoji
                ctx.font = `${this.radius * 1.5}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        class Projectile {
            constructor(startX, startY, target) {
                this.x = startX;
                this.y = startY;
                this.target = target;
                this.speed = 15;
                this.radius = 8;
                this.markedForDeath = false;
            }
            update() {
                if(this.target.markedForDeath) {
                    this.markedForDeath = true; return; // Target already dead
                }
                let dx = this.target.x - this.x;
                let dy = this.target.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < this.speed) {
                    this.x = this.target.x;
                    this.y = this.target.y;
                    this.hitTarget();
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            hitTarget() {
                this.markedForDeath = true;
                this.target.markedForDeath = true;
                
                if (this.target.isCorrect) {
                    safePlayAudio(sfxHit);
                    createExplosion(this.target.x, this.target.y, "#2ecc71");
                    
                    combo++;
                    updateMultiplier();
                    
                    let pts = 10 * multiplier;
                    score += pts;
                    floatTexts.push(new FloatText(this.target.x, this.target.y - 20, `+${pts}`, "#2ecc71"));
                    updateHUD();
                    
                    // Kill remaining monsters and spawn next wave
                    monsters.forEach(m => {
                        if (m !== this.target) {
                            m.markedForDeath = true;
                            createExplosion(m.x, m.y, "#bdc3c7");
                        }
                    });
                    
                    setTimeout(spawnWave, 500);
                    
                } else {
                    safePlayAudio(sfxWrong);
                    createExplosion(this.target.x, this.target.y, "#e74c3c");
                    floatTexts.push(new FloatText(this.target.x, this.target.y - 20, "WRONG!", "#e74c3c"));
                    takeDamage();
                }
            }
            draw(ctx) {
                ctx.fillStyle = "#f1c40f";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#f39c12";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 3;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.05; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class FloatText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -2;
            }
            update() { this.y += this.vy; this.life -= 0.03; }
            draw(ctx) {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.font = `bold 24px Quicksand`;
                ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y);
                ctx.lineWidth = 1; ctx.strokeStyle = "white"; ctx.strokeText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) { particles.push(new Particle(x, y, color)); particles.push(new Particle(x, y, "#ffffff")); }
        }

        function setupInput() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!isPlaying) return;
                let clickX = e.clientX;
                let clickY = e.clientY;
                
                // Find clicked monster
                for (let i = 0; i < monsters.length; i++) {
                    let m = monsters[i];
                    if (m.markedForDeath) continue;
                    
                    // AABB/Radius check
                    let dx = clickX - m.x;
                    let dy = clickY - m.y;
                    if (Math.sqrt(dx*dx + dy*dy) < m.radius + 30) { // generous hitbox
                        // Shoot!
                        safePlayAudio(sfxShoot);
                        projectiles.push(new Projectile(playerObj.x, playerObj.y, m));
                        break; // Only shoot one per click
                    }
                }
            });
        }

        function spawnWave() {
            if (!isPlaying) return;
            
            // Speed scaling
            if (score >= 2000) speedMult = 2.0;
            else if (score >= 1000) speedMult = 1.5;
            else if (score >= 500) speedMult = 1.2;
            else speedMult = 1.0;

            let q = currentQuestions[Math.floor(Math.random() * currentQuestions.length)];
            currentQuestionObj = q;
            
            let parts = q.q.split('____');
            let html = parts[0] + "<span class='blank-space'></span>" + (parts[1] || "");
            document.getElementById('question-board').innerHTML = html;

            let opts = [
                { text: q.a, isCorrect: true },
                { text: q.w[0], isCorrect: false },
                { text: q.w[1], isCorrect: false }
            ];
            opts.sort(() => Math.random() - 0.5);

            // Calculate Y positions (top, mid, bottom)
            let startY = height * 0.35;
            let spacing = (height * 0.5) / 2;
            
            opts.forEach((opt, index) => {
                let y = startY + (index * spacing);
                let x = width + 50 + (Math.random() * 50); // slight stagger
                monsters.push(new Monster(x, y, opt.text, opt.isCorrect));
            });
        }

        function takeDamage() {
            safePlayAudio(sfxDamage);
            lives--;
            combo = 0;
            multiplier = 1;
            updateHUD();
            
            document.body.style.backgroundColor = "rgba(231, 76, 60, 0.3)";
            setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 150);

            if (lives <= 0) {
                endGame();
            }
        }

        function updateMultiplier() {
            if (combo >= 9) multiplier = 4;
            else if (combo >= 5) multiplier = 3;
            else if (combo >= 2) multiplier = 2;
            else multiplier = 1;
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = score;
            let hearts = ""; for(let i=0; i<3; i++) { hearts += (i < lives) ? "❤️" : "🖤"; }
            document.getElementById('lives-display').innerText = hearts;
            
            const comboEl = document.getElementById('combo-hud');
            comboEl.innerText = `${multiplier}x 倍率 (Combo: ${combo})`;
            if(multiplier > 1) comboEl.style.color = "#f1c40f"; else comboEl.style.color = "#3498db";
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入法師姓名！"); return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { alert("請保持禮貌喔！😇"); return; }
            
            playerName = inputName; 
            currentTheme = document.getElementById('theme-select').value;
            currentQuestions = grammarBanks[currentTheme];
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('question-board').style.display = 'block';
            
            score = 0; lives = 3; combo = 0; multiplier = 1; speedMult = 1.0;
            monsters = []; projectiles = []; particles = []; floatTexts = [];
            
            isPlaying = true;
            updateHUD();

            bgm.volume = 0.5; safePlayAudio(bgm);
            
            spawnWave();
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!isPlaying) return;
            resizeCanvas(); 
            
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            if (width <= 0 || height <= 0) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, width, height);

            // Draw Castle/Defense Line
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, 0, castleX, height);
            ctx.strokeStyle = "rgba(231, 76, 60, 0.5)";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(castleX, 0); ctx.lineTo(castleX, height); ctx.stroke();

            // Draw Player (Wizard)
            ctx.font = "60px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🧙‍♂️", playerObj.x, playerObj.y);

            // Update & Draw Monsters
            let waveFailed = false;
            for (let i = monsters.length - 1; i >= 0; i--) {
                let m = monsters[i];
                if (m.markedForDeath) {
                    monsters.splice(i, 1);
                    continue;
                }
                
                m.update();
                m.draw(ctx);

                // Reached Castle
                if (m.x - m.radius < castleX) {
                    waveFailed = true;
                }
            }

            if (waveFailed) {
                takeDamage();
                monsters = []; // clear wave
                projectiles = [];
                if (lives > 0) setTimeout(spawnWave, 500);
            }

            // Update & Draw Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.update();
                if (p.markedForDeath) {
                    projectiles.splice(i, 1);
                    continue;
                }
                p.draw(ctx);
            }

            // Particles & Texts
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            for (let i = floatTexts.length - 1; i >= 0; i--) {
                floatTexts[i].update(); floatTexts[i].draw(ctx);
                if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false; cancelAnimationFrame(animationId); 
            bgm.pause(); 
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('question-board').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text.split(':')[0].substring(3);
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳防守成績...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=Defeated&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
</body>
</html>
