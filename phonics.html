<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Phonics Hyperdrive</title>
    <link rel="stylesheet" href="common.css">
    <style>
        :root {
            --primary: #00cec9; --secondary: #0984e3; --success: #00b894; --error: #d63031;
            --bg: #1e272e; --text-light: #f1f2f6; --fever-glow: #fdcb6e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; outline: none; }
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif; overflow: hidden; display: flex; flex-direction: column; user-select: none; transition: background-color 0.3s; }
        body.fever-mode { animation: feverBg 1s infinite alternate; }
        @keyframes feverBg { 0% { box-shadow: inset 0 0 50px rgba(253, 203, 110, 0.2); } 100% { box-shadow: inset 0 0 100px rgba(225, 112, 85, 0.4); } }
        
        .sound-toggle { position: fixed; top: max(15px, env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.9); border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; }
        .exit-btn { position: fixed; top: max(15px, env(safe-area-inset-top)); left: 15px; background: rgba(214,48,49,0.9); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #b33939; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #b33939; }
        
        #hud { position: absolute; top: max(60px, env(safe-area-inset-top) + 50px); left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; border: 2px solid var(--primary); color: white; text-align: center; }
        #timer { font-size: 36px; font-weight: 900; color: var(--fever-glow); font-variant-numeric: tabular-nums; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; border: 2px solid var(--primary); text-shadow: 0 0 10px var(--fever-glow); }
        #score { font-size: 24px; font-weight: 900; color: var(--success); margin-bottom: 5px; }
        #combo-display { font-size: 18px; font-weight: 900; color: #dfe6e9; transition: 0.2s; }
        .combo-active { color: var(--fever-glow) !important; text-shadow: 0 0 10px var(--fever-glow); transform: scale(1.1); display: inline-block; }
        
        #mission-board { position: absolute; top: max(140px, env(safe-area-inset-top) + 130px); left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); color: #2d3436; padding: 12px 25px; border-radius: 50px; font-size: 22px; font-weight: 900; z-index: 90; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary); white-space: nowrap; transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        #mission-board:active { transform: translateX(-50%) scale(0.95); }
        .replay-btn { background: #f1c40f; color: #2d3436; font-size: 16px; padding: 4px 12px; border-radius: 20px; box-shadow: 0 3px 0 #d4ac0d; }
        
        #game-container { flex-grow: 1; position: relative; width: 100%; max-width: 600px; margin: 0 auto; overflow: hidden; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1); }
        #track-bg { position: absolute; top: -100%; left: 0; width: 100%; height: 200%; background-image: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.05) 50%); background-size: 10px 100px; animation: scrollTrack 0.4s linear infinite; z-index: 1; pointer-events: none; }
        body.fever-mode #track-bg { animation-duration: 0.15s; background-image: linear-gradient(to bottom, transparent 50%, rgba(0, 206, 201, 0.2) 50%); }
        @keyframes scrollTrack { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }
        
        .lane-divider { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.1); z-index: 2; pointer-events: none; }
        .lane-div-1 { left: 33.33%; } .lane-div-2 { left: 66.66%; }
        
        .click-lane { position: absolute; top: 0; width: 33.33%; height: 100%; z-index: 20; cursor: pointer; }
        
        /* 特快車樣式 */
        #train { position: absolute; bottom: 20px; width: 80px; height: 80px; font-size: 60px; display: flex; justify-content: center; align-items: center; z-index: 50; transition: left 0.15s ease-out; transform: translateX(-50%); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); pointer-events: none;}
        body.fever-mode #train { filter: drop-shadow(0 0 20px rgba(253,203,110,0.8)); transform: translateX(-50%) scale(1.1); }
        
        .word-block { position: absolute; width: 28%; background: rgba(0,0,0,0.8); color: #f1c40f; padding: 15px 0; text-align: center; border-radius: 12px; font-size: 22px; font-weight: 900; border: 3px solid #f1c40f; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.5); z-index: 15; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 60000; overflow-y: auto; padding: 40px 20px 20px 20px; background: rgba(30, 39, 46, 0.95); }
        #end-msg { display: none; text-align: center; justify-content: center;}
        
        select.theme-select { 
            width: 100%; font-size: 16px; padding: 12px 15px; border-radius: 15px; 
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700;
            color: #2c3e50; background-color: #ffffff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; margin-bottom: 20px;
        }
        select.theme-select option, select.theme-select optgroup { color: #2c3e50; background-color: #ffffff; }

        #error-msg { display: none; color: #ffcccc; font-weight: 900; margin-bottom: 15px; background: rgba(255, 71, 87, 0.9); padding: 10px 20px; border-radius: 20px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); flex-shrink: 0;}
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #0097e6; margin-bottom: 20px; transition: 0.1s; flex-shrink: 0;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0097e6; }
        .grade-group { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 90%; max-width: 400px; text-align: left; flex-shrink: 0;}
        .grade-title { font-size: 18px; font-weight: 900; margin: 0 0 10px 0; color: #ffeaa7; }
        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; flex-shrink: 0;}
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}
        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark); flex-shrink: 0;}
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; } #front-leaderboard-list::-webkit-scrollbar { width: 6px; } #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 50px; z-index: 55000; animation: burst 0.8s forwards; text-shadow: 2px 2px 0px black; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-100px); opacity: 0; } }
        
        #error-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231, 76, 60, 0.4); z-index: 55000; pointer-events: none; opacity: 0; transition: opacity 0.1s; }

        @media (max-width: 768px) { 
            #hud { top: max(45px, env(safe-area-inset-top) + 35px); }
            #mission-board { top: max(110px, env(safe-area-inset-top) + 100px); font-size: 18px; padding: 8px 15px; } 
            .replay-btn { font-size: 14px; padding: 3px 8px; } 
            .word-block { font-size: 16px; padding: 12px 0; border-width: 2px;} 
            #train { width: 60px; height: 60px; font-size: 50px; bottom: 10px; } 
            body.fever-mode #train { font-size: 60px; } 
            #start-overlay h1 { font-size: 36px; margin-top: 0;}
            .sound-toggle { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); right: 5px; }
            .exit-btn { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); left: 5px; }
        }
    </style>
    <script src="common.js"></script>
</head>
<body>
    <audio id="bgm" src="bgm/arcade.mp3" loop></audio>
    <audio id="sfx-success" src="bgm/buff.mp3"></audio>
    <audio id="sfx-error" src="bgm/damage.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="start-overlay">
        <h1 style="font-size: 45px; color: var(--primary); text-shadow: 0 5px 15px rgba(0,206,201,0.5); text-align: center; margin-bottom: 10px;">🚀 Phonics Hyperdrive</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 15px; text-align: center; line-height: 1.5; flex-shrink: 0;">
            聽音辨字極速挑戰！<br>
            注意聽系統唸出的單字，點選畫面車道或使用<strong style="color:var(--gold)">鍵盤 ⬅️ ➡️</strong><br>
            移動特快車接取正確的單字方塊！
        </p>
        
        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入車長姓名..." autocomplete="off" maxlength="12">
        <div class="grade-group">
            <div class="grade-title">📘 選擇發音特訓關卡：</div>
            <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
                <option value="" disabled selected hidden>▼ 請先選擇特訓關卡...</option>
                <optgroup label="四年級 (Grade 4)">
                    <option value="g4-th">👅 L1: 有聲與無聲 [th]</option>
                    <option value="g4-ng-nk">🎵 L2: [ng] 與 [nk] 尾音</option>
                </optgroup>
                <optgroup label="五年級 (Grade 5)">
                    <option value="g5-wh-ph">🐳 L1: [wh] 與 [ph] 發音挑戰</option>
                    <option value="g5-th-review">👅 L2: 有聲無聲 [th] 總複習</option>
                </optgroup>
            </select>
        </div>
        <button class="start-btn" onclick="startGame()">🚀 啟動特快車！</button>

        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 極速英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">請先選擇上方關卡，以查看英雄榜！</div></div>
        </div>
    </div>

    <div id="hud">
        <div class="hud-box" style="text-align: left;">
            <div style="font-size: 12px; color: #bdc3c7;">SCORE</div>
            <div id="score">0</div>
            <div id="combo-display">1x 倍率</div>
        </div>
        <div id="timer">60</div>
    </div>

    <div id="mission-board" onclick="replayAudio(event)">
        🔊 <span class="replay-btn">聽音辨字 (點擊重播)</span>
    </div>

    <div id="game-container">
        <div id="track-bg"></div>
        <div class="lane-divider lane-div-1"></div>
        <div class="lane-divider lane-div-2"></div>
        
        <!-- 點擊控制車道 -->
        <div class="click-lane" style="left:0;" onpointerdown="setPlayerLane(0, event)"></div>
        <div class="click-lane" style="left:33.33%;" onpointerdown="setPlayerLane(1, event)"></div>
        <div class="click-lane" style="left:66.66%;" onpointerdown="setPlayerLane(2, event)"></div>

        <div id="train">🚀</div>
    </div>
    
    <div id="error-flash"></div>

    <div id="end-msg">
        <h1 style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">抵達終點！🎉</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: #2d3436; text-align: center;">
                極速總分：<br><span id="final-total-display" style="color:var(--primary); font-size:45px;">0</span> pts
            </div>
            <h2 style="color: var(--primary); text-align: center; border-top: 2px dashed #ddd; padding-top: 15px; margin: 0 0 10px 0; font-size: 20px;">🌍 極速英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再跑一次</button>
        <button onclick="location.href='index.html'" style="padding:12px 40px; font-size:20px; background:#7f8c8d; color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 20px;">回大廳</button>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return false; } });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);


        let userIP = "Unknown";

        // ✨ 題庫設定 ✨
        let currentWordBank = [];

        let score = 0, combo = 0, multiplier = 1, timeLeft = 60;
        let isPlaying = false, isMuted = false, isFever = false;
        let playerName = "Player", currentTheme = "";
        let mainTimer, animationId, lastTime = 0;
        
        let playerLane = 1; // 0, 1, 2
        let currentTarget = "";
        let blocks = [];
        let waveActive = false;

        const bgm = document.getElementById('bgm');
        const sfxSuccess = document.getElementById('sfx-success');
        const sfxError = document.getElementById('sfx-error');
        bgm.volume = 0.4; sfxSuccess.volume = 0.7; sfxError.volume = 0.7;

        window.onload = function() { 
            fetchFrontLeaderboard();
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
            
            // Keyboard controls
            window.addEventListener('keydown', (e) => {
                if (!isPlaying) return;
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    playerLane = Math.max(0, playerLane - 1);
                    updateTrainPosition();
                } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    playerLane = Math.min(2, playerLane + 1);
                    updateTrainPosition();
                }
            });
        };


        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); 
            const themeSelect = document.getElementById('theme-select');
            
            if (themeSelect.value === "") {
                listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px; color:#636e72;'>請先選擇上方關卡，以查看英雄榜！</div>";
                return;
            }

            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${themeSelect.value}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='front-board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        // ✨ 語音引擎 ✨
        function speakWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = 0.85;
                window.speechSynthesis.speak(u);
            }
        }

        function replayAudio(e) {
            if(e) e.stopPropagation();
            if(currentTarget && isPlaying) {
                speakWord(currentTarget);
                const mb = document.getElementById('mission-board');
                mb.style.transform = "translateX(-50%) scale(0.95)";
                setTimeout(()=> mb.style.transform = "translateX(-50%) scale(1)", 150);
            }
        }

        function setPlayerLane(lane, e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!isPlaying) return;
            playerLane = lane;
            updateTrainPosition();
        }

        function updateTrainPosition() {
            const train = document.getElementById('train');
            if (playerLane === 0) train.style.left = "16.66%";
            else if (playerLane === 1) train.style.left = "50%";
            else if (playerLane === 2) train.style.left = "83.33%";
        }

        async function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const themeSelect = document.getElementById('theme-select');

            errorMsg.style.display = "none";

            if(inputName === "") { errorMsg.innerText = "⚠️ 請輸入車長姓名！"; errorMsg.style.display = "block"; return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { errorMsg.innerText = "⚠️ 請保持禮貌喔！😇"; errorMsg.style.display = "block"; return; }
            if (themeSelect.value === "") { errorMsg.innerText = "⚠️ 請先選擇挑戰關卡！"; errorMsg.style.display = "block"; return; }

            try {
                const res = await fetch(`data/phonics-${themeSelect.value}.json`);
                currentWordBank = await res.json();
            } catch(e) {
                errorMsg.innerText = "⚠️ 題庫載入失敗，請重新整理！"; errorMsg.style.display = "block"; return;
            }

            if ('speechSynthesis' in window) {
                let u = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(u);
            }

            playerName = inputName;
            currentTheme = themeSelect.value;
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('hud').style.visibility = 'visible';
            
            score = 0; combo = 0; multiplier = 1; timeLeft = 60;
            playerLane = 1; updateTrainPosition();
            blocks = []; waveActive = false;
            
            updateHUD();
            document.getElementById('timer').innerText = timeLeft;

            bgm.play().catch(e => console.log(e));
            
            isPlaying = true;
            mainTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);

            spawnWave();
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        function spawnWave() {
            if (!isPlaying) return;
            
            let bank = currentWordBank;
            currentTarget = bank[Math.floor(Math.random() * bank.length)];
            speakWord(currentTarget);
            
            let distractors = bank.filter(w => w !== currentTarget).sort(()=>Math.random()-0.5).slice(0, 2);
            let options = [currentTarget, distractors[0], distractors[1]].sort(()=>Math.random()-0.5);
            let correctLane = options.indexOf(currentTarget);
            
            blocks = [
                { lane: 0, text: options[0], y: -80, isCorrect: correctLane === 0 },
                { lane: 1, text: options[1], y: -80, isCorrect: correctLane === 1 },
                { lane: 2, text: options[2], y: -80, isCorrect: correctLane === 2 }
            ];
            
            blocks.forEach(b => {
                let el = document.createElement('div');
                el.id = `block-${b.lane}`;
                el.className = 'word-block';
                if (b.lane === 0) el.style.left = "16.66%";
                if (b.lane === 1) el.style.left = "50%";
                if (b.lane === 2) el.style.left = "83.33%";
                el.innerText = b.text;
                document.getElementById('game-container').appendChild(el);
            });
            
            waveActive = true;
        }

        function gameLoop(timestamp) {
            if (!isPlaying) return;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            const containerHeight = document.getElementById('game-container').clientHeight;
            
            if (waveActive) {
                // 隨著 Combo 提升速度 (最大 12px/frame)
                let currentSpeed = Math.min(12, 4 + (combo * 0.3));
                
                // 適應不同螢幕的更新率
                let speedAdj = currentSpeed * (dt / 16.66); 
                if (speedAdj > 20) speedAdj = 20; // 避免切視窗後暴衝

                let hitResult = null; 
                
                blocks.forEach(b => {
                    b.y += speedAdj;
                    let el = document.getElementById(`block-${b.lane}`);
                    if (el) {
                        el.style.top = b.y + "px";
                        el.style.transform = "translateX(-50%)";
                    }
                    
                    // 特快車的位置 (bottom 20px, height 80px) => 中心大約在 containerHeight - 60
                    let trainY = containerHeight - 60; 
                    let blockCenterY = b.y + 25; // 假設方塊高度約 50px
                    
                    // 碰撞判定
                    if (waveActive && Math.abs(blockCenterY - trainY) < 40) {
                        if (playerLane === b.lane) {
                            hitResult = b.isCorrect;
                        }
                    }
                    
                    // 錯過 (方塊掉出畫面外)
                    if (waveActive && b.y > containerHeight + 20) {
                        if (b.isCorrect) {
                            hitResult = false; 
                        }
                    }
                });
                
                if (hitResult !== null) {
                    waveActive = false;
                    handleCollision(hitResult);
                }
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }

        function handleCollision(isCorrect) {
            if (isCorrect) {
                score += 10 * multiplier;
                combo++;
                if (!isMuted) { sfxSuccess.currentTime = 0; sfxSuccess.play().catch(e=>{}); }
                showFloatText("+"+(10*multiplier), "#2ecc71");
            } else {
                score = Math.max(0, score - 5);
                combo = 0;
                if (!isMuted) { sfxError.currentTime = 0; sfxError.play().catch(e=>{}); }
                showFloatText("WRONG", "#e74c3c");
                flashScreen();
            }
            updateHUD();
            
            // 清除畫面上的方塊
            blocks.forEach(b => {
                let el = document.getElementById(`block-${b.lane}`);
                if(el) el.remove();
            });
            blocks = [];
            
            setTimeout(spawnWave, 400); // 短暫停頓後生成下一波
        }

        function updateHUD() {
            document.getElementById('score').innerText = score;
            const comboEl = document.getElementById('combo-display');
            
            if (combo >= 5) {
                multiplier = 3;
                comboEl.innerText = `🔥 狂熱 x${multiplier} (Combo: ${combo})`;
                comboEl.classList.add('combo-active');
                document.body.classList.add('fever-mode');
            } else if (combo >= 2) {
                multiplier = 2;
                comboEl.innerText = `⚡ 加速 x${multiplier} (Combo: ${combo})`;
                comboEl.classList.remove('combo-active');
                document.body.classList.remove('fever-mode');
            } else {
                multiplier = 1;
                comboEl.innerText = `1x 倍率`;
                comboEl.classList.remove('combo-active');
                document.body.classList.remove('fever-mode');
            }
        }

        function showFloatText(txt, color) { 
            const div = document.createElement('div'); div.className = 'float-num'; div.textContent = txt; 
            div.style.left = (window.innerWidth / 2 - 50) + 'px'; 
            div.style.top = (window.innerHeight - 150) + 'px'; 
            div.style.color = color; 
            document.body.appendChild(div); setTimeout(() => div.remove(), 800); 
        }

        function flashScreen() {
            const flash = document.getElementById('error-flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);
        }

        function endGame() {
            isPlaying = false; 
            clearInterval(mainTimer);
            cancelAnimationFrame(animationId);
            bgm.pause();
            document.body.classList.remove('fever-mode');
            
            document.getElementById('hud').style.visibility = 'none';
            document.getElementById('mission-board').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text.split(':')[0].substring(3);
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳成績中...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=60s&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
</body>
</html>
