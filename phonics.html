<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Phonics Hyperdrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9; --secondary: #0984e3; --success: #00b894; --error: #d63031;
            --bg: #1e272e; --text-light: #f1f2f6; --fever-glow: #fdcb6e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; user-select: none;
            transition: background-color 0.3s;
        }

        body.fever-mode { animation: feverBg 1s infinite alternate; }
        @keyframes feverBg {
            0% { box-shadow: inset 0 0 50px rgba(253, 203, 110, 0.2); }
            100% { box-shadow: inset 0 0 100px rgba(225, 112, 85, 0.4); }
        }

        /* 漂浮音樂按鈕與離開按鈕 */
        .sound-toggle { position: fixed; top: 12px; right: 15px; background: rgba(255,255,255,0.9); border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; }
        .exit-btn { position: fixed; top: 12px; left: 15px; background: rgba(214,48,49,0.9); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #b33939; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #b33939; }

        /* 遊戲抬頭顯示器 (HUD) */
        #hud {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 600px; display: flex; justify-content: space-between;
            align-items: flex-end; z-index: 100; pointer-events: none;
        }

        .hud-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; border: 2px solid var(--primary); color: white; text-align: center; }
        #timer { font-size: 36px; font-weight: 900; color: var(--fever-glow); font-variant-numeric: tabular-nums;}
        #score { font-size: 24px; font-weight: 900; color: var(--success); margin-bottom: 5px; }
        #combo-display { font-size: 28px; font-weight: 900; color: #dfe6e9; transition: 0.2s; }
        .combo-active { color: var(--fever-glow) !important; text-shadow: 0 0 10px var(--fever-glow); transform: scale(1.2); display: inline-block; }

        /* ✨ 聽音雷達 ✨ */
        #mission-board {
            position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #2d3436; padding: 10px 20px;
            border-radius: 50px; font-size: 22px; font-weight: 900; z-index: 90;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary);
            white-space: nowrap; transition: 0.2s; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
        }
        #mission-board:active { transform: translateX(-50%) scale(0.95); }
        .replay-btn { background: #f1c40f; color: #2d3436; font-size: 16px; padding: 4px 12px; border-radius: 20px; box-shadow: 0 3px 0 #d4ac0d; }
        
        .mission-flash { animation: flashAlert 0.4s 2; }
        @keyframes flashAlert { 0%, 100% { background: rgba(255,255,255,0.95); transform: translateX(-50%) scale(1); } 50% { background: var(--fever-glow); transform: translateX(-50%) scale(1.1); } }

        /* 遊戲核心軌道區 */
        #game-container {
            flex-grow: 1; position: relative; width: 100%; max-width: 600px; margin: 0 auto;
            overflow: hidden; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1);
        }

        #track-bg {
            position: absolute; top: -100%; left: 0; width: 100%; height: 200%;
            background-image: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.05) 50%);
            background-size: 10px 100px; animation: scrollTrack 0.4s linear infinite; z-index: 1; pointer-events: none;
        }
        body.fever-mode #track-bg { animation-duration: 0.15s; background-image: linear-gradient(to bottom, transparent 50%, rgba(0, 206, 201, 0.2) 50%); }
        @keyframes scrollTrack { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        .lane-divider { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.1); z-index: 2; pointer-events: none; }
        .lane-div-1 { left: 33.33%; } .lane-div-2 { left: 66.66%; }

        #train {
            position: absolute; bottom: 20px; width: 80px; height: 80px;
            background: rgba(255,255,255,0.1); border-radius: 15px; font-size: 50px;
            display: flex; justify-content: center; align-items: center;
            z-index: 50; transition: left 0.1s ease-out; transform: translateX(-50%);
            filter: drop-shadow(0 -10px 20px rgba(0,206,201,0.5));
        }
        body.fever-mode #train { filter: drop-shadow(0 -15px 30px rgba(253,203,110,0.8)); font-size: 60px; }

        .falling-row {
            position: absolute; top: -100px; width: 100%; display: flex; justify-content: space-around;
            z-index: 30; animation-name: fallDown; animation-timing-function: linear; animation-fill-mode: forwards;
        }
        @keyframes fallDown { from { top: -100px; } to { top: 120%; } }

        .word-block {
            width: 28%; background: rgba(0,0,0,0.8); color: white; padding: 15px 0;
            text-align: center; border-radius: 12px; font-size: 22px; font-weight: 900;
            border: 3px solid #7f8c8d; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer; transition: transform 0.1s;
        }
        .word-block:active { transform: scale(0.9); }
        .block-correct-hit { background: var(--success) !important; border-color: #2ecc71 !important; transform: scale(1.2) !important; opacity: 0; transition: all 0.2s; pointer-events: none; }
        .block-wrong-hit { background: var(--error) !important; border-color: #e74c3c !important; animation: shake 0.3s; pointer-events: none; color: rgba(255,255,255,0.5); }

        /* Overlay */
        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 60000; overflow-y: auto; padding: 20px 10px; background: rgba(30, 39, 46, 0.95); }
        #end-msg { display: none; text-align: center; }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #0097e6; margin-bottom: 20px; transition: 0.1s;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0097e6; }
        
        .grade-group { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 90%; max-width: 400px; text-align: left; }
        .grade-title { font-size: 18px; font-weight: 900; margin: 0 0 10px 0; color: #ffeaa7; }
        select.theme-select { width: 100%; font-size: 16px; padding: 12px; border-radius: 15px; border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 50px; z-index: 55000; animation: burst 0.8s forwards; text-shadow: 2px 2px 0px black; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-100px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }

        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px; border-radius: 20px; z-index: 80000; text-align: center; box-shadow: 0 0 40px var(--fever-glow); border: 4px solid var(--fever-glow); width: 85%; max-width: 350px; }

        @media (max-width: 768px) {
            #mission-board { top: 140px; font-size: 18px; padding: 8px 15px; }
            .replay-btn { font-size: 14px; padding: 3px 8px; }
            .word-block { font-size: 18px; padding: 12px 0; }
            #train { width: 60px; height: 60px; font-size: 40px; bottom: 10px; }
            body.fever-mode #train { font-size: 50px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="arcade.mp3" loop></audio>
    <audio id="sfx-bingo" src="bingo.mp3"></audio>
    <audio id="sfx-fail" src="fail.mp3"></audio>
    <audio id="sfx-victory" src="victory.mp3"></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="start-overlay">
        <h1 style="font-size: 45px; color: var(--primary); text-shadow: 0 5px 15px rgba(0,206,201,0.5); text-align: center; margin-bottom: 10px;">🚀 Phonics Hyperdrive</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 15px; text-align: center; line-height: 1.5;">
            聽音辨字極速挑戰！<br>注意聽系統唸出的單字，找出正確軌道狂飆！
        </p>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入車長姓名..." autocomplete="off" maxlength="12">
        
        <div class="grade-group">
            <div class="grade-title">📘 選擇發音特訓關卡：</div>
            <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
                <optgroup label="四年級 (Grade 4)">
                    <option value="g4-th-voiceless-f">👅 L1: 無聲 [th] 與 [f] (易混淆音)</option>
                    <option value="g4-th-voiced">🗣️ L2: 有聲 [th] 與 無聲 [th]</option>
                </optgroup>
                <optgroup label="五年級 (Grade 5)">
                    <option value="g5-wh-ph">🐳 L3: [wh] 與 [ph] 發音挑戰</option>
                </optgroup>
            </select>
        </div>

        <button class="start-btn" onclick="startGame()">⚡ 啟動特快車！</button>

        <div class="result-panel" style="margin-top: 0px; padding: 15px;">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">🏆 極速英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
    </div>

    <!-- 遊戲 HUD -->
    <div id="hud">
        <div class="hud-box">
            <div style="font-size: 14px; color: #bdc3c7;">SCORE</div>
            <div id="score">0</div>
            <div id="combo-display">1x</div>
        </div>
        <div class="hud-box">
            <div style="font-size: 14px; color: #bdc3c7;">TIME</div>
            <div id="timer">60</div>
        </div>
    </div>

    <!-- ✨ 聽音雷達按鈕 ✨ -->
    <div id="mission-board" onclick="replayWord()">
        🎧 系統發音中... 
        <div class="replay-btn">點擊重聽</div>
    </div>

    <!-- 遊戲核心區 -->
    <div id="game-container">
        <div id="track-bg"></div>
        <div class="lane-divider lane-div-1"></div>
        <div class="lane-divider lane-div-2"></div>
        <div id="train" style="left: 50%;">🚂</div>
    </div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:var(--fever-glow); font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">ROCK 老師開啟狂飆模式！<br>獲得 <strong style="font-size: 30px;">+500</strong> 分！</p>
    </div>

    <div id="end-msg">
        <h1 style="font-size: 40px; color: var(--primary); margin: 0; margin-top: 10px;">時間到！🏁</h1>
        <div class="result-panel">
            <div class="score-breakdown" style="font-size: 24px;">
                最終積分：<br><span id="final-total-display" style="color:var(--error); font-size:45px;">0</span> pts
            </div>
            <h2 class="board-row" style="color: var(--primary); justify-content: center; border-top: 2px dashed #ddd; padding-top: 15px;">🌍 極速英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再飆一次</button>
    </div>

    <script>
        const badWords = ["fuck", "shit", "bitch", "ass", "dick", "pussy", "cunt", "slut", "whore", "idiot", "stupid", "幹", "靠北", "機掰", "智障", "白痴", "白癡", "垃圾", "操", "肏", "草泥馬", "媽的", "ㄘㄠˋ", "ㄍㄢˋ"];

        // 📝 精準題庫
        const wordBanks = {
            "g4-th-voiceless-f": ["thin", "fish", "thick", "four", "think", "five", "three", "foot", "bath", "half", "math", "leaf", "tooth", "fan", "face", "mouth"],
            "g4-th-voiced": ["this", "thin", "that", "thick", "these", "three", "those", "bath", "they", "math", "brother", "mother", "father", "mouth", "then", "tooth"],
            "g5-wh-ph": ["what", "phone", "when", "photo", "where", "white", "elephant", "whale", "dolphin", "who", "alphabet", "wheel", "why", "graph", "which"]
        };

        let score = 0, combo = 0, multiplier = 1, timeLeft = 60;
        let isPlaying = false, isMuted = false, isFever = false;
        let baseDropSpeed = 4.0; 
        let currentThemeWords = [], currentTargetWord = "";
        let playerName = "Player";
        let mainTimer;
        let eggBuffer = "";
        let currentThemeValue = "";

        const bgm = document.getElementById('bgm');
        const sfxBingo = document.getElementById('sfx-bingo');
        const sfxFail = document.getElementById('sfx-fail');
        const sfxVictory = document.getElementById('sfx-victory');
        const secretBgm = document.getElementById('secret-bgm');
        const gameContainer = document.getElementById('game-container');
        const trainEl = document.getElementById('train');
        const missionEl = document.getElementById('mission-board');
        
        // ⚠️ 記得換回您的 Google Apps Script 網址 ⚠️
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        window.onload = function() { 
            fetchFrontLeaderboard(); 
            document.addEventListener('keydown', (e) => {
                if(!isPlaying) return;
                if(/^[a-zA-Z]$/.test(e.key)) {
                    eggBuffer += e.key.toUpperCase();
                    if (eggBuffer.length > 4) eggBuffer = eggBuffer.slice(-4);
                    if (eggBuffer === "ROCK") triggerEasterEgg();
                }
            });
            gameContainer.addEventListener('mousedown', handleTap);
            gameContainer.addEventListener('touchstart', handleTap, {passive: false});
        };

        function toggleSound(e) {
            if (e) e.stopPropagation(); isMuted = !isMuted; const btn = document.getElementById('sound-btn');
            if (isMuted) { btn.innerHTML = "🔇 音效：關"; btn.style.borderColor = "var(--error)"; bgm.muted = true; secretBgm.muted = true; } 
            else { btn.innerHTML = "🔊 音效：開"; btn.style.borderColor = "var(--success)"; bgm.muted = false; secretBgm.muted = false; }
        }

        // ✨ 文字轉語音 (TTS) 引擎
        function speakWord(word) {
            if (isMuted) return;
            if ('speechSynthesis' in window) {
                bgm.volume = 0.1; // 稍微降低背景音量以聽清楚發音
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // 放慢一點點語速，讓小學生聽清楚
                utterance.onend = () => { if (isPlaying) bgm.volume = 0.4; }; // 唸完恢復音量
                window.speechSynthesis.cancel(); // 確保不會排隊唸一堆
                window.speechSynthesis.speak(utterance);
            }
        }

        function replayWord() {
            if (currentTargetWord) speakWord(currentTargetWord);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (isMuted) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            if (type === 'bingo') { sfxBingo.currentTime = 0; sfxBingo.play().catch(e=>console.log(e)); }
            else if (type === 'fail') { sfxFail.currentTime = 0; sfxFail.play().catch(e=>console.log(e)); }
            else if (type === 'fever') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            currentThemeValue = themeSelect.value;
            
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=get&theme=${currentThemeValue}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，快來搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入車長姓名喔！"); return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { alert("請保持禮貌喔！😇"); return; }

            // 啟動一下空語音，解鎖瀏覽器的自動播放限制
            if ('speechSynthesis' in window) { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }

            playerName = inputName; 
            currentThemeValue = document.getElementById('theme-select').value;
            currentThemeWords = wordBanks[currentThemeValue];

            document.getElementById('start-overlay').style.display = 'none';
            
            score = 0; combo = 0; multiplier = 1; timeLeft = 60; baseDropSpeed = 4.0;
            isPlaying = true;
            updateHUD();

            bgm.volume = 0.4; bgm.play().catch(e => console.log(e));
            
            document.querySelectorAll('.falling-row').forEach(e => e.remove());

            mainTimer = setInterval(() => {
                timeLeft--; updateHUD();
                if (timeLeft <= 0) endGame();
            }, 1000);

            // ✨ 啟動第一回合
            startNextRound();
        }

        // ✨ 全新回合制引擎：抽題 ➡️ 唸單字 ➡️ 掉方塊
        function startNextRound() {
            if (!isPlaying) return;

            // 1. 隨機選出這一回合要聽的目標單字
            currentTargetWord = currentThemeWords[Math.floor(Math.random() * currentThemeWords.length)];
            
            // 2. 唸出單字
            speakWord(currentTargetWord);
            
            // 3. 讓雷達閃爍提示
            missionEl.classList.remove('mission-flash');
            void missionEl.offsetWidth; 
            missionEl.classList.add('mission-flash');

            // 4. 生成掉落方塊
            spawnRow();
        }

        function spawnRow() {
            const row = document.createElement('div');
            row.className = 'falling-row';
            row.style.animationDuration = `${baseDropSpeed}s`;
            row.dataset.resolved = "false";

            // 抓出 2 個不等於目標單字的干擾選項
            let distractors = currentThemeWords.filter(w => w !== currentTargetWord).sort(() => Math.random() - 0.5).slice(0, 2);

            let wordsData = [
                { w: currentTargetWord, c: true }, 
                { w: distractors[0], c: false }, 
                { w: distractors[1], c: false }
            ].sort(() => Math.random() - 0.5);

            wordsData.forEach((data, index) => {
                const block = document.createElement('div');
                block.className = 'word-block';
                block.innerText = data.w;
                block.dataset.correct = data.c;
                block.dataset.lane = index; 
                row.appendChild(block);
            });

            // ✨ 如果方塊掉到底部都沒被點擊：算錯，並立刻開啟下一回合！
            row.addEventListener('animationend', () => {
                if (row.dataset.resolved === "false") {
                    row.dataset.resolved = "true";
                    breakCombo();
                    row.remove();
                    if(isPlaying) setTimeout(startNextRound, 200); // 稍微停頓 0.2 秒再出下一題
                }
            });

            gameContainer.appendChild(row);
        }

        function handleTap(e) {
            if (!isPlaying) return;
            if (e.type === 'touchstart') e.preventDefault();

            const block = e.target.closest('.word-block');
            if (!block) return;
            
            const row = block.parentElement;
            if (row.dataset.resolved === "true") return;

            // 標記這排已經被點過了，防止連點
            row.dataset.resolved = "true";

            // 移動火車到被點擊的軌道
            const laneMap = ['16.66%', '50%', '83.33%'];
            trainEl.style.left = laneMap[parseInt(block.dataset.lane)];

            if (block.dataset.correct === "true") {
                // ✨ 答對了
                block.classList.add('block-correct-hit');
                score += 10 * multiplier;
                combo++;
                updateCombo();
                playSfx('bingo');

                // 稍微加速
                baseDropSpeed = Math.max(1.2, baseDropSpeed - 0.08);

                const rect = block.getBoundingClientRect();
                showBurst(rect.left + rect.width/2 - 20, rect.top, `+${10*multiplier}`, "#00b894");

                // ✨ 秒殺舊方塊，立刻開始下一題！
                setTimeout(() => {
                    row.remove();
                    startNextRound();
                }, 150);

            } else {
                // ✨ 答錯了
                block.classList.add('block-wrong-hit');
                breakCombo();
                
                // ✨ 答錯稍微多停頓一下當作懲罰，再出下一題
                setTimeout(() => {
                    row.remove();
                    startNextRound();
                }, 300);
            }
            updateHUD();
        }

        function updateCombo() {
            const comboEl = document.getElementById('combo-display');
            if (combo >= 15) { multiplier = 5; activateFever(); }
            else if (combo >= 10) { multiplier = 3; deactivateFever(); comboEl.className = 'combo-active'; comboEl.style.color = '#0984e3'; }
            else if (combo >= 5)  { multiplier = 2; deactivateFever(); comboEl.className = 'combo-active'; comboEl.style.color = '#00b894'; }
            else { multiplier = 1; deactivateFever(); comboEl.className = ''; }
        }

        function breakCombo() {
            combo = 0; updateCombo(); playSfx('fail');
            
            document.body.style.backgroundColor = "rgba(214, 48, 49, 0.3)";
            setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 150);
            
            gameContainer.style.animation = "shake 0.3s";
            setTimeout(() => gameContainer.style.animation = "none", 300);

            // 速度稍微倒退
            baseDropSpeed = Math.min(4.0, baseDropSpeed + 0.2); 
        }

        function activateFever() {
            if (isFever) return;
            isFever = true;
            document.body.classList.add('fever-mode');
            document.getElementById('combo-display').className = 'combo-active';
            playSfx('fever');
            trainEl.innerText = "🔥";
        }

        function deactivateFever() {
            isFever = false;
            document.body.classList.remove('fever-mode');
            trainEl.innerText = "🚂";
        }

        function updateHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('combo-display').innerText = `${multiplier}x`;
        }

        function triggerEasterEgg() {
            eggBuffer = ""; score += 500; updateHUD();
            showBurst(window.innerWidth/2 - 50, window.innerHeight/2, "+500 🌟", "#f1c40f");
            
            bgm.pause(); secretBgm.currentTime = 0; secretBgm.volume = 0.6; secretBgm.play().catch(err => console.log(err));
            const modal = document.getElementById('secret-modal'); modal.style.display = 'block';
            setTimeout(() => { modal.style.display = 'none'; if(isPlaying) bgm.play(); }, 3000);
        }

        function showBurst(x, y, txt, color) {
            const div = document.createElement('div'); div.className = 'float-num'; div.textContent = txt; div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color; document.body.appendChild(div); setTimeout(() => div.remove(), 800);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(mainTimer);
            bgm.pause(); sfxVictory.currentTime = 0; sfxVictory.play().catch(e=>console.log(e));
            deactivateFever();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

            document.getElementById('final-total-display').textContent = score;
            document.getElementById('end-msg').style.display = "flex";

            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:18px;'>📡 紀錄上傳中...</div>";
            
            const url = `${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=60s&theme=${currentThemeValue}`;

            fetch(url).then(r => r.json()).then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) return;
                board.forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='color:var(--error); text-align:center;'>連線失敗</div>");
        }
    </script>
</body>
</html>
