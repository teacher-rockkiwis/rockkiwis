<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Phonics Hyperdrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9; --secondary: #0984e3; --success: #00b894; --error: #d63031;
            --bg: #1e272e; --text-light: #f1f2f6; --fever-glow: #fdcb6e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif; overflow: hidden; display: flex; flex-direction: column; user-select: none; transition: background-color 0.3s; }
        body.fever-mode { animation: feverBg 1s infinite alternate; }
        @keyframes feverBg { 0% { box-shadow: inset 0 0 50px rgba(253, 203, 110, 0.2); } 100% { box-shadow: inset 0 0 100px rgba(225, 112, 85, 0.4); } }
        .sound-toggle { position: fixed; top: 12px; right: 15px; background: rgba(255,255,255,0.9); border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; }
        .exit-btn { position: fixed; top: 12px; left: 15px; background: rgba(214,48,49,0.9); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #b33939; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #b33939; }
        #hud { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 100; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; border: 2px solid var(--primary); color: white; text-align: center; }
        #timer { font-size: 36px; font-weight: 900; color: var(--fever-glow); font-variant-numeric: tabular-nums;}
        #score { font-size: 24px; font-weight: 900; color: var(--success); margin-bottom: 5px; }
        #combo-display { font-size: 28px; font-weight: 900; color: #dfe6e9; transition: 0.2s; }
        .combo-active { color: var(--fever-glow) !important; text-shadow: 0 0 10px var(--fever-glow); transform: scale(1.2); display: inline-block; }
        #mission-board { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); color: #2d3436; padding: 10px 20px; border-radius: 50px; font-size: 22px; font-weight: 900; z-index: 90; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary); white-space: nowrap; transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        #mission-board:active { transform: translateX(-50%) scale(0.95); }
        .replay-btn { background: #f1c40f; color: #2d3436; font-size: 16px; padding: 4px 12px; border-radius: 20px; box-shadow: 0 3px 0 #d4ac0d; }
        .mission-flash { animation: flashAlert 0.4s 2; }
        @keyframes flashAlert { 0%, 100% { background: rgba(255,255,255,0.95); transform: translateX(-50%) scale(1); } 50% { background: var(--fever-glow); transform: translateX(-50%) scale(1.1); } }
        #game-container { flex-grow: 1; position: relative; width: 100%; max-width: 600px; margin: 0 auto; overflow: hidden; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1); }
        #track-bg { position: absolute; top: -100%; left: 0; width: 100%; height: 200%; background-image: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.05) 50%); background-size: 10px 100px; animation: scrollTrack 0.4s linear infinite; z-index: 1; pointer-events: none; }
        body.fever-mode #track-bg { animation-duration: 0.15s; background-image: linear-gradient(to bottom, transparent 50%, rgba(0, 206, 201, 0.2) 50%); }
        @keyframes scrollTrack { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }
        .lane-divider { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.1); z-index: 2; pointer-events: none; }
        .lane-div-1 { left: 33.33%; } .lane-div-2 { left: 66.66%; }
        
        /* 特快車樣式 */
        #train { position: absolute; bottom: 20px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 15px; font-size: 50px; display: flex; justify-content: center; align-items: center; z-index: 50; transition: left 0.1s ease-out; transform: translateX(-50%); filter: drop-shadow(0 -10px 20px rgba(0,206,201,0.5)); }
        body.fever-mode #train { filter: drop-shadow(0 -15px 30px rgba(253,203,110,0.8)); font-size: 60px; }
        
        .falling-row { position: absolute; top: -100px; width: 100%; display: flex; justify-content: space-around; z-index: 30; animation-name: fallDown; animation-timing-function: linear; animation-fill-mode: forwards; }
        @keyframes fallDown { from { top: -100px; } to { top: 120%; } }
        
        /* 單字方塊取消 hover 互動，因為變成用車子去撞 */
        .word-block { width: 28%; background: rgba(0,0,0,0.8); color: white; padding: 15px 0; text-align: center; border-radius: 12px; font-size: 22px; font-weight: 900; border: 3px solid #7f8c8d; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .block-correct-hit { background: var(--success) !important; border-color: #2ecc71 !important; transform: scale(1.2) !important; opacity: 0; transition: all 0.2s; pointer-events: none; }
        .block-wrong-hit { background: var(--error) !important; border-color: #e74c3c !important; animation: shake 0.3s; pointer-events: none; color: rgba(255,255,255,0.5); }
        
        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 60000; overflow-y: auto; padding: 20px 10px; background: rgba(30, 39, 46, 0.95); }
        #end-msg { display: none; text-align: center; }
        
        select.theme-select { 
            width: 100%; font-size: 16px; padding: 12px 15px; border-radius: 15px; 
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700;
            color: #2c3e50; background-color: #ffffff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; margin-bottom: 20px;
        }
        select.theme-select option, select.theme-select optgroup { color: #2c3e50; background-color: #ffffff; }

        #error-msg { display: none; color: #ffcccc; font-weight: 900; margin-bottom: 15px; background: rgba(255, 71, 87, 0.9); padding: 10px 20px; border-radius: 20px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #0097e6; margin-bottom: 20px; transition: 0.1s;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0097e6; }
        .grade-group { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 90%; max-width: 400px; text-align: left; }
        .grade-title { font-size: 18px; font-weight: 900; margin: 0 0 10px 0; color: #ffeaa7; }
        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}
        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark); }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; } #front-leaderboard-list::-webkit-scrollbar { width: 6px; } #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 50px; z-index: 55000; animation: burst 0.8s forwards; text-shadow: 2px 2px 0px black; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-100px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px; border-radius: 20px; z-index: 80000; text-align: center; box-shadow: 0 0 40px var(--fever-glow); border: 4px solid var(--fever-glow); width: 85%; max-width: 350px; }
        @media (max-width: 768px) { #mission-board { top: 140px; font-size: 18px; padding: 8px 15px; } .replay-btn { font-size: 14px; padding: 3px 8px; } .word-block { font-size: 18px; padding: 12px 0; } #train { width: 60px; height: 60px; font-size: 40px; bottom: 10px; } body.fever-mode #train { font-size: 50px; } }
    </style>
</head>
<body>
    <audio id="bgm" src="arcade.mp3" loop></audio>
    <audio id="sfx-bingo" src="bingo.mp3"></audio>
    <audio id="sfx-fail" src="fail.mp3"></audio>
    <audio id="sfx-victory" src="victory.mp3"></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="start-overlay">
        <h1 style="font-size: 45px; color: var(--primary); text-shadow: 0 5px 15px rgba(0,206,201,0.5); text-align: center; margin-bottom: 10px;">🚀 Phonics Hyperdrive</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 15px; text-align: center; line-height: 1.5;">
            聽音辨字極速挑戰！<br>
            注意聽系統唸出的單字，點選畫面車道或使用<strong style="color:var(--gold)">鍵盤 ⬅️ ➡️</strong><br>
            移動特快車接取單字！
        </p>
        
        <div class="front-leaderboard" style="margin-top: 0px; padding: 15px;">
            <h3 id="front-board-title">🏆 極速英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">請先選擇下方關卡，以查看英雄榜！</div></div>
        </div>

        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入車長姓名..." autocomplete="off" maxlength="12">
        <div class="grade-group">
            <div class="grade-title">📘 選擇發音特訓關卡：</div>
