<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Grammar ER</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0984e3; --success: #00b894; --error: #d63031;
            --bg: #dfe6e9; --bed-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; user-select: none;
        }

        /* ✨ 漂浮的音樂控制按鈕 */
        .sound-toggle {
            position: fixed; top: 15px; right: 15px;
            background: white; border: 3px solid var(--success); border-radius: 50px;
            padding: 8px 15px; font-size: 16px; font-weight: 900;
            cursor: pointer; font-family: 'Quicksand', sans-serif; color: #2d3436;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 50000; transition: 0.2s;
        }
        .sound-toggle:hover { transform: scale(1.05); }
        .sound-toggle:active { transform: scale(0.95); }

        #header {
            height: 60px; background: white; border-bottom: 3px solid #b2bec3;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 15px; flex-shrink: 0; visibility: hidden;
        }
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: #2d3436; }

        /* 遊戲區：6張病床的網格 */
        #hospital-ward {
            flex-grow: 1; padding: 15px; display: grid;
            grid-template-columns: repeat(3, 1fr); gap: 15px;
            visibility: hidden;
        }

        /* 病床設計 */
        .bed {
            background: var(--bed-bg); border-radius: 20px; border: 4px solid #b2bec3;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 10px; position: relative; box-shadow: 0 8px 0 #b2bec3;
            transition: 0.1s;
        }
        .bed.active { border-color: var(--primary); box-shadow: 0 8px 0 var(--primary); transform: translateY(-3px); }
        .bed.error { border-color: var(--error); box-shadow: 0 8px 0 var(--error); animation: shake 0.3s; }
        
        /* 病人與對話框 */
        .patient-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; opacity: 0; transition: 0.2s; pointer-events: none; }
        .bed.active .patient-area { opacity: 1; pointer-events: auto; }
        
        .bubble {
            background: #ffeaa7; padding: 8px 12px; border-radius: 15px; font-size: 20px;
            font-weight: 900; color: #2d3436; text-align: center; margin-bottom: 5px;
            position: relative; border: 2px solid #fdcb6e; width: 100%;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #fdcb6e transparent transparent transparent;
        }
        .emoji { font-size: 50px; margin-bottom: 10px; }

        /* 治療按鈕 */
        .action-btns { display: flex; gap: 10px; width: 100%; opacity: 0; pointer-events: none; }
        .bed.active .action-btns { opacity: 1; pointer-events: auto; }
        
        .btn-cure {
            flex: 1; padding: 10px 0; font-size: 22px; font-weight: 900; border: none; border-radius: 10px;
            cursor: pointer; color: white; transition: 0.1s; box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }
        .btn-cure:active { transform: translateY(5px); box-shadow: 0 0 0 rgba(0,0,0,0.2); }
        .btn-hurt { background: #00cec9; }
        .btn-hurts { background: #fd79a8; }
        .btn-rock { background: #f1c40f; color: #2d3436; flex: 100%; font-size: 26px; } 

        /* Overlay 介面 */
        #start-overlay, #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            z-index: 20000; overflow-y: auto; padding: 30px 10px;
        }
        #start-overlay { background: var(--primary); color: white; }
        #end-msg { background: rgba(255,255,255,0.98); display: none; text-align: center; }

        .front-leaderboard {
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px;
            width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: #2d3436;
        }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; }
        #front-leaderboard-list::-webkit-scrollbar { width: 6px; }
        #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }

        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; }
        .front-board-row:last-child { border-bottom: none; }

        .name-input {
            font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none;
            text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700;
            margin-bottom: 20px; width: 300px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); outline: none;
        }
        .start-btn {
            background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 30px; border-radius: 50px;
            font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #219150; margin-bottom: 30px;
        }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0; text-align: left; }
        .score-breakdown { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; }
        .final-score-display { font-size: 36px; color: var(--error); text-align: center; font-weight: 900; margin-top: 10px; }
        
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        #leaderboard-list::-webkit-scrollbar { width: 6px; }
        #leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }

        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; }
        
        #secret-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); color: white; padding: 30px 40px; border-radius: 20px;
            z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 85%; max-width: 450px;
        }

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 80px; z-index: 30000; text-shadow: 4px 4px 0px white, -4px -4px 0px white; animation: burst 0.8s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }

        @media (max-width: 768px) {
            .sound-toggle { top: 10px; right: 10px; font-size: 14px; padding: 6px 12px; }
            #hospital-ward { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .bubble { font-size: 16px; padding: 5px; }
            .emoji { font-size: 40px; }
            .btn-cure { font-size: 18px; padding: 8px 0; }
            #start-overlay h1 { font-size: 40px !important; }
            .name-input { font-size: 20px; padding: 10px; }
            .start-btn { font-size: 24px; padding: 10px 40px; }
            .float-num { font-size: 60px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="music.mp3" loop></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>

    <!-- ✨ 加入全局靜音按鈕 -->
    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 50px; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">🏥 Dr. ROCK's ER</h1>
        <p style="font-size: 16px; margin-bottom: 15px;">What's wrong? 趕快拯救病患！</p>
        
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 急診室英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入玩家姓名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" onchange="fetchFrontLeaderboard()" style="font-size: 18px; padding: 8px 15px; margin-bottom: 15px; border-radius: 15px; border:none; outline:none; font-family: 'Quicksand'; font-weight: 700;">
            <option value="er-level1">💉 Level 1 (基礎部位)</option>
            <option value="er-level2">💊 Level 2 (進階不規則變化)</option>
            <option value="er-level3">🚑 Level 3 (瘋狂急診室)</option>
        </select>
        <button class="start-btn" onclick="startGame()">開始看診！</button>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Dr. Player</span></div>
        <div class="stat-pill">💖 治癒: <span id="cured-val" style="color:var(--success);">0</span>/20</div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:var(--primary);">0</span></div>
        <div class="stat-pill">⏱️ <span id="timer-val">00m 00s</span></div>
        <!-- ✨ 離開按鈕改為回大廳 -->
        <button onclick="location.href='index.html'" style="font-weight:900; border:none; background:none; cursor:pointer; color:#636e72;">回大廳</button>
    </div>

    <div id="hospital-ward"></div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:#f1c40f; font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">你治癒了 ROCK 老師！<br>獲得額外 <strong style="font-size: 30px;">+100</strong> 分！<br><span style="color:#fdcb6e; font-size:18px;">(這是我們的秘密，請勿聲張🤫)</span></p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">下班囉！🎉</h1>
        <div class="result-panel">
            <div class="score-breakdown">
                <div>🎯 基礎得分： <span id="base-score-display"></span> pts</div>
                <div>⏱️ 搶救時間： <span id="time-taken-display"></span></div>
                <div>⚡ 速度加成： <span id="multiplier-display" style="color:var(--success)"></span></div>
                <div class="final-score-display">最終總分： <span id="final-total-display"></span></div>
            </div>
            <h2 class="leaderboard-title" id="end-board-title">🌍 急診室英雄榜</h2>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px;">再挑戰一次</button>
    </div>

    <script>
        const badWords = ["fuck", "shit", "bitch", "ass", "dick", "pussy", "cunt", "slut", "whore", "idiot", "stupid", "幹", "靠北", "機掰", "智障", "白痴", "垃圾", "操", "肏", "草泥馬", "媽的", "ㄘㄠˋ", "ㄍㄢˋ"];

        const grammarData = {
            "er-level1": {
                "hurt": ["eyes", "ears", "hands", "feet", "legs"],
                "hurts": ["eye", "ear", "hand", "foot", "leg", "head", "nose", "mouth"]
            },
            "er-level2": {
                "hurt": ["eyes", "ears", "arms", "hands", "shoulders", "feet", "legs", "teeth"],
                "hurts": ["eye", "ear", "arm", "hand", "shoulder", "foot", "leg", "head", "nose", "mouth", "back", "neck", "tooth"]
            },
            "er-level3": { 
                "hurt": ["eyes", "ears", "arms", "hands", "shoulders", "feet", "legs", "teeth"],
                "hurts": ["eye", "ear", "arm", "hand", "shoulder", "foot", "leg", "head", "nose", "mouth", "back", "neck", "tooth"]
            }
        };

        const emojis = ["🤕", "🤒", "🤧", "😵", "😷", "🥴"];

        let score = 0, curedCount = 0, targetCures = 20, seconds = 0;
        let playerName = "Player", currentTheme = "er-level1";
        let timerInterval, spawnInterval;
        let activeBeds = [false, false, false, false, false, false]; 
        let isMuted = false; // ✨ 記錄目前的靜音狀態

        const bgm = document.getElementById('bgm');
        const secretBgm = document.getElementById('secret-bgm');

        // ⚠️ 請換成您的 Google Apps Script 網址 ⚠️
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        window.onload = function() { fetchFrontLeaderboard(); initBeds(); };

        // ✨ 靜音切換功能
        function toggleSound(e) {
            if (e) e.stopPropagation(); 
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            
            if (isMuted) {
                btn.innerHTML = "🔇 音效：關";
                btn.style.borderColor = "var(--error)";
                bgm.muted = true;
                secretBgm.muted = true;
            } else {
                btn.innerHTML = "🔊 音效：開";
                btn.style.borderColor = "var(--success)";
                bgm.muted = false;
                secretBgm.muted = false;
            }
        }

        function initBeds() {
            const ward = document.getElementById('hospital-ward');
            ward.innerHTML = "";
            for(let i=0; i<6; i++) {
                ward.innerHTML += `
                    <div class="bed" id="bed-${i}">
                        <div class="patient-area">
                            <div class="bubble" id="bubble-${i}">My ...</div>
                            <div class="emoji" id="emoji-${i}">🤕</div>
                        </div>
                        <div class="action-btns" id="btns-${i}"></div>
                    </div>
                `;
            }
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            currentTheme = themeSelect.value;
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('front-board-title').innerText = `🏆 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";

            fetch(`${GOOGLE_API_URL}?action=get&theme=${currentTheme}`)
            .then(response => response.json())
            .then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) {
                    listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px;'>目前無紀錄，快來搶下首殺！</div>"; return;
                }
                board.forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='front-board-row'><span>${rankStr} ${p.name}</span><span>${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (isMuted) return; // ✨ 靜音開啟時不播放
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3); 
            }
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入醫生姓名喔！"); return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) {
                alert("請使用有禮貌的名字喔！😇"); return;
            }

            playerName = inputName;
            document.getElementById('display-name').innerText = "Dr. " + playerName;

            bgm.volume = 0.4; 
            bgm.play().catch(e => console.log(e));
            secretBgm.onended = function() { bgm.play(); };

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('header').style.visibility = 'visible';
            document.getElementById('hospital-ward').style.visibility = 'visible';
            
            score = 0; curedCount = 0; seconds = 0;
            timerInterval = setInterval(countUp, 1000);
            
            let speed = currentTheme === "er-level3" ? 1000 : 1500;
            spawnInterval = setInterval(spawnPatient, speed);
            spawnPatient(); 
        }

        function spawnPatient() {
            if (curedCount >= targetCures) return;

            let emptyBeds = [];
            activeBeds.forEach((isActive, idx) => { if(!isActive) emptyBeds.push(idx); });
            if (emptyBeds.length === 0) return; 

            let bedIdx = emptyBeds[Math.floor(Math.random() * emptyBeds.length)];
            activeBeds[bedIdx] = true;

            const bedEl = document.getElementById(`bed-${bedIdx}`);
            const bubbleEl = document.getElementById(`bubble-${bedIdx}`);
            const emojiEl = document.getElementById(`emoji-${bedIdx}`);
            const btnsEl = document.getElementById(`btns-${bedIdx}`);

            let isEasterEgg = Math.random() < 0.05;

            if (isEasterEgg) {
                bubbleEl.innerHTML = "I am...";
                emojiEl.innerText = "😎";
                btnsEl.innerHTML = `<button class="btn-cure btn-rock" onclick="handleCure(${bedIdx}, 'ROCK', 'ROCK', event)">ROCK</button>`;
            } else {
                let needsPlural = Math.random() < 0.5;
                let targetWord = "";
                let correctAnswer = "";

                if (needsPlural) {
                    let words = grammarData[currentTheme].hurt;
                    targetWord = words[Math.floor(Math.random() * words.length)];
                    correctAnswer = "hurt";
                } else {
                    let words = grammarData[currentTheme].hurts;
                    targetWord = words[Math.floor(Math.random() * words.length)];
                    correctAnswer = "hurts";
                }

                bubbleEl.innerHTML = `My <b>${targetWord}</b>...`;
                emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                let btnHtml1 = `<button class="btn-cure btn-hurt" onclick="handleCure(${bedIdx}, 'hurt', '${correctAnswer}', event)">hurt</button>`;
                let btnHtml2 = `<button class="btn-cure btn-hurts" onclick="handleCure(${bedIdx}, 'hurts', '${correctAnswer}', event)">hurts</button>`;
                btnsEl.innerHTML = Math.random() > 0.5 ? btnHtml1 + btnHtml2 : btnHtml2 + btnHtml1;
            }

            bedEl.classList.add('active');

            let stayTime = currentTheme === "er-level3" ? 2500 : 3500;
            setTimeout(() => {
                if(activeBeds[bedIdx]) {
                    clearBed(bedIdx); 
                }
            }, stayTime);
        }

        function handleCure(bedIdx, chosenAnswer, correctAnswer, event) {
            if (!activeBeds[bedIdx]) return;

            const rect = event.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;

            if (chosenAnswer === 'ROCK') {
                score += 100;
                showBurst(x, y, "+100 🌟", "#f1c40f");
                
                bgm.pause();
                secretBgm.currentTime = 0; secretBgm.volume = 0.6; 
                secretBgm.play().catch(err => console.log(err));
                
                const modal = document.getElementById('secret-modal');
                modal.style.display = 'block';
                setTimeout(() => { modal.style.display = 'none'; }, 3000);
                
                clearBed(bedIdx);
                document.getElementById('score-val').textContent = score;
                return;
            }

            if (chosenAnswer === correctAnswer) {
                score += 10;
                curedCount++;
                playSfx('success');
                showBurst(x, y, "+10", "#00b894");
                document.getElementById('score-val').textContent = score;
                document.getElementById('cured-val').textContent = curedCount;
                clearBed(bedIdx);

                if (curedCount >= targetCures) {
                    setTimeout(calculateAndEndGame, 500);
                }
            } else {
                score = Math.max(0, score - 2);
                playSfx('error');
                showBurst(x, y, "-2", "#d63031");
                document.getElementById('score-val').textContent = score;
                
                const bedEl = document.getElementById(`bed-${bedIdx}`);
                bedEl.classList.add('error');
                setTimeout(() => { bedEl.classList.remove('error'); }, 300);
            }
        }

        function clearBed(bedIdx) {
            activeBeds[bedIdx] = false;
            document.getElementById(`bed-${bedIdx}`).classList.remove('active');
        }

        function showBurst(x, y, txt, color) {
            const div = document.createElement('div');
            div.className = 'float-num'; div.textContent = txt; div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function countUp() {
            seconds++;
            const m = Math.floor(seconds/60).toString().padStart(2,'0');
            const s = (seconds%60).toString().padStart(2,'0');
            document.getElementById('timer-val').textContent = `${m}m ${s}s`;
        }

        function calculateAndEndGame() {
            clearInterval(timerInterval);
            clearInterval(spawnInterval);
            bgm.pause(); secretBgm.pause();
            
            let multiplier = 1.0; let tierName = "🐢 實習醫生 (x1.0)";
            if (seconds <= 25) { multiplier = 3.0; tierName = "⚡ 神醫黑傑克 (x3.0)"; }
            else if (seconds <= 35) { multiplier = 2.0; tierName = "🚀 主治醫師 (x2.0)"; }
            else if (seconds <= 50) { multiplier = 1.5; tierName = "🏃 總醫師 (x1.5)"; }
            else if (seconds <= 70) { multiplier = 1.2; tierName = "🚶 住院醫師 (x1.2)"; }
            
            const finalScore = Math.floor(score * multiplier);
            const timeStr = `${Math.floor(seconds/60).toString().padStart(2,'0')}m ${(seconds%60).toString().padStart(2,'0')}s`; 
            
            document.getElementById('base-score-display').textContent = score;
            document.getElementById('time-taken-display').textContent = timeStr;
            document.getElementById('multiplier-display').textContent = tierName;
            document.getElementById('final-total-display').textContent = finalScore;

            document.getElementById('end-msg').style.display = "flex";

            saveAndDisplayGlobalLeaderboard(finalScore, timeStr);
        }

        function saveAndDisplayGlobalLeaderboard(finalScore, timeStr) {
            const listDiv = document.getElementById('leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('end-board-title').innerText = `🌍 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳成績到醫院總部...</div>";
            
            const url = `${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${finalScore}&time=${encodeURIComponent(timeStr)}&theme=${currentTheme}`;

            fetch(url).then(r => r.json()).then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) { listDiv.innerHTML = "<div>你是第一個破關的醫生！</div>"; return; }
                board.forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name} (${p.time})</span><span>${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='color:var(--error); text-align:center;'>連線失敗</div>");
        }
    </script>
</body>
</html>
