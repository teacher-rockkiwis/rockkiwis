<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Ghostbusters</title>
    <link rel="stylesheet" href="common.css">
    <style>
        :root { --primary: #9b59b6; --success: #2ed573; --error: #ff4757; --bg: #2c3e50; --window-dark: #636e72; --window-lit: #ffeaa7; --text-dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif; overflow: hidden; display: flex; flex-direction: column; user-select: none; }
        .sound-toggle { position: fixed; top: 12px; right: 15px; background: white; border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900; cursor: pointer; font-family: 'Quicksand', sans-serif; color: var(--text-dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 50000; transition: 0.2s; }
        .sound-toggle:hover { transform: scale(1.05); } .sound-toggle:active { transform: scale(0.95); }
        #header { height: 60px; background: rgba(255,255,255,0.95); border-bottom: 3px solid #8e44ad; display: flex; justify-content: space-around; align-items: center; padding: 0 140px 0 10px; flex-shrink: 0; visibility: hidden; z-index: 100; }
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: var(--text-dark); }
        .exit-btn { background: #ff7675; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; font-family: 'Quicksand', sans-serif; box-shadow: 0 4px 0 #d63031; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d63031; }
        #radar-box { background: #000; color: #2ed573; text-align: center; padding: 10px; font-size: 28px; font-weight: 900; letter-spacing: 1px; border-bottom: 4px solid #2ed573; box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4); visibility: hidden; z-index: 90; text-shadow: 0 0 8px #2ed573; }
        #mansion { flex-grow: 1; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; visibility: hidden; align-content: center; max-width: 1000px; margin: 0 auto; width: 100%; }
        .window { background: var(--window-dark); border-radius: 15px; border: 6px solid #1e272e; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s background; height: 100%; min-height: 180px; }
        .window.lit { background: var(--window-lit); box-shadow: 0 0 30px rgba(255, 234, 167, 0.5); border-color: #f39c12; }
        .window.error { background: var(--error); border-color: #c0392b; animation: shake 0.3s; }
        .room-label { background: rgba(0,0,0,0.7); color: white; text-align: center; padding: 5px; font-size: 18px; font-weight: 900; z-index: 20; letter-spacing: 1px; }
        .ghost-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transform: translateY(100%); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding-bottom: 10px; }
        .window.lit .ghost-area { transform: translateY(0); }
        .ghost-emoji { font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .grammar-panel { background: white; border-radius: 10px; padding: 8px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 5px; width: 90%; border: 3px solid #8e44ad; }
        .action-btns { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-grammar { flex: 1; padding: 8px 0; font-size: 18px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.1s; background: #8e44ad; box-shadow: 0 4px 0 #6c3483; }
        .btn-grammar:active { transform: translateY(4px); box-shadow: 0 0 0 #6c3483; }
        .btn-grammar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-rock { background: #f1c40f; color: var(--text-dark); box-shadow: 0 4px 0 #d4ac0d; font-size: 20px;}
        .sentence-tail { font-size: 14px; font-weight: 900; color: var(--text-dark); }
        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 20000; overflow-y: auto; padding: 30px 10px; }
        #start-overlay { background: var(--primary); color: white; } #end-msg { background: rgba(255,255,255,0.98); display: none; text-align: center; }
        
        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark); }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; } #front-leaderboard-list::-webkit-scrollbar { width: 6px; } #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }
        
        /* ✨ 終極修正：強制指定顏色與外觀，解決 iOS Safari 白底白字的問題 ✨ */
        select.theme-select { 
            width: 100%; font-size: 16px; padding: 12px 15px; border-radius: 10px; 
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700;
            color: #2c3e50; background-color: #ffffff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; margin-bottom: 20px;
        }

        /* ✨ 新增錯誤提示訊息樣式 ✨ */
        .grade-group { background: rgba(0,0,0,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 90%; max-width: 350px; text-align: left;}
        .grade-title { font-size: 18px; font-weight: 900; margin: 0 0 10px 0; color: #ffeaa7;}

        .name-input { font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 20px; width: 300px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); outline: none; }
        .start-btn { background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 30px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #219150; margin-bottom: 30px; }
        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0; text-align: left; }
        .score-breakdown { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: var(--text-dark);}
        .final-score-display { font-size: 36px; color: var(--error); text-align: center; font-weight: 900; margin-top: 10px; }
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; } #leaderboard-list::-webkit-scrollbar { width: 6px; } #leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; color: var(--text-dark);}
        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px 40px; border-radius: 20px; z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 85%; max-width: 450px; }
        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 80px; z-index: 30000; text-shadow: 4px 4px 0px white, -4px -4px 0px white; animation: burst 0.8s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
        @media (max-width: 768px) { .sound-toggle { top: 8px; right: 8px; font-size: 13px; padding: 6px 10px; } #header { padding: 0 105px 0 5px; height: 50px; gap: 5px; } .stat-pill { font-size: 13px !important; padding: 4px 6px; } .exit-btn { font-size: 13px; padding: 5px 8px; } #mansion { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } #win-4 { grid-column: span 2; } #radar-box { font-size: 18px; padding: 8px; } .ghost-emoji { font-size: 45px; margin-bottom: 5px; } .btn-grammar { font-size: 14px; padding: 6px 0; } .sentence-tail { font-size: 12px; } #start-overlay h1 { font-size: 40px !important; } .name-input { font-size: 20px; padding: 10px; } .start-btn { font-size: 24px; padding: 10px 40px; } .float-num { font-size: 60px; } }
    </style>
    <script src="common.js"></script>
</head>
<body>
    <audio id="bgm" src="bgm/ghost.mp3" loop></audio>
    <audio id="secret-bgm" src="bgm/67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 50px; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">👻 抓鬼特攻隊</h1>
        <p style="font-size: 16px; margin-bottom: 15px;">Where are they? 語法打地鼠極速挑戰！</p>
        
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 抓鬼英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">請先選擇下方關卡，以查看英雄榜！</div></div>
        </div>

        <!-- ✨ 錯誤提示窗 ✨ -->
        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入特攻隊員姓名..." autocomplete="off" maxlength="12">
        
        <div class="grade-group">
            <div class="grade-title">📘 選擇挑戰關卡：</div>
            <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
                <option value="" disabled selected hidden>▼ 請先選擇挑戰關卡...</option>
                <option value="ghost-g4-l1">📍 L1: Where are you? (地點)</option>
                <option value="ghost-g4-l2">🏃‍♂️ L2: What are you doing? (動作)</option>
            </select>
        </div>

        <button class="start-btn" onclick="startGame()">開始抓鬼！</button>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Player</span></div>
        <div class="stat-pill">👻 抓獲: <span id="caught-val" style="color:var(--primary);">0</span>/20</div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:#f39c12;">0</span></div>
        <div class="stat-pill">⏱️ <span id="timer-val">00m 00s</span></div>
        <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>
    </div>

    <div id="radar-box">📡 正在搜尋目標...</div>

    <div id="mansion">
        <div class="window" id="win-0"><div class="room-label" id="label-0">🛏️ bedroom</div><div class="ghost-area" id="ghost-0"></div></div>
        <div class="window" id="win-1"><div class="room-label" id="label-1">🛋️ living room</div><div class="ghost-area" id="ghost-1"></div></div>
        <div class="window" id="win-2"><div class="room-label" id="label-2">🪑 dining room</div><div class="ghost-area" id="ghost-2"></div></div>
        <div class="window" id="win-3"><div class="room-label" id="label-3">🍳 kitchen</div><div class="ghost-area" id="ghost-3"></div></div>
        <div class="window" id="win-4"><div class="room-label" id="label-4">🛁 bathroom</div><div class="ghost-area" id="ghost-4"></div></div>
    </div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:#f1c40f; font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">你找到了 ROCK 老師！<br>獲得額外 <strong style="font-size: 30px;">+100</strong> 分！<br><span style="color:#fdcb6e; font-size:18px;">(這是我們的秘密，請勿聲張🤫)</span></p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">任務完成！🎉</h1>
        <div class="result-panel">
            <div class="score-breakdown">
                <div>🎯 基礎得分： <span id="base-score-display"></span> pts</div>
                <div>⏱️ 任務時間： <span id="time-taken-display"></span></div>
                <div>⚡ 速度加成： <span id="multiplier-display" style="color:var(--success)"></span></div>
                <div class="final-score-display">最終總分： <span id="final-total-display"></span></div>
            </div>
            <h2 class="leaderboard-title" id="end-board-title">🌍 抓鬼英雄榜</h2>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px;">再玩一次</button>
        <button onclick="location.href='index.html'" style="padding:12px 40px; font-size:20px; background:#7f8c8d; color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px;">回大廳</button>
    </div>

    <script>
        // 🛡️ 防外掛系統
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { 
                e.preventDefault(); return false; 
            }
        });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);

        
        // ✨ 新增 Unit 2 題庫 ✨

        const roomData = [ { id: 0, text: "bedroom" }, { id: 1, text: "living room" }, { id: 2, text: "dining room" }, { id: 3, text: "kitchen" }, { id: 4, text: "bathroom" } ];

        let score = 0, caughtCount = 0, targetCaught = 20, seconds = 0;
        let playerName = "Player", currentTheme = "";
        let timerInterval, spawnInterval;
        let activeWindows = [false, false, false, false, false]; 
        let isMuted = false, eggBuffer = "";
        let userIP = "Unknown";
        
        let audioCtx = null; 
        let currentQuestions = [];

        const bgm = document.getElementById('bgm'); const secretBgm = document.getElementById('secret-bgm');

        window.onload = function() { 
            fetchFrontLeaderboard(); 
            document.addEventListener('keydown', (e) => { 
                if(document.getElementById('mansion').style.visibility === 'visible' && /^[a-zA-Z]$/.test(e.key)) { 
                    eggBuffer += e.key.toUpperCase(); 
                    if(eggBuffer.length > 4) eggBuffer = eggBuffer.slice(-4); 
                    if(eggBuffer === "ROCK") triggerEasterEgg(); 
                } 
            });
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };


        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); const themeSelect = document.getElementById('theme-select');
            
            // ✨ 防呆提示 ✨
            if (themeSelect.value === "") {
                listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>請先選擇上方關卡，以查看英雄榜！</div>";
                return;
            }

            currentTheme = themeSelect.value;
            const optionText = themeSelect.options[themeSelect.selectedIndex].text;
            document.getElementById('front-board-title').innerText = `🏆 ${optionText} 榜`; listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${currentTheme}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='front-board-row'><span>${rankStr} ${p.name}</span><span>${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        function playSfx(type) {
            if (isMuted) return; 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (!audioCtx) return;
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'select') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); 
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1); 
                } 
                else if (type === 'success') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.1); 
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); 
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3); 
                } 
                else if (type === 'error') { 
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); 
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2); 
                }
            } catch (e) {
                console.log("音效模組被瀏覽器阻擋", e);
            }
        }

        async function startGame() {
            try {
                const inputName = document.getElementById('player-name').value.trim();
                const errorMsg = document.getElementById('error-msg');
                const themeSelect = document.getElementById('theme-select');
                errorMsg.style.display = "none";
                
                if(inputName === "") { errorMsg.innerText = "⚠️ 請輸入隊員姓名喔！"; errorMsg.style.display = "block"; return; }
                if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { errorMsg.innerText = "⚠️ 請保持禮貌喔！😇"; errorMsg.style.display = "block"; return; }
                if(themeSelect.value === "") { errorMsg.innerText = "⚠️ 請先選擇挑戰關卡！"; errorMsg.style.display = "block"; return; }
                
                playerName = inputName; currentTheme = themeSelect.value;
                let loadedQ;
                try {
                    const res = await fetch(`data/${currentTheme}.json`);
                    loadedQ = await res.json();
                } catch(e) {
                    errorMsg.innerText = "⚠️ 題庫載入失敗，請重新整理！"; errorMsg.style.display = "block"; return;
                }
                currentQuestions = loadedQ;
                document.getElementById('display-name').innerText = playerName;
                
                bgm.volume = 0.4; 
                const playPromise = bgm.play();
                if (playPromise !== undefined) { playPromise.catch(e => console.log("BGM 自動播放被阻擋", e)); }
                secretBgm.onended = function() { bgm.play().catch(e=>{}); };
                
                document.getElementById('start-overlay').style.display = 'none'; 
                document.getElementById('header').style.visibility = 'visible'; 
                document.getElementById('radar-box').style.visibility = 'visible'; 
                document.getElementById('mansion').style.visibility = 'visible'; 
                
                score = 0; caughtCount = 0; seconds = 0; targetCaught = 20; 
                activeWindows = [false, false, false, false, false];
                for(let i=0; i<5; i++) clearWindow(i);

                document.getElementById('score-val').textContent = score;
                document.getElementById('caught-val').textContent = caughtCount;
                document.getElementById('timer-val').textContent = "00m 00s";
                
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer-val').textContent = `${m}m ${s}s`;
                }, 1000);

                spawnInterval = setInterval(spawnGhost, getSpawnRate());
                
            } catch (err) {
                console.error("遊戲啟動發生錯誤: ", err);
            }
        }

        // 動態加快速度
        function getSpawnRate() { 
            return Math.max(800, 2000 - (caughtCount * 50)); 
        }

        function spawnGhost() {
            let available = [];
            activeWindows.forEach((isActive, idx) => { if(!isActive) available.push(idx); });
            if(available.length === 0) return;
            
            let winIdx = available[Math.floor(Math.random() * available.length)];
            activeWindows[winIdx] = true;
            
            let qData = currentQuestions[Math.floor(Math.random() * currentQuestions.length)];
            let winEl = document.getElementById(`win-${winIdx}`);
            let ghostArea = document.getElementById(`ghost-${winIdx}`);
            
            winEl.classList.add('lit');
            
            let opts = [qData.ans, qData.wrong1, qData.wrong2].sort(() => Math.random() - 0.5);
            let btnHtml = opts.map(opt => `<button class='btn-grammar' onclick='checkAnswer(${winIdx}, "${opt}", "${qData.ans}")'>${opt}</button>`).join('');
            
            ghostArea.innerHTML = `
                <div class='ghost-emoji'>👻</div>
                <div class='grammar-panel'>
                    <div style='font-size:14px; color:#2d3436; margin-bottom:5px; font-weight:bold;'>${qData.q}</div>
                    <div class='action-btns'>${btnHtml}</div>
                    <div class='sentence-tail'>... in the ${roomData[winIdx].text}.</div>
                </div>
            `;
            
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnGhost, getSpawnRate());
        }

        function checkAnswer(winIdx, selected, correct) {
            let winEl = document.getElementById(`win-${winIdx}`);
            if (selected === correct) {
                playSfx('success');
                score += 10; caughtCount++;
                document.getElementById('score-val').textContent = score;
                document.getElementById('caught-val').textContent = caughtCount;
                
                const rect = winEl.getBoundingClientRect();
                showBurst(rect.left + rect.width/2 - 20, rect.top + rect.height/2, "+10", "#2ed573");
                
                clearWindow(winIdx);
                
                if (caughtCount >= targetCaught) { setTimeout(calculateAndEndGame, 500); }
            } else {
                playSfx('error'); winEl.classList.add('error');
                setTimeout(() => winEl.classList.remove('error'), 300);
            }
        }

        function clearWindow(winIdx) {
            activeWindows[winIdx] = false;
            let winEl = document.getElementById(`win-${winIdx}`);
            let ghostArea = document.getElementById(`ghost-${winIdx}`);
            winEl.classList.remove('lit');
            ghostArea.innerHTML = '';
        }

        function triggerEasterEgg() { eggBuffer = ""; score += 100; document.getElementById('score-val').textContent = score; showBurst(window.innerWidth/2 - 50, window.innerHeight/2, "+100 🌟", "#f1c40f"); bgm.pause(); secretBgm.currentTime = 0; secretBgm.volume = 0.6; secretBgm.play().catch(err => console.log(err)); const modal = document.getElementById('secret-modal'); modal.style.display = 'block'; setTimeout(() => modal.style.display = 'none', 3000); }
        function showBurst(x, y, txt, color) { const div = document.createElement('div'); div.className = 'float-num'; div.textContent = txt; div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color; document.body.appendChild(div); setTimeout(() => div.remove(), 800); }

        function calculateAndEndGame() {
            clearInterval(timerInterval); clearInterval(spawnInterval); bgm.pause(); secretBgm.pause();
            let multiplier = 1.0; let tierName = "🐢 見習探員 (x1.0)";
            if (seconds <= 30) { multiplier = 3.0; tierName = "⚡ 捉鬼大師 (x3.0)"; } else if (seconds <= 45) { multiplier = 2.0; tierName = "🚀 菁英探員 (x2.0)"; } else if (seconds <= 60) { multiplier = 1.5; tierName = "🏃 資深探員 (x1.5)"; } else if (seconds <= 80) { multiplier = 1.2; tierName = "🚶 正式探員 (x1.2)"; }
            
            const finalScore = Math.min(Math.floor(score * multiplier), 999); 
            const timeStr = `${Math.floor(seconds/60).toString().padStart(2,'0')}m ${(seconds%60).toString().padStart(2,'0')}s`; 
            
            document.getElementById('base-score-display').textContent = score; document.getElementById('time-taken-display').textContent = timeStr; document.getElementById('multiplier-display').textContent = tierName; document.getElementById('final-total-display').textContent = finalScore;
            document.getElementById('end-msg').style.display = "flex"; saveAndDisplayGlobalLeaderboard(finalScore, timeStr);
        }

        function saveAndDisplayGlobalLeaderboard(finalScore, timeStr) {
            const listDiv = document.getElementById('leaderboard-list'), themeSelect = document.getElementById('theme-select'), themeName = themeSelect.options[themeSelect.selectedIndex].text;
            document.getElementById('end-board-title').innerText = `🌍 ${themeName} 英雄榜`; listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳成績到總部...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${finalScore}&time=${encodeURIComponent(timeStr)}&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div>你是第一個破關的探員！</div>"; return; }
                board.forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name} (${p.time})</span><span>${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='color:var(--error); text-align:center;'>連線失敗</div>");
        }
    </script>
</body>
</html>
