<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Ghostbusters</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b59b6; --success: #2ed573; --error: #ff4757;
            --bg: #2c3e50; --window-dark: #636e72; --window-lit: #ffeaa7;
            --text-dark: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; user-select: none;
        }

        /* 漂浮的音樂控制按鈕 */
        .sound-toggle {
            position: fixed; top: 12px; right: 15px;
            background: white; border: 3px solid var(--success); border-radius: 50px;
            padding: 8px 15px; font-size: 16px; font-weight: 900;
            cursor: pointer; font-family: 'Quicksand', sans-serif; color: var(--text-dark);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 50000; transition: 0.2s;
        }
        .sound-toggle:hover { transform: scale(1.05); }
        .sound-toggle:active { transform: scale(0.95); }

        /* 防重疊頂部狀態列 */
        #header {
            height: 60px; background: rgba(255,255,255,0.95); border-bottom: 3px solid #8e44ad;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 140px 0 10px; flex-shrink: 0; visibility: hidden; z-index: 100;
        }
        
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: var(--text-dark); }

        .exit-btn {
            background: #ff7675; color: white; border: none; padding: 8px 15px;
            border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer;
            transition: 0.2s; font-family: 'Quicksand', sans-serif; box-shadow: 0 4px 0 #d63031;
        }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d63031; }

        /* ✨ 尋鬼雷達區 */
        #radar-box {
            background: #000; color: #2ed573; text-align: center; padding: 10px;
            font-size: 28px; font-weight: 900; letter-spacing: 1px;
            border-bottom: 4px solid #2ed573; box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
            visibility: hidden; z-index: 90; text-shadow: 0 0 8px #2ed573;
        }

        /* 遊戲區：5個房間的網格 */
        #mansion {
            flex-grow: 1; padding: 15px; display: grid;
            grid-template-columns: repeat(3, 1fr); gap: 15px;
            visibility: hidden; align-content: center; max-width: 1000px; margin: 0 auto; width: 100%;
        }

        /* 房間(窗戶)設計 */
        .window {
            background: var(--window-dark); border-radius: 15px; border: 6px solid #1e272e;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s background;
            height: 100%; min-height: 180px;
        }
        .window.lit { background: var(--window-lit); box-shadow: 0 0 30px rgba(255, 234, 167, 0.5); border-color: #f39c12; }
        .window.error { background: var(--error); border-color: #c0392b; animation: shake 0.3s; }
        
        .room-label {
            background: rgba(0,0,0,0.7); color: white; text-align: center; padding: 5px;
            font-size: 18px; font-weight: 900; z-index: 20; letter-spacing: 1px;
        }

        /* 幽靈與選項 */
        .ghost-area {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            transform: translateY(100%); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding-bottom: 10px;
        }
        .window.lit .ghost-area { transform: translateY(0); }

        .ghost-emoji { font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .grammar-panel {
            background: white; border-radius: 10px; padding: 8px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 5px; width: 90%; border: 3px solid #8e44ad;
        }
        .action-btns { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-grammar {
            flex: 1; padding: 8px 0; font-size: 18px; font-weight: 900; border: none; border-radius: 8px;
            cursor: pointer; color: white; transition: 0.1s; background: #8e44ad; box-shadow: 0 4px 0 #6c3483;
        }
        .btn-grammar:active { transform: translateY(4px); box-shadow: 0 0 0 #6c3483; }
        .btn-rock { background: #f1c40f; color: var(--text-dark); box-shadow: 0 4px 0 #d4ac0d; font-size: 20px;}
        
        .sentence-tail { font-size: 14px; font-weight: 900; color: var(--text-dark); }

        /* Overlay 介面 */
        #start-overlay, #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            z-index: 20000; overflow-y: auto; padding: 30px 10px;
        }
        #start-overlay { background: var(--primary); color: white; }
        #end-msg { background: rgba(255,255,255,0.98); display: none; text-align: center; }

        .front-leaderboard {
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px;
            width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark);
        }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; }
        #front-leaderboard-list::-webkit-scrollbar { width: 6px; }
        #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; }
        .front-board-row:last-child { border-bottom: none; }

        .name-input {
            font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none;
            text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700;
            margin-bottom: 20px; width: 300px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); outline: none;
        }
        .start-btn {
            background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 30px; border-radius: 50px;
            font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #219150; margin-bottom: 30px;
        }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0; text-align: left; }
        .score-breakdown { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: var(--text-dark);}
        .final-score-display { font-size: 36px; color: var(--error); text-align: center; font-weight: 900; margin-top: 10px; }
        
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        #leaderboard-list::-webkit-scrollbar { width: 6px; }
        #leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; color: var(--text-dark);}
        
        #secret-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); color: white; padding: 30px 40px; border-radius: 20px;
            z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 85%; max-width: 450px;
        }

        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 80px; z-index: 30000; text-shadow: 4px 4px 0px white, -4px -4px 0px white; animation: burst 0.8s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }

        /* 手機版 RWD 樣式微調 */
        @media (max-width: 768px) {
            .sound-toggle { top: 8px; right: 8px; font-size: 13px; padding: 6px 10px; }
            #header { padding: 0 105px 0 5px; height: 50px; gap: 5px; } 
            .stat-pill { font-size: 13px !important; padding: 4px 6px; }
            .exit-btn { font-size: 13px; padding: 5px 8px; }

            /* 5個房間在手機上變成 2列 + 最下面1個橫跨 */
            #mansion { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            #win-4 { grid-column: span 2; } /* 第五個房間橫跨兩格 */

            #radar-box { font-size: 18px; padding: 8px; }
            .ghost-emoji { font-size: 45px; margin-bottom: 5px; }
            .btn-grammar { font-size: 14px; padding: 6px 0; }
            .sentence-tail { font-size: 12px; }
            
            #start-overlay h1 { font-size: 40px !important; }
            .name-input { font-size: 20px; padding: 10px; }
            .start-btn { font-size: 24px; padding: 10px 40px; }
            .float-num { font-size: 60px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="ghost.mp3" loop></audio>
    <audio id="secret-bgm" src="67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 50px; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">👻 抓鬼特攻隊</h1>
        
        <!-- ✨ 專屬標籤：四年級 Unit 1 -->
        <div style="background: rgba(255,255,255,0.2); border: 2px solid white; padding: 5px 20px; border-radius: 50px; font-weight: 900; font-size: 18px; margin-bottom: 10px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            📘 四年級 Unit 1
        </div>
        
        <p style="font-size: 16px; margin-bottom: 15px;">Where are they? 聽從雷達指示抓出幽靈！</p>
        
        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 抓鬼英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">📡 讀取中...</div></div>
        </div>
        
        <input type="text" id="player-name" class="name-input" placeholder="輸入特攻隊員姓名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" onchange="fetchFrontLeaderboard()" style="font-size: 18px; padding: 8px 15px; margin-bottom: 15px; border-radius: 15px; border:none; outline:none; font-family: 'Quicksand'; font-weight: 700;">
            <option value="ghost-level1">🔋 基礎任務 (慢速)</option>
            <option value="ghost-level2">⚡ 進階任務 (快速)</option>
        </select>
        <button class="start-btn" onclick="startGame()">開始抓鬼！</button>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Player</span></div>
        <div class="stat-pill">👻 抓獲: <span id="caught-val" style="color:var(--primary);">0</span>/20</div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:#f39c12;">0</span></div>
        <div class="stat-pill">⏱️ <span id="timer-val">00m 00s</span></div>
        <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>
    </div>

    <!-- ✨ 尋鬼雷達 -->
    <div id="radar-box">📡 正在搜尋目標...</div>

    <div id="mansion">
        <!-- 5 個房間固定生成 -->
        <div class="window" id="win-0"><div class="room-label" id="label-0">🛏️ bedroom</div><div class="ghost-area" id="ghost-0"></div></div>
        <div class="window" id="win-1"><div class="room-label" id="label-1">🛋️ living room</div><div class="ghost-area" id="ghost-1"></div></div>
        <div class="window" id="win-2"><div class="room-label" id="label-2">🪑 dining room</div><div class="ghost-area" id="ghost-2"></div></div>
        <div class="window" id="win-3"><div class="room-label" id="label-3">🍳 kitchen</div><div class="ghost-area" id="ghost-3"></div></div>
        <div class="window" id="win-4"><div class="room-label" id="label-4">🛁 bathroom</div><div class="ghost-area" id="ghost-4"></div></div>
    </div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:#f1c40f; font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">你找到了 ROCK 老師！<br>獲得額外 <strong style="font-size: 30px;">+100</strong> 分！<br><span style="color:#fdcb6e; font-size:18px;">(這是我們的秘密，請勿聲張🤫)</span></p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">任務完成！🎉</h1>
        <div class="result-panel">
            <div class="score-breakdown">
                <div>🎯 基礎得分： <span id="base-score-display"></span> pts</div>
                <div>⏱️ 任務時間： <span id="time-taken-display"></span></div>
                <div>⚡ 速度加成： <span id="multiplier-display" style="color:var(--success)"></span></div>
                <div class="final-score-display">最終總分： <span id="final-total-display"></span></div>
            </div>
            <h2 class="leaderboard-title" id="end-board-title">🌍 抓鬼英雄榜</h2>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.href='index.html'" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; margin-bottom: 20px;">回大廳</button>
    </div>

    <script>
        const badWords = ["fuck", "shit", "bitch", "ass", "dick", "pussy", "cunt", "slut", "whore", "idiot", "stupid", "幹", "靠北", "機掰", "智障", "白痴", "白癡", "垃圾", "操", "肏", "草泥馬", "媽的", "ㄘㄠˋ", "ㄍㄢˋ"];

        // 📝 題庫：結合了問句與對應的代名詞/Be動詞
        const questions = [
            { q: "Where are you?", ans: "I am", wrong1: "He is", wrong2: "She is" },
            { q: "Where is Tom?", ans: "He is", wrong1: "I am", wrong2: "She is" },
            { q: "Where is your brother?", ans: "He is", wrong1: "I am", wrong2: "She is" },
            { q: "Where is Grandpa?", ans: "He is", wrong1: "I am", wrong2: "She is" },
            { q: "Where is Mary?", ans: "She is", wrong1: "I am", wrong2: "He is" },
            { q: "Where is Mom?", ans: "She is", wrong1: "I am", wrong2: "He is" },
            { q: "Where is your sister?", ans: "She is", wrong1: "I am", wrong2: "He is" }
        ];

        const roomData = [
            { id: 0, text: "bedroom" },
            { id: 1, text: "living room" },
            { id: 2, text: "dining room" },
            { id: 3, text: "kitchen" },
            { id: 4, text: "bathroom" }
        ];
        
        // 記錄原始的房間標籤，以防彩蛋改掉名字後需要復原
        const originalLabels = ["🛏️ bedroom", "🛋️ living room", "🪑 dining room", "🍳 kitchen", "🛁 bathroom"];

        let score = 0, caughtCount = 0, targetCaught = 20, seconds = 0;
        let playerName = "Player", currentTheme = "ghost-level1";
        let timerInterval, spawnInterval;
        let activeWindows = [false, false, false, false, false]; 
        let isMuted = false; 

        const bgm = document.getElementById('bgm');
        const secretBgm = document.getElementById('secret-bgm');
        const radar = document.getElementById('radar-box');

        // ⚠️ 請換成您的 Google Apps Script 網址 ⚠️
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyH7U0pDNYhRZanfP0k6NiKKtwZGnKpcCMdJyx8l6xFrzGhf6yma3Y9TQv6X-0r-HAxwg/exec";

        window.onload = function() { fetchFrontLeaderboard(); };

        function toggleSound(e) {
            if (e) e.stopPropagation(); 
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            
            if (isMuted) {
                btn.innerHTML = "🔇 音效：關";
                btn.style.borderColor = "var(--error)";
                bgm.muted = true; secretBgm.muted = true;
            } else {
                btn.innerHTML = "🔊 音效：開";
                btn.style.borderColor = "var(--success)";
                bgm.muted = false; secretBgm.muted = false;
            }
        }

        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            currentTheme = themeSelect.value;
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('front-board-title').innerText = `🏆 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";

            fetch(`${GOOGLE_API_URL}?action=get&theme=${currentTheme}`)
            .then(response => response.json())
            .then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) {
                    listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px;'>目前無紀錄，搶下首殺吧！</div>"; return;
                }
                board.forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='front-board-row'><span>${rankStr} ${p.name}</span><span>${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (isMuted) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'success') { // 抓到鬼的聲音 (雷射槍感)
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3); 
            }
        }

        function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("請輸入隊員姓名喔！"); return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) {
                alert("請使用有禮貌的名字喔！😇"); return;
            }

            playerName = inputName;
            document.getElementById('display-name').innerText = playerName;

            bgm.volume = 0.4; 
            bgm.play().catch(e => console.log(e));
            secretBgm.onended = function() { bgm.play(); };

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('header').style.visibility = 'visible';
            document.getElementById('mansion').style.visibility = 'visible';
            radar.style.visibility = 'visible';
            
            score = 0; caughtCount = 0; seconds = 0;
            timerInterval = setInterval(countUp, 1000);
            
            // 由於需要專注閱讀，同時間只會出現一隻鬼，時間到了才換下一隻
            let speed = currentTheme === "ghost-level2" ? 2500 : 3500;
            spawnGhost();
            spawnInterval = setInterval(spawnGhost, speed);
        }

        function spawnGhost() {
            if (caughtCount >= targetCaught) return;

            // 先把前一個還沒抓到的鬼清除掉 (沒抓到算漏掉，不扣分)
            for(let i=0; i<5; i++) {
                if(activeWindows[i]) clearWindow(i);
            }

            let winIdx = Math.floor(Math.random() * 5);
            activeWindows[winIdx] = true;

            const winEl = document.getElementById(`win-${winIdx}`);
            const ghostArea = document.getElementById(`ghost-${winIdx}`);
            const labelEl = document.getElementById(`label-${winIdx}`);

            // ✨ 彩蛋系統：5% 機率出現 ROCK 老師
            let isEasterEgg = Math.random() < 0.05;

            if (isEasterEgg) {
                radar.innerHTML = "🚨 異常信號：Where is ROCK?";
                radar.style.color = "#f1c40f"; radar.style.borderColor = "#f1c40f";
                
                labelEl.innerText = "🕹️ arcade"; // 房間暫時變遊樂場
                
                ghostArea.innerHTML = `
                    <div class="grammar-panel">
                        <div class="action-btns">
                            <button class="btn-grammar btn-rock" onclick="handleCatch(${winIdx}, 'ROCK', 'ROCK', event)">ROCK</button>
                        </div>
                        <div class="sentence-tail">in the arcade.</div>
                    </div>
                    <div class="ghost-emoji">😎</div>
                `;
            } else {
                radar.style.color = "#2ed573"; radar.style.borderColor = "#2ed573";
                
                let qData = questions[Math.floor(Math.random() * questions.length)];
                let roomDataObj = roomData[winIdx];
                
                radar.innerHTML = `📡 目標：${qData.q}`;
                
                // 隨機挑選一個錯誤選項來當干擾
                let wrongChoice = Math.random() > 0.5 ? qData.wrong1 : qData.wrong2;
                
                // 隨機打亂正確與錯誤選項的位置
                let btn1, btn2;
                if(Math.random() > 0.5) {
                    btn1 = `<button class="btn-grammar" onclick="handleCatch(${winIdx}, '${qData.ans}', '${qData.ans}', event)">${qData.ans}</button>`;
                    btn2 = `<button class="btn-grammar" onclick="handleCatch(${winIdx}, '${wrongChoice}', '${qData.ans}', event)">${wrongChoice}</button>`;
                } else {
                    btn1 = `<button class="btn-grammar" onclick="handleCatch(${winIdx}, '${wrongChoice}', '${qData.ans}', event)">${wrongChoice}</button>`;
                    btn2 = `<button class="btn-grammar" onclick="handleCatch(${winIdx}, '${qData.ans}', '${qData.ans}', event)">${qData.ans}</button>`;
                }

                ghostArea.innerHTML = `
                    <div class="grammar-panel">
                        <div class="action-btns">${btn1}${btn2}</div>
                        <div class="sentence-tail">in the ${roomDataObj.text}.</div>
                    </div>
                    <div class="ghost-emoji">👻</div>
                `;
            }

            winEl.classList.add('lit');
        }

        function handleCatch(winIdx, chosenAnswer, correctAnswer, event) {
            if (!activeWindows[winIdx]) return;

            const rect = event.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;

            if (chosenAnswer === 'ROCK') {
                // ✨ 觸發彩蛋
                score += 100;
                showBurst(x, y, "+100 🌟", "#f1c40f");
                bgm.pause();
                secretBgm.currentTime = 0; secretBgm.volume = 0.6; 
                secretBgm.play().catch(err => console.log(err));
                
                const modal = document.getElementById('secret-modal');
                modal.style.display = 'block';
                setTimeout(() => { modal.style.display = 'none'; }, 3000);
                
                clearWindow(winIdx);
                document.getElementById('score-val').textContent = score;
                return;
            }

            if (chosenAnswer === correctAnswer) {
                // 抓對了
                score += 10;
                caughtCount++;
                playSfx('success');
                showBurst(x, y, "+10", "#00b894");
                document.getElementById('score-val').textContent = score;
                document.getElementById('caught-val').textContent = caughtCount;
                clearWindow(winIdx);

                if (caughtCount >= targetCaught) {
                    setTimeout(calculateAndEndGame, 500);
                } else {
                    // 抓對了直接強制提早出下一隻鬼，加快節奏
                    clearInterval(spawnInterval);
                    let speed = currentTheme === "ghost-level2" ? 2500 : 3500;
                    spawnGhost();
                    spawnInterval = setInterval(spawnGhost, speed);
                }
            } else {
                // 抓錯了
                score = Math.max(0, score - 2);
                playSfx('error');
                showBurst(x, y, "-2", "#d63031");
                document.getElementById('score-val').textContent = score;
                
                const winEl = document.getElementById(`win-${winIdx}`);
                winEl.classList.add('error');
                setTimeout(() => { winEl.classList.remove('error'); }, 300);
            }
        }

        function clearWindow(winIdx) {
            activeWindows[winIdx] = false;
            const winEl = document.getElementById(`win-${winIdx}`);
            winEl.classList.remove('lit');
            document.getElementById(`label-${winIdx}`).innerText = originalLabels[winIdx]; // 復原彩蛋可能改掉的名字
        }

        function showBurst(x, y, txt, color) {
            const div = document.createElement('div');
            div.className = 'float-num'; div.textContent = txt; div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function countUp() {
            seconds++;
            const m = Math.floor(seconds/60).toString().padStart(2,'0');
            const s = (seconds%60).toString().padStart(2,'0');
            document.getElementById('timer-val').textContent = `${m}m ${s}s`;
        }

        function calculateAndEndGame() {
            clearInterval(timerInterval);
            clearInterval(spawnInterval);
            bgm.pause(); secretBgm.pause();
            
            let multiplier = 1.0; let tierName = "🐢 見習探員 (x1.0)";
            if (seconds <= 30) { multiplier = 3.0; tierName = "⚡ 捉鬼大師 (x3.0)"; }
            else if (seconds <= 45) { multiplier = 2.0; tierName = "🚀 菁英探員 (x2.0)"; }
            else if (seconds <= 60) { multiplier = 1.5; tierName = "🏃 資深探員 (x1.5)"; }
            else if (seconds <= 80) { multiplier = 1.2; tierName = "🚶 正式探員 (x1.2)"; }
            
            const finalScore = Math.floor(score * multiplier);
            const timeStr = `${Math.floor(seconds/60).toString().padStart(2,'0')}m ${(seconds%60).toString().padStart(2,'0')}s`; 
            
            document.getElementById('base-score-display').textContent = score;
            document.getElementById('time-taken-display').textContent = timeStr;
            document.getElementById('multiplier-display').textContent = tierName;
            document.getElementById('final-total-display').textContent = finalScore;

            document.getElementById('end-msg').style.display = "flex";

            saveAndDisplayGlobalLeaderboard(finalScore, timeStr);
        }

        function saveAndDisplayGlobalLeaderboard(finalScore, timeStr) {
            const listDiv = document.getElementById('leaderboard-list');
            const themeSelect = document.getElementById('theme-select');
            const themeName = themeSelect.options[themeSelect.selectedIndex].text;
            
            document.getElementById('end-board-title').innerText = `🌍 ${themeName} 英雄榜`;
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳成績到特攻隊總部...</div>";
            
            const url = `${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${finalScore}&time=${encodeURIComponent(timeStr)}&theme=${currentTheme}`;

            fetch(url).then(r => r.json()).then(board => {
                listDiv.innerHTML = "";
                if (!board || board.length === 0) { listDiv.innerHTML = "<div>你是第一個破關的探員！</div>"; return; }
                board.forEach((p, i) => {
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name} (${p.time})</span><span>${p.score} pts</span></div>`;
                });
            }).catch(() => listDiv.innerHTML = "<div style='color:var(--error); text-align:center;'>連線失敗</div>");
        }
    </script>
</body>
</html>
