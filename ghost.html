<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Ghostbusters</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #9b59b6; --success: #2ed573; --error: #ff4757; --bg: #2c3e50; --window-dark: #636e72; --window-lit: #ffeaa7; --text-dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif; overflow: hidden; display: flex; flex-direction: column; user-select: none; }
        .sound-toggle { position: fixed; top: 12px; right: 15px; background: white; border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px; font-size: 16px; font-weight: 900; cursor: pointer; font-family: 'Quicksand', sans-serif; color: var(--text-dark); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 50000; transition: 0.2s; }
        .sound-toggle:hover { transform: scale(1.05); } .sound-toggle:active { transform: scale(0.95); }
        #header { height: 60px; background: rgba(255,255,255,0.95); border-bottom: 3px solid #8e44ad; display: flex; justify-content: space-around; align-items: center; padding: 0 140px 0 10px; flex-shrink: 0; visibility: hidden; z-index: 100; }
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: var(--text-dark); }
        .exit-btn { background: #ff7675; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; font-family: 'Quicksand', sans-serif; box-shadow: 0 4px 0 #d63031; }
        .exit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d63031; }
        #radar-box { background: #000; color: #2ed573; text-align: center; padding: 10px; font-size: 28px; font-weight: 900; letter-spacing: 1px; border-bottom: 4px solid #2ed573; box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4); visibility: hidden; z-index: 90; text-shadow: 0 0 8px #2ed573; }
        #mansion { flex-grow: 1; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; visibility: hidden; align-content: center; max-width: 1000px; margin: 0 auto; width: 100%; }
        .window { background: var(--window-dark); border-radius: 15px; border: 6px solid #1e272e; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s background; height: 100%; min-height: 180px; }
        .window.lit { background: var(--window-lit); box-shadow: 0 0 30px rgba(255, 234, 167, 0.5); border-color: #f39c12; }
        .window.error { background: var(--error); border-color: #c0392b; animation: shake 0.3s; }
        .room-label { background: rgba(0,0,0,0.7); color: white; text-align: center; padding: 5px; font-size: 18px; font-weight: 900; z-index: 20; letter-spacing: 1px; }
        .ghost-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transform: translateY(100%); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding-bottom: 10px; }
        .window.lit .ghost-area { transform: translateY(0); }
        .ghost-emoji { font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .grammar-panel { background: white; border-radius: 10px; padding: 8px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 5px; width: 90%; border: 3px solid #8e44ad; }
        .action-btns { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-grammar { flex: 1; padding: 8px 0; font-size: 18px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.1s; background: #8e44ad; box-shadow: 0 4px 0 #6c3483; }
        .btn-grammar:active { transform: translateY(4px); box-shadow: 0 0 0 #6c3483; }
        .btn-grammar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-rock { background: #f1c40f; color: var(--text-dark); box-shadow: 0 4px 0 #d4ac0d; font-size: 20px;}
        .sentence-tail { font-size: 14px; font-weight: 900; color: var(--text-dark); }
        #start-overlay, #end-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 20000; overflow-y: auto; padding: 30px 10px; }
        #start-overlay { background: var(--primary); color: white; } #end-msg { background: rgba(255,255,255,0.98); display: none; text-align: center; }
        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: var(--text-dark); }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 150px; overflow-y: auto; padding-right: 5px; } #front-leaderboard-list::-webkit-scrollbar { width: 6px; } #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #front-leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }
        .name-input { font-size: 24px; padding: 12px 25px; border-radius: 20px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 20px; width: 300px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); outline: none; }
        .start-btn { background: var(--success); color: white; border: none; padding: 15px 50px; font-size: 30px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #219150; margin-bottom: 30px; }
        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 450px; max-width: 100%; margin: 10px 0 20px 0; text-align: left; }
        .score-breakdown { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: var(--text-dark);}
        .final-score-display { font-size: 36px; color: var(--error); text-align: center; font-weight: 900; margin-top: 10px; }
        #leaderboard-list { max-height: 200px; overflow-y: auto; padding-right: 5px; } #leaderboard-list::-webkit-scrollbar { width: 6px; } #leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #leaderboard-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }
        .board-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #dfe6e9; font-size: 18px; font-weight: 700; color: var(--text-dark);}
        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px 40px; border-radius: 20px; z-index: 40000; text-align: center; box-shadow: 0 0 40px #f1c40f; border: 4px solid #f1c40f; width: 85%; max-width: 450px; }
        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 80px; z-index: 30000; text-shadow: 4px 4px 0px white, -4px -4px 0px white; animation: burst 0.8s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
        @media (max-width: 768px) { .sound-toggle { top: 8px; right: 8px; font-size: 13px; padding: 6px 10px; } #header { padding: 0 105px 0 5px; height: 50px; gap: 5px; } .stat-pill { font-size: 13px !important; padding: 4px 6px; } .exit-btn { font-size: 13px; padding: 5px 8px; } #mansion { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } #win-4 { grid-column: span 2; } #radar-box { font-size: 18px; padding: 8px; } .ghost-emoji { font-size: 45px; margin-bottom: 5px; } .btn-grammar { font-size: 14px; padding: 6px 0; } .sentence-tail { font-size: 12px; } #start-overlay h1 { font-size: 40px !important; } .name-input { font-size: 20px; padding: 10px; } .start-btn { font-size: 24px; padding: 10px 40px; } .float-num { font-size: 60px; } }
    </style>
</head>
