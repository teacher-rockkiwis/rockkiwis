<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Boss Raid</title>
    <link rel="stylesheet" href="common.css?v=3.0">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; width: 100%; }
        .active-screen { display: flex !important; }
        h1 { font-size: 45px; color: var(--secondary); text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 10px; text-align: center; }
        .subtitle { font-size: 18px; color: #bdc3c7; margin-bottom: 25px; text-align: center; }
        .btn { padding: 15px 30px; font-size: 24px; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; color: white; margin: 10px; box-shadow: 0 6px 0 rgba(0,0,0,0.3); transition: 0.1s; font-family: 'Quicksand'; width: 100%; max-width: 350px;}
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .btn-host { background: var(--primary); box-shadow: 0 6px 0 #922b21; }
        .btn-player { background: #2980b9; box-shadow: 0 6px 0 #1f618d; }
        .input-box { font-size: 20px; padding: 15px; border-radius: 15px; border: none; text-align: center; margin-bottom: 15px; width: 100%; max-width: 350px; font-family: 'Quicksand'; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        /* 👑 老師端大螢幕 (Host) 樣式 */
        #host-game { justify-content: flex-start; padding-top: 40px; position: relative; background: url('assets/bg_bossraid.png') center/cover no-repeat; }
        #host-game::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1; pointer-events: none; }
        .room-code-box { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: 900; border: 2px dashed var(--gold); z-index: 10; color: white;}
        .player-count-box { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: 900; color: #3498db; z-index: 10; }
        .dragon-area { display: flex; flex-direction: column; align-items: center; margin-top: 0; position: relative; height: 380px; justify-content: center; z-index: 10; width: 100%; }
        .dragon-img { height: 100%; max-height: 400px; object-fit: contain; mix-blend-mode: screen; animation: dragonFloat 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(231, 76, 60, 0.5)); transition: all 0.1s; pointer-events: none; }
        .hp-bar-container { width: 800px; max-width: 90%; height: 45px; background: rgba(0, 0, 0, 0.7); border-radius: 25px; border: 3px solid rgba(255,255,255,0.2); overflow: hidden; margin-top: 10px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 10; }
        .hp-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #8e44ad, #c0392b, #e74c3c); box-shadow: inset 0 0 20px rgba(255,255,255,0.4); transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .hp-bar-fill::after { content: ''; position: absolute; right: 0; top: 0; height: 100%; width: 20px; background: rgba(255,255,255,0.8); box-shadow: 0 0 20px white; filter: blur(5px); }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-size: 24px; font-weight: 900; color: white; text-shadow: 2px 2px 4px black, 0 0 10px black; font-variant-numeric: tabular-nums; z-index: 2; }
        .host-question-box { background: rgba(255, 255, 255, 0.95); color: var(--dark); padding: 25px 40px; border-radius: 25px; font-size: 45px; font-weight: 900; width: 90%; max-width: 1000px; text-align: center; margin-top: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 4px solid var(--gold); z-index: 10; backdrop-filter: blur(10px); }
        .host-timer { font-size: 70px; font-weight: 900; color: #f1c40f; margin-top: 15px; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8), 0 5px 10px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums; z-index: 10; }
        .host-result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .host-result-title { font-size: 70px; font-weight: 900; margin-bottom: 20px; text-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .host-result-dmg { font-size: 120px; color: var(--gold); font-weight: 900; text-shadow: 0 0 40px var(--gold); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        /* 📱 學生端手機 (Player) 樣式 */
        .player-hud { display: flex; justify-content: space-between; width: 100%; max-width: 450px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 20px; margin-bottom: 20px; }
        .player-hp { font-size: 24px; letter-spacing: 3px; }
        .player-status { font-size: 20px; font-weight: 900; color: var(--secondary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 450px; margin-top: 20px; }
        .opt-btn { height: 140px; color: white; border: none; font-size: 40px; font-weight: 900; border-radius: 25px; cursor: pointer; box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5), 0 10px 0 rgba(0,0,0,0.4); transition: all 0.1s; display: flex; justify-content: center; align-items: center; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .opt-btn:active { transform: translateY(10px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.1), 0 0px 0 rgba(0,0,0,0.4); }
        .opt-btn:disabled { filter: grayscale(0.8); opacity: 0.6; cursor: not-allowed; transform: translateY(10px); box-shadow: none; }
        .color-A { background: linear-gradient(135deg, #ff7675, #d63031); box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5), 0 10px 0 #b21f1f; }
        .color-B { background: linear-gradient(135deg, #74b9ff, #0984e3); box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5), 0 10px 0 #0652dd; }
        .color-C { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); box-shadow: inset 0 5px 10px rgba(255,255,255,0.6), 0 10px 20px rgba(0,0,0,0.5), 0 10px 0 #e1b12c; color: #2d3436; text-shadow: none; }
        .color-D { background: linear-gradient(135deg, #55efc4, #00b894); box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5), 0 10px 0 #009432; }
        .wait-msg { font-size: 24px; font-weight: 900; color: #bdc3c7; text-align: center; margin-top: 50px; }
        /* 動畫 */
        @keyframes dragonFloat { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.02); } }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .hit-anim { animation: dragonHit 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; filter: brightness(2) hue-rotate(-20deg) drop-shadow(0 0 80px rgba(255,255,255,1)); mix-blend-mode: normal; }
        @keyframes shake { 0%,100%{transform:translate3d(0,0,0);} 10%,30%,50%,70%,90%{transform:translate3d(-15px,0,0);} 20%,40%,60%,80%{transform:translate3d(15px,0,0);} }
        @keyframes dragonHit { 0% { transform: translate(0, 0) scale(1); } 20% { transform: translate(-20px, 10px) scale(0.95); } 40% { transform: translate(20px, -10px) scale(0.95); } 60% { transform: translate(-10px, 20px) scale(0.95); } 80% { transform: translate(10px, -20px) scale(0.95); } 100% { transform: translate(0, 0) scale(1); } }
        @keyframes popIn { 0%{transform:scale(0);} 80%{transform:scale(1.2);} 100%{transform:scale(1);} }
        #host-game #btn-start-raid { z-index: 10; }
        @media (max-width: 768px) {
            h1 { font-size: 35px; }
            .dragon-img { max-height: 250px; }
            .dragon-area { height: 250px; }
            .host-question-box { font-size: 28px; padding: 15px; border-width: 4px; }
            .host-timer { font-size: 50px; }
            .room-code-box, .player-count-box { font-size: 16px; padding: 8px 12px; }
            .opt-btn { height: 100px; font-size: 30px; }
            .host-result-title { font-size: 50px; }
            .host-result-dmg { font-size: 80px; }
        }
    
    </style>
</head>
<body>

    <script>

        const firebaseConfig = {

        let questionBanks = {};

    <!-- 主選單 -->
    <div id="main-menu" class="screen active-screen">
        <h1>🐉 Boss Raid 巨龍討伐戰</h1>
        <p class="subtitle">全班共鬥！打敗時態破壞龍！</p>
        <button class="btn btn-host" onclick="showHostLobby()">👑 我是大螢幕 (老師開房)</button>
        <button class="btn btn-player" onclick="showPlayerLobby()">📱 我是討伐隊員 (學生加入)</button>
        <button class="btn" style="background:#7f8c8d; margin-top:30px;" onclick="location.href='index.html'">🔙 回大廳</button>

    <!-- 👑 老師端：開房大廳 -->
    <div id="host-lobby" class="screen">
        <h1>👑 建立討伐戰</h1>
        <select id="host-theme" class="theme-select">
            <option value="g4-l1">📍 四年級 L1: Where are you?</option>
            <option value="g4-l2">🏃‍♂️ 四年級 L2: What are you doing?</option>
            <option value="g4-l3">🍔 四年級 L3: What do you want for lunch?</option>
            <option value="g4-l4">🍎 四年級 L4: Do you like apples?</option>
            <option value="g5-l1">🤕 五年級 L1: hurt vs hurts</option>
            <option value="g5-l2">🤒 五年級 L2: have vs has</option>
            <option value="g5-l3">🍝 五年級 L3: What did you have for lunch?</option>
            <option value="g5-l4">🏖️ 五年級 L4: Where were you yesterday?</option>
        </select>
        <select id="host-hp" class="theme-select">
            <option value="10000">🟢 幼龍 (血量: 10,000 / 適合小班級)</option>
            <option value="50000" selected>🟡 飛龍 (血量: 50,000 / 適合中班級)</option>
            <option value="100000">🔴 遠古巨龍 (血量: 100,000 / 適合全班大亂鬥)</option>
        </select>
        <button class="btn btn-host" onclick="createRoom()">建立房間</button>
        <button class="btn" style="background:transparent; border: 2px solid white;" onclick="location.reload()">取消</button>
    </div>

    <!-- 📱 學生端：加入大廳 -->
    <div id="player-lobby" class="screen">
        <h1>📱 加入討伐小隊</h1>
        <input type="text" id="player-name" class="input-box" placeholder="輸入隊員姓名..." maxlength="10">
        <input type="text" id="room-code" class="input-box" placeholder="輸入4碼房間號" maxlength="4" style="letter-spacing: 5px;">
        <button class="btn btn-player" onclick="joinRoom()">加入房間</button>
        <button class="btn" style="background:transparent; border: 2px solid white;" onclick="location.reload()">取消</button>
    </div>

    <!-- 👑 老師端：遊戲畫面 -->
    <div id="host-game" class="screen">
        <div class="room-code-box">房號：<span id="display-room-code" style="color:var(--gold);">0000</span></div>
        <div class="player-count-box">隊員人數：<span id="player-count">0</span></div>
        
        <div class="dragon-area">
            <img src="assets/dragon_boss.png" class="dragon-img" id="dragon-emoji" alt="Dragon Boss">
            <div class="hp-bar-container">
                <div class="hp-bar-fill" id="host-hp-fill"></div>
                <div class="hp-text" id="host-hp-text">100,000 / 100,000</div>
            </div>
        </div>

        <div class="host-question-box" id="host-question">等待隊員加入...</div>
        <div class="host-timer" id="host-timer">15</div>

        <button class="btn btn-host" id="btn-start-raid" onclick="startRound()" style="margin-top: 30px; font-size: 30px; width: 400px; max-width: 90%; z-index:10;">⚔️ 全員到齊，開始討伐！</button>

        <!-- 老師端回合結算特效 -->
        <div id="host-result-overlay" class="host-result-overlay">
            <div class="host-result-title" id="host-result-title">討伐結算</div>
            <div class="subtitle" id="host-result-desc" style="font-size: 35px; font-weight: 900; margin-bottom: 0; color: white;"></div>
            <div class="host-result-dmg" id="host-result-dmg">- 0</div>
        </div>
    </div>

    <!-- 📱 學生端：遊戲畫面 -->
    <div id="player-game" class="screen">
        <div class="player-hud">
            <div class="player-hp" id="player-hp-display">❤️❤️❤️</div>
            <div class="player-status" id="player-status-display">待命準備中...</div>
        </div>
        
        <div class="wait-msg" id="player-wait-msg">請看大螢幕，等待題目出現！👀</div>

        <div class="options-grid" id="player-options" style="display: none;">
            <button class="opt-btn color-A" id="btn-opt-0" onclick="submitAnswer(0)">A</button>
            <button class="opt-btn color-B" id="btn-opt-1" onclick="submitAnswer(1)">B</button>
            <button class="opt-btn color-C" id="btn-opt-2" onclick="submitAnswer(2)">C</button>
            <button class="opt-btn color-D" id="btn-opt-3" onclick="submitAnswer(3)">D</button>
        </div>
    </div>

    <script>
        let role = ''; // 'host' or 'player'
        let roomId = '';
        let roomRef = null;
        let myName = '';
        
        // 遊戲變數
        let maxDragonHp = 100000;
        let currentDragonHp = 100000;
        let currentTheme = '';
        let questions = [];
        let currentQData = null;
        let currentOptions = [];
        let correctAnswerIdx = -1;
        
        let roundTimer = null;
        let timeLeft = 15;
        let playerHp = 3;

        const sfxHit = document.getElementById('sfx-hit');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxWin = document.getElementById('sfx-win');
        const bgm = document.getElementById('bgm');

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function showHostLobby() { switchScreen('host-lobby'); }
        function showPlayerLobby() { switchScreen('player-lobby'); }

        // ==========================================
        // 👑 老師端邏輯 (Host)
        // ==========================================
        function createRoom() {
            role = 'host';
            currentTheme = document.getElementById('host-theme').value;
            maxDragonHp = parseInt(document.getElementById('host-hp').value);
            currentDragonHp = maxDragonHp;
            
            roomId = Math.floor(1000 + Math.random() * 9000).toString();

            const proceedWithRoom = () => {
                questions = [...questionBanks[currentTheme]].sort(() => Math.random() - 0.5);

                roomRef = db.ref('raid_rooms/' + roomId);
                roomRef.set({
                    status: 'lobby',
                    dragonMaxHp: maxDragonHp,
                    dragonHp: currentDragonHp,
                    question: null,
                    timestamp: Date.now()
                });

                roomRef.onDisconnect().remove();

                switchScreen('host-game');
                document.getElementById('display-room-code').innerText = roomId;
                updateHostHpBar();
                
                bgm.volume = 0.4; bgm.play().catch(e=>{});

                // 監聽玩家加入
                db.ref('raid_rooms/' + roomId + '/players').on('value', snap => {
                    let count = snapshotToArray(snap).length;
                    document.getElementById('player-count').innerText = count;
                });
            };

            if (questionBanks[currentTheme]) {
                proceedWithRoom();
            } else {
                fetch(`data/survival-${currentTheme}.json`)
                    .then(r => r.json())
                    .then(data => {
                        questionBanks[currentTheme] = data;
                        proceedWithRoom();
                    })
                    .catch(err => {
                        alert('題庫載入失敗！');
                        location.reload();
                    });
            }
        }

        function startRound() {
            document.getElementById('btn-start-raid').style.display = 'none';
            
            if (questions.length === 0) {
                // 如果題目用完，重新打亂
                questions = [...questionBanks[currentTheme]].sort(() => Math.random() - 0.5);
            }
            
            let q = questions.pop();
            currentOptions = [...q.opts].sort(() => Math.random() - 0.5);
            correctAnswerIdx = currentOptions.indexOf(q.ans);
            
            let qText = q.q.replace('____', '_____');
            document.getElementById('host-question').innerHTML = `${qText}<br><br>
                <div style="font-size: 24px; display:flex; justify-content:center; gap:20px; color:#bdc3c7;">
                    <span style="color:#e74c3c;">(A) ${currentOptions[0]}</span>
                    <span style="color:#3498db;">(B) ${currentOptions[1]}</span>
                    <span style="color:#f1c40f;">(C) ${currentOptions[2]}</span>
                    <span style="color:#2ecc71;">(D) ${currentOptions[3]}</span>
                </div>
            `;

            // 清空所有玩家的上一回合答案
            db.ref('raid_rooms/' + roomId + '/players').once('value').then(snap => {
                let updates = {};
                snapshotToArray(snap).forEach(p => {
                    updates[p.id + '/ans'] = -1; 
                });
                if(Object.keys(updates).length > 0) {
                    db.ref('raid_rooms/' + roomId + '/players').update(updates);
                }
            });

            roomRef.update({
                status: 'playing',
                question: { text: qText, opts: currentOptions }
            });

            timeLeft = 12; // 每題 12 秒
            document.getElementById('host-timer').innerText = timeLeft;
            document.getElementById('host-timer').style.display = 'block';

            roundTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('host-timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(roundTimer);
                    evaluateRound();
                }
            }, 1000);
        }

        function evaluateRound() {
            roomRef.update({ status: 'evaluating' });
            
            db.ref('raid_rooms/' + roomId + '/players').once('value').then(snap => {
                let players = snapshotToArray(snap);
                let correctCount = 0;
                let updates = {};

                players.forEach(p => {
                    if (p.hp <= 0) return; // 死掉的不算
                    if (p.ans === correctAnswerIdx) {
                        correctCount++;
                        updates[p.id + '/lastResult'] = 'correct';
                    } else {
                        updates[p.id + '/hp'] = Math.max(0, p.hp - 1);
                        updates[p.id + '/lastResult'] = 'wrong';
                    }
                });

                if(Object.keys(updates).length > 0) {
                    db.ref('raid_rooms/' + roomId + '/players').update(updates);
                }

                // 計算傷害
                let baseDmg = correctCount * 100;
                let multiplier = 1;
                
                if (correctCount >= 40) multiplier = 5;
                else if (correctCount >= 30) multiplier = 4;
                else if (correctCount >= 20) multiplier = 3;
                else if (correctCount >= 10) multiplier = 2;

                let totalDmg = baseDmg * multiplier;
                currentDragonHp = Math.max(0, currentDragonHp - totalDmg);
                
                roomRef.update({ dragonHp: currentDragonHp });
                updateHostHpBar();

                showHostRoundResult(correctCount, multiplier, totalDmg);
            });
        }

        function showHostRoundResult(correct, multiplier, dmg) {
            const overlay = document.getElementById('host-result-overlay');
            const title = document.getElementById('host-result-title');
            const desc = document.getElementById('host-result-desc');
            const dmgText = document.getElementById('host-result-dmg');
            const dragon = document.getElementById('dragon-emoji');

            overlay.style.display = 'flex';
            
            if (correct > 0) {
                sfxHit.currentTime = 0; sfxHit.play().catch(e=>{});
                title.innerText = "💥 攻擊成功！";
                title.style.color = "var(--success)";
                let comboText = multiplier > 1 ? `<br><span style="color:#f1c40f;">${multiplier}倍 合體陣法發動！</span>` : "";
                desc.innerHTML = `${correct} 名隊員命中目標！${comboText}`;
                dmgText.innerText = `- ${dmg}`;
                dmgText.style.color = "var(--primary)";
                dragon.classList.add('hit-anim');
                setTimeout(() => dragon.classList.remove('hit-anim'), 300);
            } else {
                sfxWrong.currentTime = 0; sfxWrong.play().catch(e=>{});
                title.innerText = "🔥 遭到龍之吐息攻擊！";
                title.style.color = "var(--error)";
                desc.innerText = "沒有人擊中要害，全體隊員受傷！";
                dmgText.innerText = "Miss!";
                dmgText.style.color = "#95a5a6";
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 400);
            }

            setTimeout(() => {
                overlay.style.display = 'none';
                if (currentDragonHp <= 0) {
                    showHostVictory();
                } else {
                    startRound();
                }
            }, 4000);
        }

        function updateHostHpBar() {
            let pct = (currentDragonHp / maxDragonHp) * 100;
            document.getElementById('host-hp-fill').style.width = pct + '%';
            document.getElementById('host-hp-text').innerText = `${currentDragonHp} / ${maxDragonHp}`;
        }

        function showHostVictory() {
            bgm.pause(); sfxWin.play().catch(e=>{});
            document.getElementById('host-question').innerText = "🎉 巨龍討伐成功！世界恢復了和平！";
            document.getElementById('host-question').style.color = "var(--success)";
            document.getElementById('host-timer').style.display = 'none';
            let dragon = document.getElementById('dragon-emoji');
            dragon.style.filter = "grayscale(1) brightness(0.2) drop-shadow(0 0 10px red)";
            dragon.style.animation = "none";
            dragon.style.transform = "rotate(-10deg) translateY(50px) scale(0.9)";
            dragon.style.mixBlendMode = "normal";
            roomRef.update({ status: 'victory' });
        }

        // ==========================================
        // 📱 學生端邏輯 (Player)
        // ==========================================
        function joinRoom() {
            role = 'player';
            myName = document.getElementById('player-name').value.trim();
            roomId = document.getElementById('room-code').value.trim();
            
            if(!myName || roomId.length !== 4) return alert("請輸入姓名與4碼房號！");

            roomRef = db.ref('raid_rooms/' + roomId);
            roomRef.once('value').then(snap => {
                if(snap.exists()) {
                    switchScreen('player-game');
                    document.getElementById('player-status-display').innerText = myName;
                    
                    let myRef = db.ref('raid_rooms/' + roomId + '/players').push();
                    myRef.set({
                        name: myName,
                        hp: 3,
                        ans: -1,
                        lastResult: ''
                    });

                    // 斷線時刪除自己
                    myRef.onDisconnect().remove();

                    // 監聽房間狀態
                    roomRef.on('value', roomSnap => {
                        let data = roomSnap.val();
                        if(!data) {
                            alert("房間已關閉！");
                            location.reload();
                            return;
                        }

                        if (data.status === 'playing') {
                            document.getElementById('player-wait-msg').style.display = 'none';
                            
                            // 更新按鈕文字
                            if (data.question && data.question.opts) {
                                for(let i=0; i<4; i++) {
                                    let btn = document.getElementById(`btn-opt-${i}`);
                                    btn.innerText = data.question.opts[i];
                                    btn.disabled = false;
                                }
                            }
                            
                            if (playerHp > 0) {
                                document.getElementById('player-options').style.display = 'grid';
                            } else {
                                document.getElementById('player-wait-msg').style.display = 'block';
                                document.getElementById('player-wait-msg').innerText = "👻 陣亡觀戰中...";
                            }
                        }

                        if (data.status === 'victory') {
                            document.getElementById('player-options').style.display = 'none';
                            document.getElementById('player-wait-msg').style.display = 'block';
                            document.getElementById('player-wait-msg').innerHTML = "🎉 討伐成功！<br><br><button class='btn btn-player' onclick='location.reload()'>回大廳</button>";
                        }
                    });

                    // 監聽自己的血量與結算狀態
                    myRef.on('value', mySnap => {
                        let me = mySnap.val();
                        if(!me) return;
                        
                        playerHp = me.hp;
                        let hearts = "";
                        for(let i=0; i<3; i++) hearts += (i < playerHp) ? "❤️" : "🖤";
                        document.getElementById('player-hp-display').innerText = hearts;

                        if (me.lastResult === 'wrong') {
                            sfxWrong.currentTime = 0; sfxWrong.play().catch(e=>{});
                            document.body.style.backgroundColor = "rgba(231, 76, 60, 0.5)";
                            setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 500);
                            myRef.update({lastResult: ''});
                        } else if (me.lastResult === 'correct') {
                            sfxHit.currentTime = 0; sfxHit.play().catch(e=>{});
                            myRef.update({lastResult: ''});
                        }
                    });

                } else {
                    alert("找不到這個房間喔！");
                }
            });
        }

        function submitAnswer(idx) {
            if (playerHp <= 0) return;
            
            // 鎖定所有按鈕
            for(let i=0; i<4; i++) {
                document.getElementById(`btn-opt-${i}`).disabled = true;
            }
            
            document.getElementById('player-options').style.display = 'none';
            document.getElementById('player-wait-msg').style.display = 'block';
            document.getElementById('player-wait-msg').innerText = "🏹 攻擊蓄力中！等待隊友...";

            // 尋找自己的 ID 並更新答案
            db.ref('raid_rooms/' + roomId + '/players').orderByChild('name').equalTo(myName).once('value').then(snap => {
                snap.forEach(child => {
                    child.ref.update({ ans: idx });
                });
            });
        }

        // Helper
        function snapshotToArray(snapshot) {
            var returnArr = [];
            snapshot.forEach(function(childSnapshot) {
                var item = childSnapshot.val();
                item.id = childSnapshot.key;
                returnArr.push(item);
            });
            return returnArr;
        }
    </script>
</body>
</html>
