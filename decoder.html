<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. ROCK - Code Breaker</title>
    <link rel="stylesheet" href="common.css">
    <style>
        :root {
            --primary: #34495e; --secondary: #2c3e50; --success: #27ae60; --error: #c0392b;
            --bg: #ecf0f1; --text-dark: #2d3436; --gold: #f39c12;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; outline: none; }
        body, html {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; user-select: none;
        }

        .sound-toggle {
            position: fixed; top: max(15px, env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.9);
            border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px;
            font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; transition: 0.2s;
        }
        .exit-btn {
            position: fixed; top: max(15px, env(safe-area-inset-top)); left: 15px; background: rgba(231,76,60,0.9);
            color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #c0392b;
        }

        #header {
            height: 60px; background: rgba(255,255,255,0.95); border-bottom: 3px solid var(--primary);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 140px 0 10px; flex-shrink: 0; visibility: hidden; z-index: 100;
        }
        .stat-pill { background: #f1f2f6; padding: 5px 15px; border-radius: 10px; font-weight: 900; font-size: 18px; color: #2d3436; }

        #game-area {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 20px 10px; visibility: hidden; width: 100%; max-width: 800px; margin: 0 auto; overflow-y: auto;
        }

        /* 密碼表設計 */
        #mapping-container {
            width: 100%; max-width: 600px; margin-bottom: 20px;
        }
        .decoder-table {
            width: 100%; text-align: center; border-collapse: collapse; background: white;
            border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .decoder-table th { background: var(--primary); color: var(--gold); padding: 12px 5px; font-size: 24px; width: 20%; border: 1px solid #7f8c8d; }
        .decoder-table td { padding: 15px 5px; font-size: 22px; font-weight: 900; color: var(--text-dark); border: 1px solid #bdc3c7; }
        
        /* 題目顯示區 */
        #question-box {
            background: white; padding: 15px 30px; border-radius: 20px; border: 4px solid var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center;
        }
        #question-title { font-size: 16px; color: #7f8c8d; font-weight: 900; margin-bottom: 5px; letter-spacing: 2px; }
        #code-display { font-size: 45px; font-weight: 900; color: var(--primary); letter-spacing: 8px; font-variant-numeric: tabular-nums; }

        /* 輸入區 */
        #input-section {
            display: flex; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 20px;
        }
        #answer-input {
            flex: 1; font-size: 28px; padding: 15px; border-radius: 15px; border: 4px solid var(--primary);
            text-align: center; outline: none; font-weight: 900; font-family: 'Quicksand', sans-serif;
            color: var(--text-dark); box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-transform: lowercase;
        }
        #submit-btn {
            background: var(--success); color: white; border: none; border-radius: 15px; padding: 0 30px;
            font-size: 24px; font-weight: 900; box-shadow: 0 6px 0 #219150; cursor: pointer; transition: 0.1s;
        }
        #submit-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #219150; }

        /* Overlays & UI */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; z-index: 60000; overflow-y: auto;
            padding: 40px 20px 20px 20px; background: rgba(44, 62, 80, 0.95);
        }
        #end-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column;
            justify-content: flex-start; align-items: center; z-index: 60000; overflow-y: auto;
            padding: 30px 20px 20px 20px; background: rgba(255,255,255,0.98); text-align: center;
        }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .start-btn-main { background: var(--gold); color: #2d3436; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #d4ac0d; transition: 0.1s; margin-bottom: 20px; flex-shrink: 0;}
        .start-btn-main:active { transform: translateY(6px); box-shadow: 0 0 0 #d4ac0d; }

        /* iOS Safari Dropdown Fix */
        select.theme-select {
            width: 90%; max-width: 350px; font-size: 16px; padding: 12px 15px; border-radius: 15px;
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; margin-bottom: 20px; flex-shrink: 0;
            color: #2c3e50; background-color: #ffffff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px;
        }
        select.theme-select option, select.theme-select optgroup { color: #2c3e50; background-color: #ffffff; }

        #error-msg { display: none; color: #ffcccc; font-weight: 900; margin-bottom: 15px; background: rgba(255, 71, 87, 0.9); padding: 10px 20px; border-radius: 20px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .front-leaderboard { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; width: 320px; max-width: 95%; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); color: #2d3436; text-align: left; }
        .front-leaderboard h3 { margin: 0 0 10px 0; color: var(--primary); text-align: center; font-size: 20px; font-weight: 900; }
        #front-leaderboard-list { max-height: 180px; overflow-y: auto; padding-right: 5px; } #front-leaderboard-list::-webkit-scrollbar { width: 6px; } #front-leaderboard-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; } #front-leaderboard-list::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 10px; }
        .front-board-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #dfe6e9; font-size: 16px; font-weight: 700; } .front-board-row:last-child { border-bottom: none; }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; flex-shrink: 0;}
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        #secret-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 30px; border-radius: 20px; z-index: 40000; text-align: center; box-shadow: 0 0 40px var(--gold); border: 4px solid var(--gold); width: 85%; max-width: 350px; }
        .float-num { position: fixed; pointer-events: none; font-weight: 900; font-size: 60px; z-index: 30000; text-shadow: 3px 3px 0px white, -3px -3px 0px white; animation: burst 0.8s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 40% { transform: scale(1.5) translateY(-30px); opacity: 1; } 100% { transform: scale(1.2) translateY(-150px); opacity: 0; } }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 0, 0); } 40%, 60% { transform: translate3d(10px, 0, 0); } }

        @media screen and (max-width: 768px) {
            .sound-toggle { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); right: 5px; }
            .exit-btn { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); left: 5px; }
            #header { padding: 0 100px 0 5px; height: 50px; gap: 5px; }
            .stat-pill { font-size: 13px !important; padding: 4px 6px; }
            .decoder-table th { font-size: 18px; padding: 8px 3px; }
            .decoder-table td { font-size: 16px; padding: 10px 3px; }
            #code-display { font-size: 32px; letter-spacing: 5px; }
            #answer-input { font-size: 20px; padding: 10px; }
            #submit-btn { font-size: 20px; padding: 0 20px; }
        }
    </style>
    <script src="common.js"></script>
</head>
<body>

    <audio id="bgm" src="bgm/music.mp3" loop></audio>
    <audio id="sfx-hit" src="bgm/bingo.mp3"></audio>
    <audio id="sfx-wrong" src="bgm/fail.mp3"></audio>
    <audio id="secret-bgm" src="bgm/67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>

    <div id="start-overlay">
        <h1 style="font-size: 50px; color: var(--gold); text-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; margin-bottom: 5px; margin-top: 20px;">🔢 Code Breaker</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 20px; text-align: center; line-height: 1.5;">
            特務密碼解碼戰！<br>每場遊戲都會重新打亂數字對應的字母，<br>請根據密碼表解譯出正確的英文單字！
        </p>
        
        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入特務姓名..." autocomplete="off" maxlength="12">
        
        <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
            <option value="" disabled selected hidden>▼ 請先選擇挑戰關卡...</option>
            <optgroup label="四年級 (Grade 4)">
                <option value="code-g4-l1">🏠 L1: Home Space</option>
                <option value="code-g4-l2">🏃 L2: Actions</option>
                <option value="code-g4-l3">🍔 L3: Food & Drinks</option>
            </optgroup>
            <optgroup label="五年級 (Grade 5)">
                <option value="code-g5-l1">🦴 L1: Body Parts</option>
                <option value="code-g5-l2">🤒 L2: Sickness</option>
                <option value="code-g5-l3">🍽️ L3: Meals & Food</option>
            </optgroup>
        </select>

        <button class="start-btn-main" onclick="startGame()">開始解碼！</button>

        <div class="front-leaderboard">
            <h3 id="front-board-title">🏆 解碼英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">請先選擇上方關卡，以查看英雄榜！</div></div>
        </div>
    </div>

    <div id="header">
        <div class="stat-pill">👤 <span id="display-name">Player</span></div>
        <div class="stat-pill">🏆 <span id="score-val" style="color:var(--gold);">0</span></div>
        <div class="stat-pill">⏱️ <span id="timer-val" style="color:var(--error);">90</span>s</div>
        <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>
    </div>

    <div id="game-area">
        <!-- 動態密碼表將在此生成 -->
        <div id="mapping-container"></div>
        
        <div id="question-box">
            <div id="question-title">TARGET CODE</div>
            <div id="code-display">0 0 0 0</div>
        </div>

        <div id="input-section">
            <input type="text" id="answer-input" placeholder="輸入解出的單字..." autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none" onkeypress="if(event.key === 'Enter') checkAnswer()">
            <button id="submit-btn" onclick="checkAnswer()">解鎖</button>
        </div>
    </div>

    <div id="secret-modal">
        <h2 style="margin:0 0 10px 0; color:var(--gold); font-size:36px;">😎 隱藏彩蛋！</h2>
        <p style="font-size:22px; margin:0; line-height: 1.5;">ROCK 老師強制解碼！<br>直接獲得 <strong style="font-size: 30px;">+100</strong> 分！</p>
    </div>

    <div id="end-msg">
        <h1 id="end-title" style="font-size: 45px; color: var(--primary); margin: 0; margin-top: 10px;">時間到！🏁</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: #2d3436; text-align: center;">
                解碼總分：<br><span id="final-total-display" style="color:var(--error); font-size:45px;">0</span> pts
            </div>
            <h2 class="board-row" style="color: var(--primary); justify-content: center; border-top: 2px dashed #ddd; padding-top: 15px;">🌍 解碼英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再玩一次</button>
    </div>

    <script>
        // 🛡️ 防外掛與防作弊系統
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return false; } });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);


        let userIP = "Unknown";

        // ✨ 題庫設定 ✨

        let score = 0;
        let isPlaying = false, isMuted = false;
        let playerName = "Player", currentTheme = "";
        
        let gameWords = [];
        let currentWordIndex = 0;
        let currentWord = "";
        
        let seconds = 90; // 90秒極限挑戰
        let mainTimer;
        
        // 數字對應字母的映射表
        let letterToDigitMap = {};

        const bgm = document.getElementById('bgm');
        const sfxHit = document.getElementById('sfx-hit');
        const sfxWrong = document.getElementById('sfx-wrong');
        const secretBgm = document.getElementById('secret-bgm');
        
        bgm.volume = 0.4; sfxHit.volume = 0.6; sfxWrong.volume = 0.6; secretBgm.volume = 0.6;

        window.onload = function() { 
            fetchFrontLeaderboard();
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };


        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); 
            const themeSelect = document.getElementById('theme-select');
            
            if (themeSelect.value === "") {
                listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px; color:#636e72;'>請先選擇上方關卡，以查看英雄榜！</div>";
                return;
            }

            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${themeSelect.value}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        // ✨ 產生動態隨機密碼表 ✨
        function generateMapping() {
            const alphabet = "abcdefghijklmnopqrstuvwxyz".split('');
            // Fisher-Yates 隨機打亂字母
            for (let i = alphabet.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [alphabet[i], alphabet[j]] = [alphabet[j], alphabet[i]];
            }
            
            // 分配每個數字(0-9)對應的字母數量 (總共26，分成6個3字、4個2字)
            let sizes = [3, 3, 3, 3, 3, 3, 2, 2, 2, 2];
            sizes.sort(() => Math.random() - 0.5); // 隨機分配給0-9
            
            letterToDigitMap = {};
            let letterIdx = 0;
            let displayMapping = {};
            
            for(let i=0; i<=9; i++) {
                let chunk = alphabet.slice(letterIdx, letterIdx + sizes[i]);
                chunk.sort(); // 每個格子內的字母按順序排，降低眼花程度
                let chunkStr = chunk.join('');
                displayMapping[i] = chunkStr;
                for(let char of chunk) {
                    letterToDigitMap[char] = i.toString();
                }
                letterIdx += sizes[i];
            }

            // 繪製雙排表格 (適合手機版)
            let tableHtml = `<table class="decoder-table">`;
            // 第一排 (1~5)
            tableHtml += `<tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr><tr>`;
            for(let i=1; i<=5; i++) tableHtml += `<td>${displayMapping[i]}</td>`;
            tableHtml += `</tr>`;
            // 第二排 (6~9, 0)
            tableHtml += `<tr><th>6</th><th>7</th><th>8</th><th>9</th><th>0</th></tr><tr>`;
            for(let i=6; i<=9; i++) tableHtml += `<td>${displayMapping[i]}</td>`;
            tableHtml += `<td>${displayMapping[0]}</td>`;
            tableHtml += `</tr></table>`;
            
            document.getElementById('mapping-container').innerHTML = tableHtml;
        }

        // 將單字轉成數字密碼
        function wordToCode(word) {
            let code = "";
            let lowerWord = word.toLowerCase();
            for(let i=0; i<lowerWord.length; i++) {
                let char = lowerWord[i];
                if (char === ' ') {
                    code += "&nbsp;&nbsp; "; // 用大空格區分兩個字
                } else if (letterToDigitMap[char] !== undefined) {
                    code += letterToDigitMap[char] + " ";
                }
            }
            return code.trim();
        }

        async function startGame() {
            const inputName = document.getElementById('player-name').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const themeSelect = document.getElementById('theme-select');

            errorMsg.style.display = "none";

            if(inputName === "") { errorMsg.innerText = "⚠️ 請輸入特務姓名！"; errorMsg.style.display = "block"; return; }
            if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { errorMsg.innerText = "⚠️ 請保持禮貌喔！😇"; errorMsg.style.display = "block"; return; }
            if (themeSelect.value === "") { errorMsg.innerText = "⚠️ 請先選擇挑戰關卡！"; errorMsg.style.display = "block"; return; }

            playerName = inputName;
            currentTheme = themeSelect.value;
            document.getElementById('display-name').innerText = playerName;

            let bank;
            try {
                const res = await fetch(`data/${currentTheme}.json`);
                bank = await res.json();
            } catch(e) {
                errorMsg.innerText = "⚠️ 題庫載入失敗，請重新整理！"; errorMsg.style.display = "block"; return;
            }

            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('header').style.visibility = 'visible';
            document.getElementById('game-area').style.visibility = 'visible';

            score = 0; seconds = 90;
            document.getElementById('score-val').innerText = score;
            document.getElementById('timer-val').innerText = seconds;

            bgm.play().catch(e => console.log(e));
            secretBgm.onended = function() { bgm.play(); };

            generateMapping();

            gameWords = [...bank].sort(() => Math.random() - 0.5);
            currentWordIndex = 0;
            
            isPlaying = true;
            
            mainTimer = setInterval(() => {
                seconds--;
                document.getElementById('timer-val').innerText = seconds;
                if(seconds <= 0) endGame();
            }, 1000);

            loadNextWord();
        }

        function loadNextWord() {
            if (currentWordIndex >= gameWords.length) {
                // 如果題庫用完，重新打亂再玩 (無盡模式直到時間結束)
                gameWords = [...wordBanks[currentTheme]].sort(() => Math.random() - 0.5);
                currentWordIndex = 0;
            }
            
            currentWord = gameWords[currentWordIndex];
            
            // 顯示加密後的數字
            document.getElementById('code-display').innerHTML = wordToCode(currentWord);
            
            // 清空並 Focus 輸入框
            const inputEl = document.getElementById('answer-input');
            inputEl.value = "";
            inputEl.focus();
        }

        function checkAnswer() {
            if(!isPlaying) return;
            
            const inputEl = document.getElementById('answer-input');
            let userAns = inputEl.value.trim().toLowerCase();
            let targetAns = currentWord.trim().toLowerCase();

            // ROCK 彩蛋檢查
            if(userAns === 'rock') {
                triggerEasterEgg();
                inputEl.value = "";
                return;
            }
            
            // 寬鬆比對 (無視空格)
            if (userAns.replace(/\s+/g, '') === targetAns.replace(/\s+/g, '')) {
                // 正確
                if(!isMuted) { sfxHit.currentTime = 0; sfxHit.play().catch(e=>{}); }
                score += 10;
                document.getElementById('score-val').innerText = score;
                
                const rect = document.getElementById('input-section').getBoundingClientRect();
                showBurst(rect.left + rect.width/2, rect.top - 20, "+10", "#27ae60");
                
                currentWordIndex++;
                loadNextWord();
            } else {
                // 錯誤
                if(!isMuted) { sfxWrong.currentTime = 0; sfxWrong.play().catch(e=>{}); }
                const section = document.getElementById('input-section');
                section.classList.add('shake');
                setTimeout(() => section.classList.remove('shake'), 300);
            }
        }

        function triggerEasterEgg() {
            score += 100; 
            document.getElementById('score-val').innerText = score;
            showBurst(window.innerWidth/2 - 50, window.innerHeight/2, "+100 🌟", "#f1c40f");
            
            bgm.pause(); secretBgm.currentTime = 0; secretBgm.volume = 0.6; secretBgm.play().catch(err => console.log(err));
            const modal = document.getElementById('secret-modal'); modal.style.display = 'block';
            
            setTimeout(() => { 
                modal.style.display = 'none'; 
                currentWordIndex++;
                loadNextWord();
            }, 3000);
        }

        function showBurst(x, y, txt, color) { 
            const div = document.createElement('div'); div.className = 'float-num'; div.textContent = txt; 
            div.style.left = x + 'px'; div.style.top = y + 'px'; div.style.color = color; 
            document.body.appendChild(div); setTimeout(() => div.remove(), 800); 
        }

        function endGame() {
            isPlaying = false; 
            clearInterval(mainTimer);
            bgm.pause(); secretBgm.pause();
            
            document.getElementById('header').style.visibility = 'none';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text.split(':')[0].substring(3);
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳成績中...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=90s&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
</body>
</html>
