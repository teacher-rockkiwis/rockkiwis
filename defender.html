<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dr. ROCK - Grammar Defender</title>
    <link rel="stylesheet" href="common.css">
    <style>
        :root {
            --primary: #8e44ad; --secondary: #9b59b6; --success: #2ecc71; --error: #e74c3c;
            --bg: #2c3e50; --text-light: #ecf0f1; --gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; outline: none; }
        body, html {
            background-color: var(--bg); margin: 0; padding: 0;
            height: 100dvh; width: 100vw; font-family: 'Quicksand', sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            overscroll-behavior: none;
        }

        #game-canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; }

        .sound-toggle {
            position: fixed; top: max(15px, env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.9);
            border: 3px solid var(--success); border-radius: 50px; padding: 8px 15px;
            font-size: 16px; font-weight: 900; cursor: pointer; color: #2d3436; z-index: 50000; transition: 0.2s;
        }
        .exit-btn {
            position: fixed; top: max(15px, env(safe-area-inset-top)); left: 15px; background: rgba(231,76,60,0.9);
            color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 900;
            font-size: 16px; cursor: pointer; z-index: 50000; box-shadow: 0 4px 0 #c0392b;
        }

        #ui-layer {
            position: absolute; top: max(60px, env(safe-area-inset-top) + 50px); left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 20; pointer-events: none;
        }
        .hud-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 15px; border: 2px solid var(--primary); color: white; text-align: center; }
        #score-display { font-size: 26px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #lives-display { font-size: 20px; letter-spacing: 2px; }
        #level-hud { font-size: 18px; font-weight: 900; color: #e74c3c; margin-top: 5px; }
        #combo-hud { font-size: 18px; font-weight: 900; color: #3498db; margin-top: 5px; transition: 0.2s; }

        #question-board {
            position: absolute; top: max(130px, env(safe-area-inset-top) + 120px); left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #2d3436; padding: 15px 30px;
            border-radius: 20px; font-size: 28px; font-weight: 900; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--primary);
            text-align: center; pointer-events: none; max-width: 90%; word-wrap: break-word;
        }
        .blank-space { color: var(--error); border-bottom: 3px solid var(--error); padding: 0 10px; display: inline-block; min-width: 60px; margin: 0 5px; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            z-index: 60000; overflow-y: auto; padding: 40px 20px 20px 20px; background: rgba(44, 62, 80, 0.95);
        }
        
        #end-msg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: flex-start; align-items: center;
            z-index: 60000; overflow-y: auto; padding: 30px 20px 20px 20px; background: rgba(255,255,255,0.98);
            text-align: center; 
        }

        #error-msg { display: none; color: #ffcccc; font-weight: 900; margin-bottom: 15px; background: rgba(255, 71, 87, 0.9); padding: 10px 20px; border-radius: 20px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .name-input { font-size: 22px; padding: 12px 20px; border-radius: 15px; border: none; text-align: center; font-family: 'Quicksand', sans-serif; font-weight: 700; margin-bottom: 15px; width: 90%; max-width: 350px; outline: none; flex-shrink: 0;}
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 26px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #6c3483; transition: 0.1s; margin-bottom: 20px; flex-shrink: 0;}
        .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #6c3483; }
        
        /* ✨ 終極修正：強制指定顏色與外觀，解決 iOS Safari 白底白字的問題 ✨ */
        select.theme-select { 
            width: 90%; max-width: 350px; font-size: 16px; padding: 12px 15px; border-radius: 15px; 
            border: none; outline: none; font-family: 'Quicksand'; font-weight: 700; margin-bottom: 20px; flex-shrink: 0;
            color: #2c3e50; /* 強制深色字體 */
            background-color: #ffffff; /* 強制白色背景 */
            appearance: none;
            -webkit-appearance: none; /* 移除 iOS 預設樣式 */
            /* 加入自訂的下拉箭頭 */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 40px;
        }
        /* 確保選單展開時的選項也是深色字 */
        select.theme-select option, select.theme-select optgroup {
            color: #2c3e50;
            background-color: #ffffff;
        }

        .result-panel { background: white; border: 4px solid var(--primary); border-radius: 20px; padding: 20px; width: 95%; max-width: 400px; margin: 10px 0 20px 0; text-align: left; flex-shrink: 0;}
        .board-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #dfe6e9; font-size: 16px; font-weight: 700; color: #2d3436;}

        #portrait-warning { display: none; }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #portrait-warning {
                display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(44, 62, 80, 0.98); z-index: 99999; color: white;
                flex-direction: column; justify-content: center; align-items: center;
                font-size: 24px; font-weight: bold; text-align: center; padding: 20px;
            }
        }

        @media screen and (max-height: 600px) {
            .sound-toggle { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); right: 5px; }
            .exit-btn { font-size: 12px; padding: 6px 12px; top: max(5px, env(safe-area-inset-top)); left: 5px; }
            #ui-layer { top: max(45px, env(safe-area-inset-top) + 35px); padding: 0 10px; }
            #question-board { font-size: 18px; padding: 10px 20px; top: max(100px, env(safe-area-inset-top) + 90px); }
            
            #start-overlay { padding-top: 20px; }
            #start-overlay h1 { font-size: 32px; margin-top: 0; margin-bottom: 5px;}
            #start-overlay p { margin-bottom: 10px; font-size: 14px;}
            .name-input { margin-bottom: 10px; padding: 8px 15px; font-size: 18px; }
            select.theme-select { margin-bottom: 10px; padding: 8px 15px; }
            .start-btn { font-size: 20px; padding: 10px 30px; margin-bottom: 10px; }

            #end-msg { padding-top: 15px; }
            #end-msg h1 { font-size: 32px !important; margin-top: 0 !important; margin-bottom: 5px !important;}
            .result-panel { padding: 10px 15px !important; margin: 5px 0 15px 0 !important; width: 95%; max-width: 450px;}
            .result-panel > div:first-child { padding: 10px !important; margin-bottom: 10px !important; font-size: 16px !important; }
            #final-total-display { font-size: 32px !important; }
            #final-level-display { font-size: 14px !important; }
            .result-panel h2 { font-size: 18px !important; padding-top: 5px !important; margin-bottom: 5px !important;}
            #leaderboard-list { max-height: 100px !important; overflow-y: auto;}
            .board-row { padding: 4px 5px !important; font-size: 14px !important; }
            
            #end-msg button { padding: 10px 30px !important; font-size: 18px !important; margin-bottom: 20px !important; flex-shrink: 0; }
        }
    </style>
    <script src="common.js"></script>
</head>
<body>

    <audio id="bgm" src="bgm/defender_bgm.mp3" loop></audio>
    <audio id="sfx-shoot" src="bgm/shoot.mp3"></audio>
    <audio id="sfx-hit" src="bgm/hit.mp3"></audio>
    <audio id="sfx-wrong" src="bgm/wrong.mp3"></audio>
    <audio id="sfx-damage" src="bgm/damage.mp3"></audio>
    <audio id="sfx-rock" src="bgm/67.mp3"></audio>

    <button id="sound-btn" class="sound-toggle" onclick="toggleSound(event)">🔊 音效：開</button>
    <button class="exit-btn" onclick="location.href='index.html'">🚪 離開</button>

    <div id="portrait-warning">
        <div style="font-size: 80px; margin-bottom: 20px; animation: shake 2s infinite;">📱🔄</div>
        <div style="line-height: 1.5; margin-bottom: 20px;">請將手機旋轉至<strong style="color:var(--gold)">橫向</strong><br>以獲得最佳防守視野！</div>
    </div>

    <div id="start-overlay">
        <h1 style="font-size: 50px; color: var(--gold); text-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; margin-bottom: 5px; margin-top: 20px;">🏰 Grammar Defender</h1>
        <p style="color: #bdc3c7; font-size: 16px; margin-bottom: 20px; text-align: center; line-height: 1.5;">
            城堡保衛戰！閱讀上方文法題目，<br>點擊發射飛彈，擊敗身上帶有「正確答案」的怪物！
        </p>
        
        <div id="error-msg"></div>

        <input type="text" id="player-name" class="name-input" placeholder="輸入法師姓名..." autocomplete="off" maxlength="12">
        
        <!-- ✨ 修正 3：加入防呆預設隱藏選項 ✨ -->
        <select id="theme-select" class="theme-select" onchange="fetchFrontLeaderboard()">
            <option value="" disabled selected hidden>▼ 請先選擇挑戰關卡...</option>
            <optgroup label="四年級 (Grade 4)">
                <option value="defend-g4-l1">📍 L1: Where are you? (be動詞)</option>
                <option value="defend-g4-l2">🏃‍♂️ L2: What are you doing? (Ving)</option>
            </optgroup>
            <optgroup label="五年級 (Grade 5)">
                <option value="defend-g5-l1">🤕 L1: hurt vs hurts (身體部位)</option>
                <option value="defend-g5-l2">🤒 L2: Do/Does have a fever?</option>
            </optgroup>
        </select>

        <button class="start-btn" onclick="startGame()">⚔️ 開始防守</button>

        <div class="result-panel" style="margin-top: 0px; padding: 15px;">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">🏆 防衛英雄榜</h3>
            <div id="front-leaderboard-list"><div style="text-align:center; font-size:14px; color:#636e72;">請先選擇上方關卡，以查看英雄榜！</div></div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-box" style="text-align: left;">
            <div style="font-size: 12px; color: #bdc3c7;">SCORE</div>
            <div id="score-display">0</div>
            <div id="combo-hud">1x 倍率</div>
        </div>
        <div class="hud-box" style="text-align: right;">
            <div style="font-size: 12px; color: #bdc3c7;">CASTLE HP</div>
            <div id="lives-display">❤️❤️❤️</div>
            <div id="level-hud">Level 1</div>
        </div>
    </div>

    <div id="question-board">Loading...</div>

    <canvas id="game-canvas"></canvas>

    <div id="end-msg">
        <h1 style="font-size: 45px; color: var(--error); margin: 0; margin-top: 10px;">城堡陷落！💀</h1>
        <div class="result-panel">
            <div style="background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 20px; font-weight: 700; color: #2d3436; text-align: center;">
                防守總分：<br><span id="final-total-display" style="color:var(--primary); font-size:45px;">0</span> pts<br>
                <span style="font-size: 16px; color: #e74c3c;" id="final-level-display"></span>
            </div>
            <h2 class="board-row" style="color: var(--primary); justify-content: center; border-top: 2px dashed #ddd; padding-top: 15px;">🌍 防衛英雄榜</h2>
            <div id="leaderboard-list" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
        <button onclick="location.reload()" style="padding:12px 40px; font-size:20px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:900; cursor:pointer; margin-bottom: 10px;">再戰一回</button>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('keydown', function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return false; } });
        setInterval(function() { try { (function() { return false; }['constructor']('debugger')()); } catch(err) {} console.clear(); }, 1000);


        let userIP = "Unknown";


        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let animationId;
        let audioCtx = null;
        
        let isPlaying = false, isMuted = false;
        let score = 0, lives = 3, combo = 0, multiplier = 1;
        let currentLevel = 1;
        let playerName = "Player", currentTheme = "";
        let currentQuestions = [];
        let currentQuestionObj = null;
        
        let rockModeTimer = 0;
        let autoShootTimer = 0;
        let speedMult = 1.0;
        
        let monsters = [];
        let projectiles = [];
        let particles = [];
        let floatTexts = [];
        let playerObj = { x: 50, y: 0 }; 
        let castleX = 120; 

        const bgm = document.getElementById('bgm');
        const sfxShoot = document.getElementById('sfx-shoot');
        const sfxHit = document.getElementById('sfx-hit');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxDamage = document.getElementById('sfx-damage');
        const sfxRock = document.getElementById('sfx-rock');
        
        bgm.volume = 0.5; sfxShoot.volume = 0.6; sfxHit.volume = 0.8; sfxWrong.volume = 0.8; sfxDamage.volume = 0.8; sfxRock.volume = 0.6;

        window.onload = function() { 
            fetchFrontLeaderboard();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
            setupInput();
            fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => { userIP = data.ip; }).catch(err => console.log("無法獲取 IP"));
        };

        function resizeCanvas() {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                playerObj.y = height / 2;
            }
        }


        function fetchFrontLeaderboard() {
            const listDiv = document.getElementById('front-leaderboard-list'); 
            const themeSelect = document.getElementById('theme-select');
            
            // ✨ 如果還沒選關卡，不要顯示 Loading，而是提示選擇關卡 ✨
            if (themeSelect.value === "") {
                listDiv.innerHTML = "<div style='text-align:center; padding:10px; font-size:14px; color:#636e72;'>請先選擇上方關卡，以查看英雄榜！</div>";
                return;
            }

            listDiv.innerHTML = "<div style='text-align:center; font-size:14px; color:#636e72;'>📡 讀取中...</div>";
            fetch(`${GOOGLE_API_URL}?action=get&theme=${themeSelect.value}`).then(response => response.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) { listDiv.innerHTML = "<div style='padding:5px; font-size:14px;'>目前無紀錄，搶下首殺！</div>"; return; }
                board.slice(0, 5).forEach((p, i) => { let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name}</span><span style="color:var(--primary);">${p.score} pts</span></div>`; });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗 😢</div>");
        }

        function safePlayAudio(audioEl) {
            if (isMuted) return;
            try {
                audioEl.currentTime = 0;
                let p = audioEl.play();
                if (p !== undefined) p.catch(e => {});
            } catch (e) {}
        }

        class Monster {
            constructor(x, y, text, isCorrect, isRock = false) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.isCorrect = isCorrect;
                this.isRock = isRock;
                this.radius = window.innerHeight < 500 ? 30 : 40;
                
                if (this.isRock) {
                    this.speed = 6.0 * speedMult; 
                    this.emoji = "💪";
                } else {
                    this.speed = (Math.random() * 2.0 + 3.0) * speedMult;
                    this.emoji = ["👹", "👺", "👽", "👾", "👻", "🧟‍♂️"][Math.floor(Math.random() * 6)];
                }
                this.markedForDeath = false;
            }
            update() {
                this.x -= this.speed;
            }
            draw(ctx) {
                if (this.isRock) {
                    ctx.fillStyle = "rgba(241, 196, 15, 0.4)";
                    ctx.beginPath();
                    ctx.roundRect(this.x - 55, this.y - this.radius - 45, 110, 50, 12);
                    ctx.fill();
                }

                ctx.fillStyle = this.isRock ? "rgba(241, 196, 15, 0.95)" : "rgba(255, 255, 255, 0.9)";
                ctx.beginPath();
                ctx.roundRect(this.x - 45, this.y - this.radius - 35, 90, 30, 8);
                ctx.fill();

                ctx.strokeStyle = this.isRock ? "#e67e22" : "#34495e";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 16px Quicksand";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, this.x, this.y - this.radius - 20);

                ctx.font = `${this.radius * 1.5}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        class Projectile {
            constructor(startX, startY, target) {
                this.x = startX;
                this.y = startY;
                this.target = target;
                this.speed = 25 * speedMult; 
                this.radius = 8;
                this.markedForDeath = false;
            }
            update() {
                if(this.target.markedForDeath) {
                    this.markedForDeath = true; return; 
                }
                let dx = this.target.x - this.x;
                let dy = this.target.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < this.speed) {
                    this.x = this.target.x;
                    this.y = this.target.y;
                    this.hitTarget();
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            hitTarget() {
                this.markedForDeath = true;
                this.target.markedForDeath = true;
                
                if (this.target.isRock) {
                    safePlayAudio(sfxHit);
                    createExplosion(this.target.x, this.target.y, "#f1c40f");
                    
                    rockModeTimer = 8000; 
                    bgm.pause();
                    safePlayAudio(sfxRock);
                    
                    floatTexts.push(new FloatText(width/2, height/2, "ROCK MODE ACTIVATED!", "#f1c40f", true));
                    
                    monsters.forEach(m => { m.markedForDeath = true; createExplosion(m.x, m.y, "#bdc3c7"); });
                    setTimeout(spawnWave, 500);
                    return;
                }

                if (this.target.isCorrect) {
                    safePlayAudio(sfxHit);
                    createExplosion(this.target.x, this.target.y, "#2ecc71");
                    
                    combo++;
                    updateMultiplier();
                    
                    let pts = 10 * multiplier;
                    score += pts;
                    floatTexts.push(new FloatText(this.target.x, this.target.y - 20, `+${pts}`, "#2ecc71"));
                    checkLevelUp(); 
                    
                    monsters.forEach(m => {
                        if (m !== this.target) {
                            m.markedForDeath = true;
                            createExplosion(m.x, m.y, "#bdc3c7");
                        }
                    });
                    
                    setTimeout(spawnWave, 500);
                    
                } else {
                    safePlayAudio(sfxWrong);
                    createExplosion(this.target.x, this.target.y, "#e74c3c");
                    floatTexts.push(new FloatText(this.target.x, this.target.y - 20, "WRONG!", "#e74c3c"));
                    takeDamage();
                }
            }
            draw(ctx) {
                ctx.fillStyle = rockModeTimer > 0 ? "rgba(231, 76, 60, 0.4)" : "rgba(241, 196, 15, 0.4)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = rockModeTimer > 0 ? "#e74c3c" : "#f1c40f";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + (rockModeTimer > 0 ? 4 : 0), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 3;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.05; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class FloatText {
            constructor(x, y, text, color, isGiant = false) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = isGiant ? -1 : -3; this.isGiant = isGiant;
            }
            update() { this.y += this.vy; this.life -= (this.isGiant ? 0.015 : 0.03); }
            draw(ctx) {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.font = this.isGiant ? `bold 80px Quicksand` : `bold 24px Quicksand`;
                ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y);
                ctx.lineWidth = this.isGiant ? 4 : 1; ctx.strokeStyle = "white"; ctx.strokeText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<8; i++) { particles.push(new Particle(x, y, color)); particles.push(new Particle(x, y, "#ffffff")); }
        }

        function setupInput() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!isPlaying) return;
                
                let clickX = e.clientX;
                let clickY = e.clientY;
                
                for (let i = 0; i < monsters.length; i++) {
                    let m = monsters[i];
                    if (m.markedForDeath) continue;
                    
                    let dx = clickX - m.x;
                    let dy = clickY - m.y;
                    if (Math.sqrt(dx*dx + dy*dy) < m.radius + 40) { 
                        safePlayAudio(sfxShoot);
                        let startY = rockModeTimer > 0 ? playerObj.y - 80 : playerObj.y;
                        projectiles.push(new Projectile(playerObj.x, startY, m));
                        break; 
                    }
                }
            });
        }

        function checkLevelUp() {
            let newLevel = 1 + Math.floor(score / 500);
            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                speedMult = 1.0 + (currentLevel - 1) * 0.3; 
                document.getElementById('level-hud').innerText = `Level ${currentLevel}`;
                floatTexts.push(new FloatText(width/2, height/2, `LEVEL ${currentLevel} !`, "#e74c3c", true));
            }
            updateHUD();
        }

        function spawnWave() {
            if (!isPlaying) return;

            let q = currentQuestions[Math.floor(Math.random() * currentQuestions.length)];
            currentQuestionObj = q;
            
            let parts = q.q.split('____');
            let html = parts[0] + "<span class='blank-space'></span>" + (parts[1] || "");
            document.getElementById('question-board').innerHTML = html;

            let wrongCount = 2 + Math.floor((currentLevel - 1) / 2); 
            if (wrongCount > 6) wrongCount = 6; 
            
            let opts = [ { text: q.a, isCorrect: true } ];
            for(let i = 0; i < wrongCount; i++) {
                opts.push({ text: q.w[i % q.w.length], isCorrect: false });
            }
            opts.sort(() => Math.random() - 0.5);

            let startY = height * 0.2;
            let availableHeight = height * 0.7;
            let spacing = availableHeight / opts.length;
            
            opts.forEach((opt, index) => {
                let y = startY + (index * spacing) + (spacing/2);
                let x = width + 50 + (Math.random() * 100); 
                monsters.push(new Monster(x, y, opt.text, opt.isCorrect));
            });

            if (Math.random() < 0.10) {
                let rockY = startY + (Math.random() * availableHeight);
                let rockX = width + 150 + (Math.random() * 100);
                monsters.push(new Monster(rockX, rockY, "ROCK", true, true));
            }
        }

        function takeDamage() {
            safePlayAudio(sfxDamage);
            lives--;
            combo = 0;
            multiplier = 1;
            updateHUD();
            
            document.body.style.backgroundColor = "rgba(231, 76, 60, 0.3)";
            setTimeout(() => document.body.style.backgroundColor = "var(--bg)", 150);

            if (lives <= 0) {
                endGame();
            }
        }

        function updateMultiplier() {
            if (combo >= 9) multiplier = 4;
            else if (combo >= 5) multiplier = 3;
            else if (combo >= 2) multiplier = 2;
            else multiplier = 1;
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = score;
            let hearts = ""; for(let i=0; i<3; i++) { hearts += (i < lives) ? "❤️" : "🖤"; }
            document.getElementById('lives-display').innerText = hearts;
            
            const comboEl = document.getElementById('combo-hud');
            comboEl.innerText = `${multiplier}x 倍率 (Combo: ${combo})`;
            if(multiplier > 1) comboEl.style.color = "#f1c40f"; else comboEl.style.color = "#3498db";
        }

        async function startGame() {
            try {
                const inputName = document.getElementById('player-name').value.trim();
                const errorMsg = document.getElementById('error-msg');
                const themeSelect = document.getElementById('theme-select');
                
                errorMsg.style.display = "none";
                
                if(inputName === "") { 
                    errorMsg.innerText = "⚠️ 請輸入法師姓名！";
                    errorMsg.style.display = "block";
                    return; 
                }
                if(badWords.some(bad => inputName.toLowerCase().replace(/\s+/g, '').includes(bad))) { 
                    errorMsg.innerText = "⚠️ 請保持禮貌喔！😇";
                    errorMsg.style.display = "block";
                    return; 
                }

                // ✨ 新增防呆機制：強制學生選擇關卡才能開始 ✨
                if (themeSelect.value === "") {
                    errorMsg.innerText = "⚠️ 請先選擇挑戰關卡！";
                    errorMsg.style.display = "block";
                    return;
                }
                
                playerName = inputName;
                currentTheme = themeSelect.value;

                let loadedQuestions;
                try {
                    const res = await fetch(`data/${currentTheme}.json`);
                    loadedQuestions = await res.json();
                } catch(e) {
                    errorMsg.innerText = "⚠️ 題庫載入失敗，請重新整理！"; errorMsg.style.display = "block"; return;
                }
                currentQuestions = loadedQuestions;

                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('question-board').style.display = 'block';
                
                score = 0; lives = 3; combo = 0; multiplier = 1; 
                currentLevel = 1; speedMult = 1.0;
                rockModeTimer = 0; autoShootTimer = 0;
                document.getElementById('level-hud').innerText = `Level ${currentLevel}`;

                monsters = []; projectiles = []; particles = []; floatTexts = [];
                
                isPlaying = true;
                updateHUD();

                bgm.volume = 0.5; safePlayAudio(bgm);
                
                spawnWave();
                lastTime = performance.now();
                animationId = requestAnimationFrame(gameLoop);
            } catch(e) {
                console.log("Start error", e);
            }
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!isPlaying) return;
            
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            if (width <= 0 || height <= 0) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, width, height);

            if (rockModeTimer > 0) {
                rockModeTimer -= dt;
                autoShootTimer -= dt;
                
                if (autoShootTimer <= 0) {
                    autoShootTimer = 300; 
                    let target = monsters.find(m => m.isCorrect && !m.markedForDeath && !m.isRock);
                    if (target) {
                        safePlayAudio(sfxShoot);
                        projectiles.push(new Projectile(playerObj.x, playerObj.y - 80, target));
                    }
                }

                if (rockModeTimer <= 0) {
                    sfxRock.pause(); sfxRock.currentTime = 0;
                    if(!isMuted) bgm.play().catch(e=>{});
                }
            }

            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, 0, castleX, height);
            ctx.strokeStyle = rockModeTimer > 0 ? "#f1c40f" : "rgba(231, 76, 60, 0.5)";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(castleX, 0); ctx.lineTo(castleX, height); ctx.stroke();

            let waveFailed = false;
            for (let i = monsters.length - 1; i >= 0; i--) {
                let m = monsters[i];
                if (m.markedForDeath) {
                    monsters.splice(i, 1);
                    continue;
                }
                
                m.update();
                m.draw(ctx);

                if (m.x - m.radius < castleX) {
                    if (m.isRock) {
                        m.markedForDeath = true;
                    } else {
                        waveFailed = true;
                    }
                }
            }

            if (waveFailed) {
                takeDamage();
                monsters = []; 
                projectiles = [];
                if (lives > 0) setTimeout(spawnWave, 500);
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.update();
                if (p.markedForDeath) {
                    projectiles.splice(i, 1);
                    continue;
                }
                p.draw(ctx);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (rockModeTimer > 0) {
                ctx.font = "80px Arial";
                ctx.fillText("👨‍🏫", playerObj.x, playerObj.y - 80);
                
                ctx.font = "60px Arial";
                ctx.fillText("💪", playerObj.x - 45, playerObj.y - 70);
                
                ctx.save();
                ctx.translate(playerObj.x + 45, playerObj.y - 70);
                ctx.scale(-1, 1);
                ctx.fillText("💪", 0, 0); 
                ctx.restore();

                ctx.font = "bold 24px Quicksand";
                ctx.fillStyle = "#f1c40f";
                ctx.fillText((rockModeTimer / 1000).toFixed(1) + "s", playerObj.x, playerObj.y - 20);
                
            } else {
                ctx.font = "60px Arial";
                ctx.fillText("🧙‍♂️", playerObj.x, playerObj.y);
            }

            for (let i = floatTexts.length - 1; i >= 0; i--) {
                floatTexts[i].update(); floatTexts[i].draw(ctx);
                if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false; cancelAnimationFrame(animationId); 
            bgm.pause(); sfxRock.pause();
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('question-board').style.display = 'none';
            document.getElementById('final-total-display').textContent = score; 
            document.getElementById('final-level-display').textContent = `突破至 Level ${currentLevel} !`; 
            document.getElementById('end-msg').style.display = "flex";
            
            const listDiv = document.getElementById('leaderboard-list'); 
            const themeName = document.getElementById('theme-select').options[document.getElementById('theme-select').selectedIndex].text.split(':')[0].substring(3);
            listDiv.innerHTML = "<div style='text-align:center; padding: 15px; font-weight:700; color:var(--primary); font-size:20px;'>📡 上傳防守成績...</div>";
            
            fetch(`${GOOGLE_API_URL}?action=save&name=${encodeURIComponent(playerName)}&score=${score}&time=Lv.${currentLevel}&theme=${currentTheme}&ip=${userIP}`).then(r => r.json()).then(board => {
                listDiv.innerHTML = ""; if (!board || board.length === 0) return;
                board.slice(0,5).forEach((p, i) => { 
                    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`; 
                    listDiv.innerHTML += `<div class='board-row'><span>${rankStr} ${p.name} (${p.time})</span><span style="color:var(--primary);">${p.score} pts</span></div>`; 
                });
            }).catch(() => listDiv.innerHTML = "<div style='text-align:center; color:var(--error);'>連線失敗</div>");
        }
    </script>
</body>
</html>
